# wfm_writer — the output-container Writer (raw / CSV / BLUE-1000 / SigMF).
#
# The dual of wfm_reader, migrated the same way. Its state struct stays private:
# the three statistics are computed properties, so jm declares the accessors and
# never reads the layout.
[wfm_writer]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "true"
no_state = "true"
no_step = "true"
class_name = "Writer"
create_error = "OSError"
create_error_message = "cannot open the capture for writing (check the path, the directory, and permissions)"
# A writer has nothing coherent to reset -- the samples are on disk and the
# written count drives the BLUE data_size patch that close() applies. gh-542
# removes the method entirely rather than shipping a no-op or a hand-written
# raise (which would silently degrade to a no-op if a regeneration dropped it).
no_reset = "true"

# close() is finalisation, not cleanup: the BLUE data_size patch and the
# extended header are both written during close, so a failed write there means
# the file on disk is not the file the caller asked for. A fallible, renamed
# destructor (gh-541/544) reports it -- returns != 0 raises, and the status
# reaches the generated __exit__, so a `with` block raises rather than
# swallowing a corrupt capture. `destroy()` stays as an alias for the handle-era
# spelling.
[wfm_writer.destroy]
name = "close"
aliases = ["destroy"]
returns = "int"
error = "OSError"
error_message = "failed to finalise the capture: the trailing header patch or extended header was not written"

[[wfm_writer.depends_on]]
name = "wfm_cjson"
link = true

[[wfm_writer.depends_on]]
name = "wfm_keywords"
link = true

[[wfm_writer.depends_on]]
name = "wfm_draw"
link = true

[[wfm_writer.init_params]]
name = "path"
type = "path"

[[wfm_writer.init_params]]
name = "file_type"
type = "string_enum:raw,csv,blue,sigmf"
default = "raw"

[[wfm_writer.init_params]]
name = "sample_type"
type = "string_enum:cf32,cf64,ci32,ci16,ci8"
default = "cf32"

[[wfm_writer.init_params]]
name = "endian"
type = "string_enum:le,be"
default = "le"

[[wfm_writer.init_params]]
name = "fs"
type = "double"
default = "1e6"

[[wfm_writer.init_params]]
name = "fc"
type = "double"
default = "0.0"

# `total` (not total_samples): the handle binding's public keyword, preserved.
[[wfm_writer.init_params]]
name = "total"
type = "size_t"
default = "0"

[[wfm_writer.init_params]]
name = "headroom"
type = "double"
default = "0.0"

[[wfm_writer.methods]]
name = "write"
arg_type = "float _Complex[]"
return_type = "size_t"
nogil = true

# `params` rather than `arg_type`, so `on` keeps the default the handle gave it
# — w.track_clipping() with no argument is the documented spelling.
[[wfm_writer.methods]]
name = "track_clipping"
arg_type = "void"
return_type = "void"
params = [{ name = "on", type = "int", default = "1" }]

# add_keyword(tag, type, value): the variant codec (gh-554) packs `value` into a
# discriminant-tagged buffer per the `type` code and calls the sink. jm
# generates the whole method (parse + per-code switch + sink call + rc->error),
# so the hand-written binding + its `# jm:hand` .pyi stub are gone. sink_fn is
# the existing C encoder. Same [codec.blue_keyword] table as Reader.keywords, so
# the write and read halves cannot drift.
[[wfm_writer.methods]]
name = "add_keyword"
codec = "blue_keyword"
sink_fn = "wfm_writer_add_keyword"
doc = "Attach a BLUE extended-header keyword (BLUE captures only). `type` is a single character (B/I/L/X int, F/D float, A string, T deprecated int); `value` is a str for A, a single int/float, or a sequence of them. Keywords are buffered and written at close(). The read side is Reader.keywords."
params = [
  { name = "tag", type = "const char *" },
  { name = "type", type = "char", role = "discriminant" },
  { name = "value", role = "variant" },
]

# Computed properties: jm declares wfm_writer_get_<prop>() and calls it, so the
# state layout stays private to wfm_writer_core.c.
[[wfm_writer.properties]]
name = "clip_fraction"
type = "double"

[[wfm_writer.properties]]
name = "peak_dbfs"
type = "double"

[[wfm_writer.properties]]
name = "clipped"
type = "bool"
