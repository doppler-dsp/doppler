include = ["objects/*.toml"]

[project]
name = "doppler"
version = "0.1.0"
build = "cmake"
perf = "true"
pytest = "true"
pytest_benchmark = "true"
schema = "6"
c_deps = ["hbdecim", "resamp"]

[module.cvt]
objects = ["f32_to_i16", "i16_to_f32", "f32_to_i16u32", "f32_to_i16u64", "i16u32_to_f32", "i16u64_to_f32", "f32_to_uq15", "uq15_to_f32", "adc"]

[module.accumulator]
objects = ["acc_f32", "acc_cf64"]

[module.filter]
objects = ["fir", "hbdecim_q15"]

[module.source]
objects = ["nco", "lo", "awgn"]
# awgn_core's logf is auto-vectorised by GCC into a libmvec call
# (_ZGVdN8v_logf); link libmvec on Linux so source.so resolves it.
extra_link_libs = ["$<$<PLATFORM_ID:Linux>:mvec>"]

[module.delay]
objects = ["delay"]

[module.spectral]
objects = ["fft", "fft2d", "corr", "corr2d", "detector", "detector2d"]

[[module.spectral.functions]]
name = "kaiser_enbw"
return_type = "float"
params = [{name = "w", type = "float[]"}]

[[module.spectral.functions]]
name = "kaiser_window"
params = [{name = "w", type = "float[]", out = true}, {name = "beta", type = "float"}]

[[module.spectral.functions]]
name = "hann_window"
params = [{name = "w", type = "float[]", out = true}]

[[module.spectral.functions]]
name = "magnitude_db_cf32"
out_type = "float"
params = [{name = "x", type = "float _Complex[]"}, {name = "lin_floor", type = "float"}, {name = "offset_db", type = "float"}]

[[module.spectral.functions]]
name = "magnitude_db_cf64"
out_type = "float"
params = [{name = "x", type = "double _Complex[]"}, {name = "lin_floor", type = "double"}, {name = "offset_db", type = "float"}]

[[module.spectral.functions]]
name = "find_peaks_f32"
return_type = "dp_peak_t"
max_results_param = "n_peaks"
result_fields = [{name = "freq_norm", type = "float"}, {name = "amplitude_db", type = "float"}]
params = [{name = "db", type = "float[]"}, {name = "n_peaks", type = "size_t"}, {name = "min_db", type = "float"}]

[module.buffer]
no_generate = "true"

[module.stream]
no_generate = "true"

# ddc_fn: hand-written functional DDCR Python API (state as PyCapsule). jm only
# manages its CMake add_subdirectory; the source is hand-written.
[module.ddc_fn]
no_generate = "true"

[module.ddc]
objects = ["ddc", "ddcr"]
extra_link_libs = [
    "lo_core",
    "RateConverter_core",
    "resamp_core",
    "hbdecim_core",
    "hbdecim_r2c_core",
    "cic_core",
    "fir_core",
    "resample_core",
    "m",
]

[module.resample]
objects = ["Resampler", "HalfbandDecimator", "cic", "RateConverter"]
extra_types = ["HalfbandDecimatorDp", "HalfbandDecimatorR2C"]
extra_link_libs = ["resamp_core", "hbdecim_core", "hbdecim_r2c_core", "resample_core", "fir_core", "m"]

[[module.resample.functions]]
name = "ciccompmf"
out_type = "float64[M]"
params = [{name = "N", type = "uint32_t"}, {name = "R", type = "uint32_t"}, {name = "M", type = "uint32_t"}]

[[module.resample.functions]]
name = "kaiser_beta"
return_type = "double"
params = [{name = "atten", type = "double"}]

[[module.resample.functions]]
name = "kaiser_num_taps"
return_type = "int"
params = [{name = "num_phases", type = "int"}, {name = "atten", type = "double"}, {name = "pb", type = "double"}, {name = "sb", type = "double"}]

[module.detection]
objects = []

[[module.detection.functions]]
name = "marcum_q"
return_type = "double"
params = [{name = "m", type = "int"}, {name = "a", type = "double"}, {name = "b", type = "double"}]

[[module.detection.functions]]
name = "det_threshold"
return_type = "double"
params = [{name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_pd"
return_type = "double"
params = [{name = "snr", type = "double"}, {name = "dwell", type = "int"}, {name = "threshold", type = "double"}]

[[module.detection.functions]]
name = "det_dwell"
return_type = "int"
params = [{name = "snr", type = "double"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}, {name = "max_dwell", type = "int"}]

[[module.detection.functions]]
name = "det_snr"
return_type = "double"
params = [{name = "dwell", type = "int"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_threshold_power"
return_type = "double"
params = [{name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_pd_power"
return_type = "double"
params = [{name = "snr_power", type = "double"}, {name = "dwell", type = "int"}, {name = "power_threshold", type = "double"}]

[[module.detection.functions]]
name = "det_dwell_power"
return_type = "int"
params = [{name = "snr_power", type = "double"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}, {name = "max_dwell", type = "int"}]

[[module.detection.functions]]
name = "det_snr_power"
return_type = "double"
params = [{name = "dwell", type = "int"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}]

[module.agc]
objects = ["agc"]

[module.util]
objects = []

[[module.util.functions]]
name = "square_clip"
doc = "Square-clip a complex sample: clip the real and imaginary parts independently to [-lin, lin] (a square region in the IQ plane)."
return_type = "float _Complex"
params = [{name = "y", type = "float _Complex"}, {name = "lin", type = "float"}]

[module.arith]
objects = ["acc_q15", "acc_q8"]

[[module.arith.functions]]
name = "add_q15"
doc = "Elementwise saturating two's complement add of two Q15 arrays."
out_type = "int16_t"
params = [{name = "a", type = "int16_t[]"}, {name = "b", type = "int16_t[]"}]

[[module.arith.functions]]
name = "sub_q15"
doc = "Elementwise saturating two's complement subtract of two Q15 arrays."
out_type = "int16_t"
params = [{name = "a", type = "int16_t[]"}, {name = "b", type = "int16_t[]"}]

[[module.arith.functions]]
name = "mul_q15"
doc = "Elementwise Q15 multiply with round-half-up: out[i] = sat16((a[i]*b[i] + 16384) >> 15)."
out_type = "int16_t"
params = [{name = "a", type = "int16_t[]"}, {name = "b", type = "int16_t[]"}]

[[module.arith.functions]]
name = "dot_q15"
doc = "Inner product of two Q15 arrays. Returns the raw Q30 accumulation as int64_t. Shift right 15 to get a Q15 scalar."
return_type = "int64_t"
params = [{name = "a", type = "int16_t[]"}, {name = "b", type = "int16_t[]"}]

[[module.arith.functions]]
name = "shl_q15"
doc = "Elementwise arithmetic left shift of a Q15 array with saturation. Equivalent to multiplying by 2^n in fixed-point."
out_type = "int16_t"
params = [{name = "a", type = "int16_t[]"}, {name = "n", type = "int"}]

[[module.arith.functions]]
name = "shr_q15"
doc = "Elementwise arithmetic right shift of a Q15 array with round-half-up. Equivalent to dividing by 2^n."
out_type = "int16_t"
params = [{name = "a", type = "int16_t[]"}, {name = "n", type = "int"}]

[[module.arith.functions]]
name = "add_q8"
doc = "Elementwise saturating two's complement add of two Q8 arrays."
out_type = "int8_t"
params = [{name = "a", type = "int8_t[]"}, {name = "b", type = "int8_t[]"}]

[[module.arith.functions]]
name = "sub_q8"
doc = "Elementwise saturating two's complement subtract of two Q8 arrays."
out_type = "int8_t"
params = [{name = "a", type = "int8_t[]"}, {name = "b", type = "int8_t[]"}]

[[module.arith.functions]]
name = "mul_q8"
doc = "Elementwise Q8 multiply with round-half-up: out[i] = sat8((a[i]*b[i] + 64) >> 7)."
out_type = "int8_t"
params = [{name = "a", type = "int8_t[]"}, {name = "b", type = "int8_t[]"}]

[[module.arith.functions]]
name = "dot_q8"
doc = "Inner product of two Q8 arrays. Returns the raw Q14 accumulation as int32_t."
return_type = "int32_t"
params = [{name = "a", type = "int8_t[]"}, {name = "b", type = "int8_t[]"}]

[[module.arith.functions]]
name = "shl_q8"
doc = "Elementwise arithmetic left shift of a Q8 array with saturation."
out_type = "int8_t"
params = [{name = "a", type = "int8_t[]"}, {name = "n", type = "int"}]

[[module.arith.functions]]
name = "shr_q8"
doc = "Elementwise arithmetic right shift of a Q8 array with round-half-up."
out_type = "int8_t"
params = [{name = "a", type = "int8_t[]"}, {name = "n", type = "int"}]

[[module.arith.functions]]
name = "shl_i64"
doc = "Elementwise logical left shift of an int64_t array. No saturation (caller ensures no overflow)."
out_type = "int64_t"
params = [{name = "a", type = "int64_t[]"}, {name = "n", type = "int"}]

[[module.arith.functions]]
name = "shr_i64"
doc = "Elementwise arithmetic right shift of an int64_t array with round-half-up. Useful for normalising dot_q15 Q30 results back to Q15."
out_type = "int64_t"
params = [{name = "a", type = "int64_t[]"}, {name = "n", type = "int"}]
