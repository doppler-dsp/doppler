[mypy]
python_version = 3.9
strict = True

# C extensions get .pyi stubs from just-makeit; third-party C libs may not
# ship stubs — ignore rather than error on import.
ignore_missing_imports = True

# Per-project: add [[mypy-<package>]] sections below to tighten or relax
# rules for specific modules. Example:
#
# [mypy-legacy_module.*]
# ignore_errors = True
