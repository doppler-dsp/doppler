[[module.spectral.functions.params]]
name = "lin_floor"
type = "float"

[[module.spectral.functions.params]]
name = "offset_db"
type = "float"

[[module.spectral.functions]]
name = "magnitude_db_cf64"
out_type = "float"

[[module.spectral.functions.params]]
name = "x"
type = "double _Complex[]"

[[module.spectral.functions.params]]
name = "lin_floor"
type = "double"

[[module.spectral.functions.params]]
name = "offset_db"
