[project]
name = "doppler-dsp"
version = "0.2.0"
description = "Dead-simple, ultra-fast signal processing in C"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.4.2",
]
license-files = [
    "c/cmake/licenses/README_LICENSE",
    "c/cmake/licenses/FFTW_LICENSE",
    "c/cmake/licenses/POCKETFFT_LICENSE",
]

[project.urls]
Homepage      = "https://doppler-dsp.github.io/doppler/"
Documentation = "https://doppler-dsp.github.io/doppler/"
Repository    = "https://github.com/doppler-dsp/doppler"
"Bug Tracker" = "https://github.com/doppler-dsp/doppler/issues"
Changelog     = "https://github.com/doppler-dsp/doppler/blob/main/CHANGELOG.md"

[project.optional-dependencies]
optimize = [
    "scipy>=1.11",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=6.0",
    "zensical>=0.0.29",
    "mkdocstrings[python]>=0.29",
    "doppler-specan[web]",
    "matplotlib>=3.10.8",
    "scipy>=1.11",
]

[tool.pytest.ini_options]
addopts = "--tb=short --doctest-modules"
testpaths = [
    "python/doppler/tests",
    "python/doppler/accumulator",
    "python/doppler/delay",
    "python/doppler/fft",
    "python/doppler/polyphase",
    "python/doppler/resample",
]
doctest_optionflags = ["NORMALIZE_WHITESPACE", "ELLIPSIS"]

[tool.coverage.run]
source = ["python/doppler"]
omit = ["python/doppler/tests/*", "python/doppler/examples/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[tool.uv.workspace]
members = ["python/specan"]

[tool.uv.sources]
doppler-dsp = { workspace = true }
doppler-specan = { workspace = true }

[tool.uv.build-backend]
module-root = "python"
module-name = "doppler"

[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"
