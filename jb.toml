[project]
name    = "doppler"
version = "0.3.7"

[tools.install-deps]
source = "just-bashit:install-deps"
groups = ["runtime", "dev"]

[tools.just-makeit]
source = "just-bashit:just-makeit"
config = "just-makeit.toml"

# Package NAMES below are architecture-agnostic per package manager (e.g.
# apt's "build-essential"/"cmake" resolve on amd64 and arm64 alike) --
# exercised on both via CI (manylinux_2_28_x86_64) and arm64 builds of
# deploy/docker/Dockerfile.cli's linux/arm64 source-build path. If a
# future dependency needs an arch-specific package name/version, add it
# here rather than special-casing it downstream — this file stays the one
# place every consumer (CI, both Dockerfiles) reads from.

# No [runtime.*] sections: doppler's FFT is fully vendored (pocketfft +
# PFFFT, both in vendor/) and the rest of the core is pure C99 + libm, so
# there is nothing to install at runtime on any platform. (Historically
# listed libfftw3/fftw here before the FFT was vendored in-tree; removed
# once confirmed dead — zero references to fftw3.h/fftw_* anywhere in
# native/ or CMakeLists.txt.)

# patchelf is only exercised when `pip install .`/`python -m build` runs the
# full wheel build+repair path (auditwheel) from a bare Linux image, as
# opposed to `make build`/`make pyext`'s local cmake+extension loop, which
# never touches it. The manylinux containers release.yml's build-python job
# uses already bundle it; deploy/docker/Dockerfile.cli's linux/arm64
# source-build path (no manylinux wheel exists for that arch) is the other
# consumer, on a bare python:3.12-slim + jbx dev group. Not listed for brew
# (macOS wheel repair uses delocate-wheel, not auditwheel/patchelf) or
# msys2 (Windows isn't a wheel-building target here).
[dev.apt]
packages = [
    "build-essential",
    "cmake",
    "pkg-config",
    "python3-dev",
    "python3-numpy",
    "patchelf",
]

[dev.pacman]
packages = [
    "base-devel",
    "cmake",
    "pkgconf",
    "python",
    "python-numpy",
    "rust",
    "patchelf",
]

# python/numpy: the docs' build-from-source path needs a NumPy-equipped
# Python; CI runners and dev machines that already manage Python another
# way just get a no-op (brew skips what's installed).
[dev.brew]
packages = [
    "cmake",
    "pkg-config",
    "python",
    "numpy",
]

[dev.dnf]
packages = [
    "gcc",
    "make",
    "cmake",
    "pkgconf-pkg-config",
    "python3-devel",
    "python3-numpy",
    "patchelf",
]

[dev.zypper]
packages = [
    "gcc",
    "make",
    "cmake",
    "pkg-config",
    "python3-devel",
    "python3-numpy",
    "patchelf",
]

[dev.msys2]
packages = [
    "mingw-w64-ucrt-x86_64-gcc",
    "mingw-w64-ucrt-x86_64-cmake",
    "mingw-w64-ucrt-x86_64-python",
    "mingw-w64-ucrt-x86_64-python-numpy",
    "make",
    "pkg-config",
]

[docs.apt]
packages = [
    "doxygen",
    "graphviz",
    "texlive-base",
    "texlive-latex-extra",
    "dvipng",
]
