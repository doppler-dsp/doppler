type = "float"

[[module.spectral.functions.result_fields]]
name = "amplitude_db"
type = "float"

[[module.spectral.functions.params]]
name = "db"
type = "float[]"

[[module.spectral.functions.params]]
name = "n_peaks"
type = "size_t"

[[module.spectral.functions.params]]
name = "min_db"
type = "float"

[[module.spectral.functions]]
name = "obw_from_power"
return_type = "double"

[[module.spectral.functions.params]]
name = "pwr"
type = "double[]"

[[module.spectral.functions.params]]
name = "fs"
type = "double"

[[module.spectral.functions.params]]
name = "frac"
type = "double"

[[module.spectral.functions]]
name = "noise_floor_db"
return_type = "double"

[[module.spectral.functions.params]]
name = "db"
type = "float[]"
[module.buffer]
no_generate = "true"

[module.stream]
no_generate = "true"

[module.ddc_fn]
no_generate = "true"

[module.wfmcompose_py]
no_generate = "true"

[module.ddc]
objects = ["ddc", "ddcr"]
extra_link_libs = ["lo_core", "RateConverter_core", "resamp_core", "hbdecim_core", "hbdecim_r2c_core", "cic_core", "fir_core", "resample_core", "m"]

[module.ddc.reexports]
ddc_fn = ["ddcr_create", "ddcr_execute", "ddcr_reset", "ddcr_destroy", "ddcr_get_norm_freq", "ddcr_set_norm_freq", "ddcr_get_rate"]
[module.resample]
objects = ["Resampler", "HalfbandDecimator", "cic", "RateConverter"]
extra_types = ["HalfbandDecimatorDp", "HalfbandDecimatorR2C"]
extra_link_libs = ["resamp_core", "hbdecim_core", "hbdecim_r2c_core", "resample_core", "fir_core", "m"]

