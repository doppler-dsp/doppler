[project]
name    = "doppler"
version = "0.3.7"

[tools.install-deps]
source = "just-bashit:install-deps"
groups = ["runtime", "dev"]

[tools.just-makeit]
source = "just-bashit:just-makeit"
config = "just-makeit.toml"

[runtime.apt]
packages = [
    "libzmq3-dev",
    "libfftw3-dev",
    "libfftw3-bin",
]

[runtime.pacman]
packages = [
    "zeromq",
    "fftw",
]

[runtime.brew]
packages = [
    "zeromq",
    "fftw",
]

[runtime.dnf]
packages = [
    "zeromq-devel",
    "fftw-devel",
]

[runtime.zypper]
packages = [
    "zeromq-devel",
    "fftw3-devel",
]

[runtime.msys2]
packages = [
    "mingw-w64-ucrt-x86_64-zeromq",
    "mingw-w64-ucrt-x86_64-fftw",
]

[dev.apt]
packages = [
    "build-essential",
    "cmake",
    "pkg-config",
    "python3-dev",
    "python3-numpy",
]

[dev.pacman]
packages = [
    "base-devel",
    "cmake",
    "pkgconf",
    "python",
    "python-numpy",
    "rust",
]

[dev.brew]
packages = [
    "cmake",
    "pkg-config",
]

[dev.dnf]
packages = [
    "gcc",
    # Only for the optional zmq/stream component (vendored libzmq is C++); the
    # core libdoppler is pure C99 and builds with gcc alone.
    "gcc-c++",
    "make",
    "cmake",
    "pkgconf-pkg-config",
    "python3-devel",
    "python3-numpy",
]

[dev.zypper]
packages = [
    "gcc",
    # Only for the optional zmq/stream component (vendored libzmq is C++); the
    # core libdoppler is pure C99 and builds with gcc alone.
    "gcc-c++",
    "make",
    "cmake",
    "pkg-config",
    "python3-devel",
    "python3-numpy",
]

[dev.msys2]
packages = [
    "mingw-w64-ucrt-x86_64-gcc",
    "mingw-w64-ucrt-x86_64-cmake",
    "mingw-w64-ucrt-x86_64-python",
    "mingw-w64-ucrt-x86_64-python-numpy",
    "make",
    "pkg-config",
]

[docs.apt]
packages = [
    "doxygen",
    "graphviz",
    "texlive-base",
    "texlive-latex-extra",
    "dvipng",
]
