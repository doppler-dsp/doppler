name: Benchmark

# Runs automatically on release tags; opt-in otherwise via workflow_dispatch.
# Always runs on the same platform and Python version so snapshots are
# directly comparable.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Label for the snapshot (default: commit SHA)'
        required: false

permissions:
  contents: write   # needed to push the result commit

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-24.04   # pinned OS for comparable results

    steps:
    - uses: actions/checkout@v4
      with:
        # Full history so the commit push works cleanly
        fetch-depth: 0

    - name: Install jbx
      run: |
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://raw.githubusercontent.com/just-buildit/just-bashit/main/src/just-runit" \
          -o "$HOME/.local/bin/just-runit"
        chmod +x "$HOME/.local/bin/just-runit"
        ln -sf just-runit "$HOME/.local/bin/jb"
        ln -sf just-runit "$HOME/.local/bin/jbx"
        ln -sf just-runit "$HOME/.local/bin/just-buildit"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install system deps
      run: |
        sudo apt-get update
        jbx -r install-deps -g runtime,dev -s apt

    - name: Install uv + Python 3.12
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.12'   # pinned Python for comparable results

    - name: Install Python dev deps
      run: uv sync --group dev

    - name: Build C library
      run: make build

    - name: Build Python C extensions
      run: make pyext

    - name: Determine snapshot tag
      id: tag
      run: |
        if [ -n "${{ github.event.inputs.tag }}" ]; then
          echo "bench_tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "bench_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        else
          echo "bench_tag=$(date +%Y-%m-%d)-${{ github.sha }}" \
            >> "$GITHUB_OUTPUT"
        fi

    - name: Run benchmarks
      # Full suite (C + Python) so both snapshots are captured: <tag>.json
      # (pytest-benchmark) and <tag>-c.json (jm_bench). Pinned to the project's
      # jm version for reproducibility across runs.
      run: >-
        uvx --from 'just-makeit==0.18.0' just-makeit bench
        --tag ${{ steps.tag.outputs.bench_tag }}

    - name: Commit benchmark snapshot
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Push snapshots to the unprotected `benchmarks` branch so branch
        # protection rules on `main` don't block the commit.
        SNAP="${{ steps.tag.outputs.bench_tag }}"
        HIST="$GITHUB_WORKSPACE/benchmarks/history"
        # Both snapshots: Python (<tag>.json) and C (<tag>-c.json). Each must
        # exist and be trimmed — raw pytest-benchmark JSON with stats.data
        # arrays can exceed 100 MB, so refuse anything over 512 KB.
        MAX_BYTES=524288
        SNAPS="${HIST}/${SNAP}.json ${HIST}/${SNAP}-c.json"
        for SRC in $SNAPS; do
          if [ ! -f "$SRC" ]; then
            echo "ERROR: expected snapshot $SRC was not written." >&2
            exit 1
          fi
          ACTUAL=$(stat -c%s "$SRC")
          if [ "$ACTUAL" -gt "$MAX_BYTES" ]; then
            echo "ERROR: $(basename "$SRC") is ${ACTUAL} bytes (limit ${MAX_BYTES})." >&2
            echo "       stats.data arrays were not trimmed — check just-makeit bench." >&2
            exit 1
          fi
        done
        git fetch origin benchmarks 2>/dev/null || true
        if git ls-remote --exit-code origin benchmarks > /dev/null 2>&1; then
          git worktree add /tmp/bench-branch origin/benchmarks
        else
          git worktree add --orphan -b benchmarks /tmp/bench-branch
        fi
        mkdir -p /tmp/bench-branch/history
        cp $SNAPS /tmp/bench-branch/history/
        cd /tmp/bench-branch
        git add history/
        git diff --cached --quiet || \
          git commit -m "bench: ${SNAP}"
        git pull --rebase origin benchmarks 2>/dev/null || true
        git push origin HEAD:benchmarks
