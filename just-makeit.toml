[module.buffer]
no_generate = "true"

[module.stream]
no_generate = "true"

[module.wfmcompose_py]
no_generate = "true"

[module.ddc]
objects = ["ddc"]
# ddc.toml's depends_on link=true (gh-225) links the composed cores into the ddc
# .so AND ddc's own C test/bench. Only the non-component libm remains here.
extra_link_libs = ["m"]

[module.ddc.reexports]
# The functional ddcr_* free functions (hand ddc_fn_ext.c) and the object-
# generator DDCR class were both retired (round 4): doppler.ddc.Ddcr is now the
# generated kind="handle" class (module.ddc_fn below), the real non-wfm adopter.
ddc_fn = ["Ddcr"]

# ── Ddcr: the generic kind="handle" decimate/mix/resample resource ───────────
# Consolidates the old DDCR object (object generator) and the seven ddcr_* free
# functions (hand-written ddc_fn_ext.c) into ONE generated typed class over the
# opaque ddcr_state_t. Proves the handle generator on a non-wfm adopter: the
# array-in -> caller-buffer array-out execute (jm#316 shape d) and the writable
# norm_freq property (jm#316) are exactly the shapes this object drove. The
# module id stays `ddc_fn` (the slot the retired free-fn module held — its
# native/src/ddc_fn/ dir is reused) to avoid colliding with native/src/ddcr/
# (the ddcr_core OBJECT lib); users only ever see the reexported `Ddcr`.
[module.ddc_fn]
kind            = "handle"
backing         = "ddcr"
handle_type     = "ddcr_state_t"
header          = "ddc/ddc_core.h"
package         = "ddc"
type_name       = "Ddcr"
context_manager = true
create_fn       = "ddcr_create"
close_fn        = "ddcr_destroy"
# ddcr_create/execute/reset/destroy/get_norm_freq/set_norm_freq/get_rate all live
# in ddc_core (shared with the Ddc object). The handle sizes its output from the
# caller's buffer, so it does NOT need ddcr_core's execute_max_out (that hook
# existed only for the retired DDCR object's variable_output execute). Links
# ddc_core + the transitive decimate/mix/resample cores (mirrors ddc.toml's set).
depends_on = [
    { name = "ddc", link = true },
    { name = "lo", link = true },
    { name = "RateConverter", link = true },
    { name = "resamp", link = true },
    { name = "hbdecim", link = true },
    { name = "hbdecim_r2c", link = true },
    { name = "cic", link = true },
    { name = "fir", link = true },
    { name = "resample", link = true },
]
extra_link_libs = ["m"]
create_args = [
    { name = "norm_freq", type = "double", default = "0.0" },
    { name = "rate", type = "double", default = "0.25" },
]

[[module.ddc_fn.methods]]
name = "execute"
fn = "ddcr_execute"
returns = "float _Complex[]"
nogil = true
args = [
    { name = "x", type = "float[]" },
    { name = "out", type = "float _Complex[]", writable = true },
]

[[module.ddc_fn.methods]]
name = "reset"
fn = "ddcr_reset"

# norm_freq is live-writable (ddcr_set_norm_freq retunes the LO cheaply); rate is
# read-only (fixed at construction). Per-field getters (jm#320) + writable_fn
# (jm#316) compose on one getters block.
[[module.ddc_fn.getters]]
fields = [
    { name = "norm_freq", getter = "ddcr_get_norm_freq", type = "double", writable_fn = "ddcr_set_norm_freq" },
    { name = "rate", getter = "ddcr_get_rate", type = "double" },
]

[module.analyzer]
objects = ["specan"]
# Specan composes the Ddc cascade + the PSD averaging-PSD core; specan.toml's
# depends_on link=true (gh-225) links every composed OBJECT core into the
# analyzer .so (and, after the jm#271 CMakeLists reconcile, specan's own C
# test/bench). Only the non-component libm remains here.
extra_link_libs = ["m"]

[module.resample]
objects = ["Resampler", "HalfbandDecimator", "cic", "RateConverter"]
extra_types = ["HalfbandDecimatorDp", "HalfbandDecimatorR2C"]
# Composed cores reach the resample .so via per-object depends_on link=true
# (gh-225): RateConverter → resamp/fir, HalfbandDecimator → hbdecim/hbdecim_r2c
# (the latter for the HalfbandDecimatorR2C extra_type). cic is in-module and
# resample_core is the module's own core (both auto-linked). Only the
# non-component libm remains here.
extra_link_libs = ["m"]

