[build-system]
requires = ["just-buildit", "numpy"]
build-backend = "just_buildit"

[project]
name = "doppler"
version = "0.3.0"
description = "TODO: describe your project."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
]

[tool.just-buildit]
command = "make just-build"
editable_path = "src"

[tool.pytest.ini_options]
python_files = ["test_*.py", "bench_*.py"]
testpaths = ["src"]

[tool.uv.workspace]
members = ["src/specan", "src/cli"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=6.0",
    "scipy>=1.17.1",
    "zensical>=0.0.29",
    "mkdocstrings[python]>=0.29",
    "mkdoxy>=1.2.8",
    "pydantic>=2.0",
]
