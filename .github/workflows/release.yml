name: Release

# Triggered by pushing a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------------------------
  # Sanity check: tag version matches pyproject.toml
  # ------------------------------------------------------------------
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: get
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.2.1
          VERSION="${TAG#v}"                # e.g.   0.2.1
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check pyproject.toml matches tag
        run: |
          PY=$(grep '^version' pyproject.toml | head -1 | \
               sed 's/version = "\(.*\)"/\1/')
          TAG="${{ steps.get.outputs.version }}"
          if [ "$PY" != "$TAG" ]; then
            echo "ERROR: pyproject.toml version ($PY) != tag ($TAG)"
            echo "Run: make bump-version VERSION=$TAG"
            exit 1
          fi

      - name: Check Cargo.toml matches tag
        run: |
          CARGO=$(grep '^version' ffi/rust/Cargo.toml | head -1 | \
                  sed 's/version = "\(.*\)"/\1/')
          TAG="${{ steps.get.outputs.version }}"
          if [ "$CARGO" != "$TAG" ]; then
            echo "ERROR: Cargo.toml version ($CARGO) != tag ($TAG)"
            echo "Run: make bump-version VERSION=$TAG"
            exit 1
          fi

      - name: Check CMakeLists.txt matches tag
        run: |
          CMAKE=$(grep '^project' CMakeLists.txt | \
                  sed 's/.*VERSION \([0-9.]*\).*/\1/')
          TAG="${{ steps.get.outputs.version }}"
          if [ "$CMAKE" != "$TAG" ]; then
            echo "ERROR: CMakeLists.txt version ($CMAKE) != tag ($TAG)"
            echo "Run: make bump-version VERSION=$TAG"
            exit 1
          fi

      - name: Check python/specan/pyproject.toml matches tag
        run: |
          PY=$(grep '^version' python/specan/pyproject.toml | head -1 | \
               sed 's/version = "\(.*\)"/\1/')
          TAG="${{ steps.get.outputs.version }}"
          if [ "$PY" != "$TAG" ]; then
            echo "ERROR: python/specan/pyproject.toml version ($PY) != tag ($TAG)"
            echo "Run: make bump-version VERSION=$TAG"
            exit 1
          fi

      - name: Check python/cli/pyproject.toml matches tag
        run: |
          PY=$(grep '^version' python/cli/pyproject.toml | head -1 | \
               sed 's/version = "\(.*\)"/\1/')
          TAG="${{ steps.get.outputs.version }}"
          if [ "$PY" != "$TAG" ]; then
            echo "ERROR: python/cli/pyproject.toml version ($PY) != tag ($TAG)"
            echo "Run: make bump-version VERSION=$TAG"
            exit 1
          fi

  # ------------------------------------------------------------------
  # Build Python wheels
  #
  # doppler-dsp has C extensions built via cmake.  uv_build (the build
  # backend) produces a py3-none-any wheel that contains the compiled
  # .so files; scripts/retag_wheel.sh retags it to cpXYZ-cpXYZ and then
  # auditwheel bundles shared-lib deps and stamps the manylinux tag.
  #
  # Each Python version gets its own docker run so the .so suffix
  # (cpXYZ) matches the interpreter that will load it.
  #
  # Pure-Python workspace packages (specan, cli) and the sdist are
  # built once on the host runner at the end.
  # ------------------------------------------------------------------
  build-python:
    name: Build wheels (manylinux_2_28 x86_64)
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [cp312, cp313]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel (${{ matrix.python }}) in manylinux container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w /project \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -euxc "
              dnf install -y cmake zeromq-devel fftw-devel pkg-config
              make build
              PYTHON=/opt/python/${{ matrix.python }}-${{ matrix.python }}/bin/python
              \$PYTHON -m pip install --quiet numpy
              make pyext PYTHON_EXECUTABLE=\$PYTHON
              \$PYTHON -m pip install --quiet 'uv_build>=0.10.2,<0.11.0' build uv
              mkdir -p /tmp/wheel_out dist
              \$PYTHON -m build --no-isolation --wheel --outdir /tmp/wheel_out
              bash scripts/retag_wheel.sh \
                /tmp/wheel_out/doppler_dsp-*.whl dist/
            "

      - name: Upload wheel (${{ matrix.python }})
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ matrix.python }}
          path: dist/*.whl

  # ------------------------------------------------------------------
  # Build pure-Python workspace packages + sdist on the host runner
  # ------------------------------------------------------------------
  build-pure:
    name: Build pure-Python packages and sdist
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build sdist + specan + cli wheels
        run: |
          uv build --sdist --out-dir dist/
          uv build --package doppler-specan --out-dir dist/
          uv build --package doppler-cli --out-dir dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-pure
          path: dist/

  # ------------------------------------------------------------------
  # Publish to PyPI (uses trusted publishing — configure in PyPI)
  # ------------------------------------------------------------------
  publish-python:
    name: Publish to PyPI
    needs: [verify-version, build-python, build-pure]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------------------------------------------------
  # GitHub Release with auto-generated notes
  # ------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: [verify-version, build-python, build-pure, publish-python]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          merge-multiple: true
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            ## Install

            ```sh
            pip install doppler-dsp==${{ needs.verify-version.outputs.version }}
            pip install doppler-specan==${{ needs.verify-version.outputs.version }}
            pip install doppler-cli==${{ needs.verify-version.outputs.version }}
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
