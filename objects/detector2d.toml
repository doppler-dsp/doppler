[detector2d]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "CorrDetector2D"
depends_on = ["corr2d_core"]
serializable = "true"

[[detector2d.init_params]]
name = "ref"
type = "float _Complex[]"

[[detector2d.init_params]]
name = "dwell"
type = "size_t"
default = "1"

[[detector2d.init_params]]
name = "noise_lo"
type = "size_t"
default = "0"

[[detector2d.init_params]]
name = "noise_hi"
type = "size_t"
default = "ny*nx-1"
default_raw = "(unsigned long long)-1ULL"

[[detector2d.init_params]]
name = "noise_mode"
type = "string_enum:mean,median,min,max"
default = "mean"

[[detector2d.init_params]]
name = "threshold"
type = "float"
default = "0.0f"

[[detector2d.init_params]]
name = "nthreads"
type = "int"
default = "1"

[[detector2d.methods]]
name = "push"
arg_type = "float _Complex"
return_type = "det_result2d_t"
max_results = 64
result_fields = [{name = "row", type = "size_t"}, {name = "col", type = "size_t"}, {name = "peak_mag", type = "float"}, {name = "noise_est", type = "float"}, {name = "test_stat", type = "float"}]

[[detector2d.properties]]
name = "ny"
type = "size_t"
field = true

[[detector2d.properties]]
name = "nx"
type = "size_t"
field = true

[[detector2d.properties]]
name = "n"
type = "size_t"
field = true

[[detector2d.properties]]
name = "dwell"
type = "size_t"
expr = "self->handle->corr->dwell"

[[detector2d.properties]]
name = "count"
type = "size_t"
expr = "self->handle->corr->count"

[[detector2d.properties]]
name = "ring_cap"
type = "size_t"
field = true

[[detector2d.properties]]
name = "noise_lo"
type = "size_t"
field = true

[[detector2d.properties]]
name = "noise_hi"
type = "size_t"
field = true

[[detector2d.properties]]
name = "threshold"
type = "float"
field = true

[[detector2d.properties]]
name = "last_corr"
type = "float _Complex[]"
buf_field = "out_buf"
len_field = "n"
valid_field = "_last_corr_valid"
doc = "The correlation vector from the most recent push() that produced a result (None before that). This is a zero-copy view into a buffer owned by the detector and reused every push() -- the next push() (even one that doesn't produce a result) overwrites it in place. Copy the array before the next push() if you need to retain it."
