<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Square, full-bleed purple for apple-touch / maskable PWA icons (iOS
       rounds the corners; maskable crops to a safe centre). Mark sits inside
       the central ~66% safe zone. -->
  <rect width="512" height="512" fill="#673AB7"/>
  <g transform="translate(256,256) scale(0.66) translate(-256,-256)">
    <circle cx="206" cy="256" r="156" fill="none" stroke="#fff" stroke-width="46"/>
    <circle cx="238" cy="256" r="82"  fill="none" stroke="#fff" stroke-width="46"/>
    <circle cx="276" cy="256" r="60" fill="#fff"/>
  </g>
</svg>
