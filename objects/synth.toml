[synth]
arg_type = "void"
return_type = "float _Complex"
mutable = "true"
class_name = "Synth"
depends_on = ["lo", "awgn", "pn"]
impl = """
if (state->wtype >= SYNTH_PN) {
    if (state->sym_pos == 0) {
        if (state->wtype == SYNTH_QPSK) {
            uint8_t b0 = pn_step(state->pn);
            uint8_t b1 = pn_step(state->pn);
            const float s = 0.70710678118654752f;
            state->cur_re = b0 ? -s : s;
            state->cur_im = b1 ? -s : s;
        } else { /* pn or bpsk: +-1 */
            uint8_t b = pn_step(state->pn);
            state->cur_re = b ? -1.0f : 1.0f;
            state->cur_im = 0.0f;
        }
    }
    if (++state->sym_pos >= state->nsps)
        state->sym_pos = 0;
}
float complex sym = state->cur_re + state->cur_im * I;
float complex carrier = 1.0f + 0.0f * I;
if (state->lo)
    lo_steps(state->lo, 1, &carrier);
float complex noise = 0.0f + 0.0f * I;
if (state->awgn)
    awgn_generate(state->awgn, 1, &noise);
return sym * carrier + noise;
"""
create_impl = """
obj->wtype = type;
obj->nsps = (sps < 1) ? 1 : sps;
obj->sym_pos = 0;
obj->cur_re = (type == SYNTH_TONE) ? 1.0f : 0.0f;
obj->cur_im = 0.0f;

/* LO carrier for everything but pure noise (freq is Hz → cycles/sample) */
if (type != SYNTH_NOISE && freq != 0.0) {
    obj->lo = lo_create(fs != 0.0 ? freq / fs : 0.0);
    if (!obj->lo) {
        free(obj);
        return NULL;
    }
}

/* PN chip/data source for pn/bpsk/qpsk; poly 0 → MLS poly for the length */
if (type >= SYNTH_PN) {
    uint64_t poly = pn_poly ? pn_poly : synth_mls_poly((uint32_t)pn_length);
    if (poly == 0) { /* no MLS table entry for this length */
        if (obj->lo)
            lo_destroy(obj->lo);
        free(obj);
        return NULL;
    }
    obj->pn = pn_create(poly, seed ? seed : 1u, (uint32_t)pn_length, lfsr);
    if (!obj->pn) {
        if (obj->lo)
            lo_destroy(obj->lo);
        free(obj);
        return NULL;
    }
}

/* AWGN at the resolved SNR. snr_mode: 0 auto, 1 fs, 2 ebno, 3 esno.
 * Noise only when requested: type=noise always; else only when
 * snr < SYNTH_SNR_CLEAN (a clean waveform skips AWGN entirely). */
int want_noise = (type == SYNTH_NOISE) || (snr < SYNTH_SNR_CLEAN);
if (type == SYNTH_NOISE) {
    obj->awgn = awgn_create((uint64_t)seed, (float)(1.0 / 1.4142135623730951));
} else if (snr < SYNTH_SNR_CLEAN) {
    int mode = snr_mode;
    if (mode == 0)
        mode = (type >= SYNTH_BPSK) ? 3 : 1; /* *psk → esno, tone/pn → fs */
    int bps = (type == SYNTH_QPSK) ? 2 : 1;
    double snr_fs;
    if (mode == 2) /* Eb/No → SNR over fs */
        snr_fs = snr + 10.0 * log10((double)bps)
                 - 10.0 * log10((double)obj->nsps);
    else if (mode == 3) /* Es/No → SNR over fs (Es spans nsps samples) */
        snr_fs = snr - 10.0 * log10((double)obj->nsps);
    else /* over fs */
        snr_fs = snr;
    float amp = sqrtf(1.0f / (2.0f * powf(10.0f, (float)snr_fs / 10.0f)));
    obj->awgn = awgn_create((uint64_t)seed, amp);
}
if (want_noise && !obj->awgn) {
    if (obj->pn)
        pn_destroy(obj->pn);
    if (obj->lo)
        lo_destroy(obj->lo);
    free(obj);
    return NULL;
}
"""
reset_impl = """
state->sym_pos = 0;
state->cur_re = (state->wtype == SYNTH_TONE) ? 1.0f : 0.0f;
state->cur_im = 0.0f;
if (state->lo)
    lo_reset(state->lo);
if (state->awgn)
    awgn_reset(state->awgn);
if (state->pn)
    pn_reset(state->pn);
"""
destroy_impl = """
if (state->lo)
    lo_destroy(state->lo);
if (state->awgn)
    awgn_destroy(state->awgn);
if (state->pn)
    pn_destroy(state->pn);
"""

[[synth.state]]
name = "lo"
type = "lo_state_t *"
opaque = true

[[synth.state]]
name = "awgn"
type = "awgn_state_t *"
opaque = true

[[synth.state]]
name = "pn"
type = "pn_state_t *"
opaque = true

[[synth.state]]
name = "wtype"
type = "int"
default = "0"

[[synth.state]]
name = "nsps"
type = "int"
default = "8"

[[synth.state]]
name = "sym_pos"
type = "int"
default = "0"

[[synth.state]]
name = "cur_re"
type = "float"
default = "1.0f"

[[synth.state]]
name = "cur_im"
type = "float"
default = "0.0f"

[[synth.init_params]]
name = "type"
type = "string_enum:tone,noise,pn,bpsk,qpsk"
default = "tone"

[[synth.init_params]]
name = "fs"
type = "double"
default = "1000000.0"

[[synth.init_params]]
name = "freq"
type = "double"
default = "0.0"

[[synth.init_params]]
name = "snr"
type = "double"
default = "100.0"

[[synth.init_params]]
name = "snr_mode"
type = "string_enum:auto,fs,ebno,esno"
default = "auto"

[[synth.init_params]]
name = "seed"
type = "uint32_t"
default = "1"

[[synth.init_params]]
name = "sps"
type = "int"
default = "8"

[[synth.init_params]]
name = "pn_length"
type = "int"
default = "7"

[[synth.init_params]]
name = "pn_poly"
type = "uint64_t"
default = "0"

[[synth.init_params]]
name = "lfsr"
type = "string_enum:galois,fibonacci"
default = "galois"
