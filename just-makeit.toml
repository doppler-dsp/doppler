include = ["objects/*.toml"]

[project]
jm_version = "0.19.0"
name = "doppler"
version = "0.1.0"
build = "cmake"
# doppler does not target Windows (signal-processing users run WSL2/VM/container
# — see docs). Omitting "windows" drops jm's per-component MinGW DLL-copy
# boilerplate (jm-gh-213); the drift gate treats its absence as correct.
platforms = ["linux", "macos"]
perf = "true"
pytest = "true"
pytest_benchmark = "true"
schema = "6"
c_deps = ["hbdecim", "resamp", "wfmcompose"]
status_allow = ["zensical.toml"]

[module.cvt]
objects = ["f32_to_i16", "i16_to_f32", "i32_to_f32", "i8_to_f32", "f32_to_i16u32", "f32_to_i16u64", "i16u32_to_f32", "i16u64_to_f32", "f32_to_uq15", "uq15_to_f32", "adc"]

[module.accumulator]
objects = ["acc_f32", "acc_cf64", "acc_trace"]

[module.filter]
objects = ["fir", "hbdecim_q15"]

[module.source]
objects = ["nco", "lo", "awgn"]
extra_link_libs = ["$<$<PLATFORM_ID:Linux>:mvec>"]

[module.wfm]
objects = ["pn", "wfm_synth"]
extra_link_libs = ["lo_core", "awgn_core"]

# Fold the hand-written composition / I/O surface into doppler.wfm so the whole
# subsystem has one import path (D7). The Python `Synth` (a thin wrapper in
# compose.py over the C engine) is re-exported AFTER the C-extension import, so
# it shadows the raw engine type — the public doppler.wfm.Synth is the wrapper
# (its get_*/set_* engine accessors stay internal, D9).
[module.wfm.reexports]
compose = ["Synth", "tone", "bpsk", "qpsk", "pn", "noise", "bits", "Segment", "Timeline", "Composer", "Writer", "Reader", "ZmqSink", "SampleClock", "sigmf_meta", "write_blue_header", "rrc_taps", "dsss_spread", "mls_poly"]
readback = ["read_iq"]

[[module.wfm.functions]]
name = "bpsk_map"
doc = "Map bits {0,1} to BPSK symbols {+1,-1} (cf32)."
out_type = "float _Complex"

[[module.wfm.functions.params]]
name = "bits"
type = "uint8_t[]"

[[module.wfm.functions]]
name = "qpsk_map"
doc = "Map QPSK symbol indices {0,1,2,3} to Gray-coded symbols (cf32)."
out_type = "float _Complex"

[[module.wfm.functions.params]]
name = "syms"
type = "uint8_t[]"

[[module.wfm.functions]]
name = "wfm_awgn_amplitude"
doc = "AWGN amplitude for a target SNR (dB, over fs) given signal power."
return_type = "float"

[[module.wfm.functions.params]]
name = "snr_db"
type = "float"

[[module.wfm.functions.params]]
name = "signal_power"
type = "float"

[[module.wfm.functions]]
name = "wfm_ebno_to_snr_db"
doc = "Convert Eb/No (dB) to SNR (dB over fs)."
return_type = "float"

[[module.wfm.functions.params]]
name = "ebno_db"
type = "float"

[[module.wfm.functions.params]]
name = "bits_per_symbol"
type = "int"

[[module.wfm.functions.params]]
name = "samples_per_symbol"
type = "float"
[module.delay]
objects = ["delay"]

[module.spectral]
objects = ["fft", "fft2d", "corr", "corr2d", "detector", "detector2d", "welch"]
# welch_core depends on acc_trace_core (the AccTrace averager it composes); its
# OBJECT symbols must be linked into the spectral extension module explicitly.
extra_link_libs = ["acc_trace_core"]

[[module.spectral.functions]]
name = "kaiser_enbw"
return_type = "float"

[[module.spectral.functions.params]]
name = "w"
type = "float[]"

[[module.spectral.functions]]
