# Auto-lint/format for hand-written code and docs.
#
# doppler is a just-makeit poster child: the .pyi stubs, per-module `*_ext.c`
# binding aggregators, `native/inc/**` headers (jm injects the public decls),
# and per-module `CMakeLists.txt` are GENERATED and their formatting is owned by
# just-makeit — enforced by the `jm status --check` manifest-drift gate. A
# formatter that rewrites those would fight the gate, so they are excluded here.
# Everything hand-owned — `_core.c`, `*_ext_<obj>.c` fragments, the app, tests,
# benchmarks, examples, c_deps, hand Python, and docs — is formatted normally.
#
# clang-format tracks the latest release (kept in lockstep with the dev-machine
# version via `pre-commit autoupdate`). jm-generated glue is excluded below, so
# the formatter only sees hand-owned C — its version need not match jm's, and the
# manifest-drift gate (which checks jm's own output) is unaffected.

# Shared exclusion of jm-generated C glue + vendored third-party.
exclude: '^vendor/|^docs/c-api/'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.8
    hooks:
      - id: clang-format
        types_or: [c]
        # native/inc/** = jm-injected public decls; *_ext.c = jm aggregators.
        # Both are regenerated by `jm apply`; clang-formatting them drifts the
        # manifest gate. The hand-owned _core.c / _ext_<obj>.c fragments ARE
        # formatted (jm never rewrites those). The vendored FFT cores
        # (Reinecke pocketfft / Pommier PFFFT) live under vendor/ and are
        # excluded globally above — kept pristine.
        exclude: '^native/inc/|_ext\.c$'

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        # Generated, not hand-written: docs/c-api is mkdoxy from the C headers;
        # docs/benchmarks.md is `make bench-docs` output (mdformat would realign
        # its tables on every regen → spurious diffs). Archived docs under
        # docs/**/archive/ are frozen snapshots — not reformatted (and one trips
        # a plugin render-consistency bug across mdformat-gfm versions).
        exclude: '^docs/(c-api/|benchmarks\.md$)|^docs/.*/archive/'
        additional_dependencies:
          - mdformat-gfm
          - mdformat-gfm-alerts
          - mdformat-mkdocs

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        # mkdocs.yml uses mkdocs-material's `!!python/name:` YAML tags; --unsafe
        # checks syntax only (the custom constructors aren't resolvable here).
        args: [--unsafe]
        # Helm chart templates are Go templates, not parseable as plain YAML.
        exclude: '^deploy/pipeline/templates/'
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
        # generated glue is byte-owned by jm; don't let whitespace fixers drift it
        exclude: '\.pyi$|^native/inc/|_ext\.c$|^native/src/[^/]+/CMakeLists\.txt$'
      - id: trailing-whitespace
        exclude: '\.pyi$|^native/inc/|_ext\.c$|^native/src/[^/]+/CMakeLists\.txt$'

  - repo: local
    hooks:
      # Push-stage only — needs compile_commands.json (cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON).
      # Excludes match clang-format: jm-generated headers/aggregators and vendored code
      # are already covered by the global exclude; add the per-component ext.c glue here.
      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy
        language: system
        types_or: [c]
        exclude: '^native/inc/|_ext\.c$'
        stages: [pre-push]

      # Generated-doc drift: the `## Related pages` blocks (docs/api/*.md),
      # README body (from docs/index.md), and install scripts (from jb.toml) are
      # machine-generated by `make docs-relink`. Editing a source without
      # regenerating is the #1 way the Docs CI job goes red — this catches it at
      # commit time. Fast, no build; scoped to the files that can cause drift.
      # (The coverage / build / link gates need the built extension + site and
      # stay in CI + `make docs-check`.) If this trips: run `make docs-relink`.
      - id: docs-drift
        name: docs-drift (related-pages / README / install-scripts)
        entry: >-
          bash -c 'uv run python scripts/gen_related_pages.py --check &&
                   uv run python scripts/gen_readme.py --check &&
                   uv run python scripts/gen_install_scripts.py --check'
        language: system
        pass_filenames: false
        files: '^(docs/.*\.md|docs/index\.md|jb\.toml)$'
