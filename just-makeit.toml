[project]
name = "doppler"
version = "0.1.0"
build = "cmake"
perf = "true"
pytest = "true"
pytest_benchmark = "true"
schema = "6"
c_deps = ["hbdecim", "resamp"]

[module.accumulator]
objects = ["acc_f32", "acc_cf64"]

[module.filter]
objects = ["fir"]

[module.source]
objects = ["nco", "lo"]

[module.delay]
objects = ["delay"]

[module.spectral]
objects = ["fft", "fft2d", "corr", "corr2d", "detector", "detector2d"]

[[module.spectral.functions]]
name = "kaiser_enbw"
return_type = "float"
params = [{name = "w", type = "float[]"}]

[[module.spectral.functions]]
name = "kaiser_window"
params = [{name = "w", type = "float[]", out = true}, {name = "beta", type = "float"}]

[[module.spectral.functions]]
name = "hann_window"
params = [{name = "w", type = "float[]", out = true}]

[[module.spectral.functions]]
name = "magnitude_db_cf32"
out_type = "float"
params = [{name = "in", type = "float _Complex[]"}, {name = "lin_floor", type = "float"}, {name = "offset_db", type = "float"}]

[[module.spectral.functions]]
name = "magnitude_db_cf64"
out_type = "float"
params = [{name = "in", type = "double _Complex[]"}, {name = "lin_floor", type = "double"}, {name = "offset_db", type = "float"}]

[[module.spectral.functions]]
name = "find_peaks_f32"
return_type = "dp_peak_t"
max_results_param = "n_peaks"
result_fields = [{name = "freq_norm", type = "float"}, {name = "amplitude_db", type = "float"}]
params = [{name = "db", type = "float[]"}, {name = "n_peaks", type = "size_t"}, {name = "min_db", type = "float"}]

[module.buffer]
no_generate = "true"

[module.stream]
no_generate = "true"

[module.ddc]
no_generate = "true"

[module.resample]
objects = ["Resampler", "HalfbandDecimator"]

[[module.resample.functions]]
name = "kaiser_beta"
return_type = "double"
params = [{name = "atten", type = "double"}]

[[module.resample.functions]]
name = "kaiser_num_taps"
return_type = "int"
params = [{name = "num_phases", type = "int"}, {name = "atten", type = "double"}, {name = "pb", type = "double"}, {name = "sb", type = "double"}]

[module.detection]
objects = []

[[module.detection.functions]]
name = "marcum_q"
return_type = "double"
params = [{name = "m", type = "int"}, {name = "a", type = "double"}, {name = "b", type = "double"}]

[[module.detection.functions]]
name = "det_threshold"
return_type = "double"
params = [{name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_pd"
return_type = "double"
params = [{name = "snr", type = "double"}, {name = "dwell", type = "int"}, {name = "threshold", type = "double"}]

[[module.detection.functions]]
name = "det_dwell"
return_type = "int"
params = [{name = "snr", type = "double"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}, {name = "max_dwell", type = "int"}]

[[module.detection.functions]]
name = "det_snr"
return_type = "double"
params = [{name = "dwell", type = "int"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_threshold_power"
return_type = "double"
params = [{name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_pd_power"
return_type = "double"
params = [{name = "snr_power", type = "double"}, {name = "dwell", type = "int"}, {name = "power_threshold", type = "double"}]

[[module.detection.functions]]
name = "det_dwell_power"
return_type = "int"
params = [{name = "snr_power", type = "double"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}, {name = "max_dwell", type = "int"}]

[[module.detection.functions]]
name = "det_snr_power"
return_type = "double"
params = [{name = "dwell", type = "int"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}]

[module.agc]
objects = ["agc"]

[module.util]
objects = []

[[module.util.functions]]
name = "square_clip"
doc = "Square-clip a complex sample: clip the real and imaginary parts independently to [-lin, lin] (a square region in the IQ plane)."
return_type = "float _Complex"
params = [{name = "y", type = "float _Complex"}, {name = "lin", type = "float"}]

[acc_f32]
arg_type = "float"
return_type = "void"
mutable = "true"
no_state = "false"
no_step = "false"

[[acc_f32.state]]
name = "acc"
type = "float"
default = "0.0f"

[[acc_f32.methods]]
name = "get"
arg_type = "void"
return_type = "float"

[[acc_f32.methods]]
name = "dump"
arg_type = "void"
return_type = "float"

[[acc_f32.methods]]
name = "madd"
arg_type = "void"
return_type = "void"
params = [{name = "x", type = "float[]"}, {name = "h", type = "float[]"}]

[[acc_f32.methods]]
name = "add2d"
arg_type = "void"
return_type = "void"
params = [{name = "x", type = "float[]"}]

[[acc_f32.methods]]
name = "madd2d"
arg_type = "void"
return_type = "void"
params = [{name = "x", type = "float[]"}, {name = "h", type = "float[]"}]

[acc_cf64]
arg_type = "double _Complex"
return_type = "void"
mutable = "true"
no_state = "false"
no_step = "false"

[[acc_cf64.state]]
name = "acc"
type = "double _Complex"
default = "0.0 + 0.0 * I"

[[acc_cf64.methods]]
name = "get"
arg_type = "void"
return_type = "double _Complex"

[[acc_cf64.methods]]
name = "dump"
arg_type = "void"
return_type = "double _Complex"

[[acc_cf64.methods]]
name = "madd"
arg_type = "void"
return_type = "void"
params = [{name = "x", type = "double _Complex[]"}, {name = "h", type = "float[]"}]

[[acc_cf64.methods]]
name = "add2d"
arg_type = "void"
return_type = "void"
params = [{name = "x", type = "double _Complex[]"}]

[[acc_cf64.methods]]
name = "madd2d"
arg_type = "void"
return_type = "void"
params = [{name = "x", type = "double _Complex[]"}, {name = "h", type = "float[]"}]

[fir]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
