[[module.wfm.functions.params]]
name = "syms"
type = "uint8_t[]"

[[module.wfm.functions]]
name = "wfm_awgn_amplitude"
doc = "AWGN amplitude for a target SNR (dB, over fs) given signal power."
return_type = "float"

[[module.wfm.functions.params]]
name = "snr_db"
type = "float"

[[module.wfm.functions.params]]
name = "signal_power"
type = "float"

[[module.wfm.functions]]
