[wfm_synth]
arg_type = "void"
return_type = "float _Complex"
mutable = "true"
class_name = "_SynthEngine"
depends_on = [{ name = "lo", link = true }, { name = "awgn", link = true }, "pn", { name = "fir", link = true }]
impl = """
float complex sym;
if (state->wtype == WFM_SYNTH_BITS) {
    /* User bit pattern, oversampled sps and cycled to fill the request. The
     * symbol latch mirrors the PN path but sources bits from bits[bit_idx]
     * instead of the LFSR; bit_mod picks the mapping. */
    if (state->sym_pos == 0 && state->bits && state->n_bits) {
        if (state->bit_mod == 2) { /* qpsk: 2 bits/symbol, Gray-mapped */
            uint8_t b0 = state->bits[state->bit_idx];
            uint8_t b1 = state->bits[(state->bit_idx + 1) % state->n_bits];
            const float s = 0.70710678118654752f;
            state->cur_re = b0 ? -s : s;
            state->cur_im = b1 ? -s : s;
            state->bit_idx = (state->bit_idx + 2) % state->n_bits;
        } else if (state->bit_mod == 1) { /* bpsk: 0->+1, 1->-1 */
            state->cur_re = state->bits[state->bit_idx] ? -1.0f : 1.0f;
            state->cur_im = 0.0f;
            state->bit_idx = (state->bit_idx + 1) % state->n_bits;
        } else { /* none: unmodulated 0/1 amplitude */
            state->cur_re = state->bits[state->bit_idx] ? 1.0f : 0.0f;
            state->cur_im = 0.0f;
            state->bit_idx = (state->bit_idx + 1) % state->n_bits;
        }
    }
    if (++state->sym_pos >= state->nsps)
        state->sym_pos = 0;
    sym = state->cur_re + state->cur_im * I; /* bits: no pulse shaping */
} else if (state->wtype >= WFM_SYNTH_PN && state->wtype <= WFM_SYNTH_QPSK) {
    if (state->sym_pos == 0) {
        if (state->wtype == WFM_SYNTH_QPSK) {
            uint8_t b0 = pn_step(state->pn);
            uint8_t b1 = pn_step(state->pn);
            const float s = 0.70710678118654752f;
            state->cur_re = b0 ? -s : s;
            state->cur_im = b1 ? -s : s;
        } else { /* pn or bpsk: +-1 */
            uint8_t b = pn_step(state->pn);
            state->cur_re = b ? -1.0f : 1.0f;
            state->cur_im = 0.0f;
        }
    }
    if (state->fir) {
        /* RRC pulse shaping: feed the symbol-rate impulse train (the held
         * symbol at a boundary, zero between) through the matched FIR. The
         * FIR carries its delay line across calls, so this is chunk-invariant
         * — step() and the block path agree bit-for-bit. */
        float complex imp = (state->sym_pos == 0)
                                ? (state->cur_re + state->cur_im * I)
                                : (0.0f + 0.0f * I);
        fir_execute(state->fir, &imp, 1, &sym);
    } else {
        sym = state->cur_re + state->cur_im * I; /* rect sample-and-hold */
    }
    if (++state->sym_pos >= state->nsps)
        state->sym_pos = 0;
} else {
    sym = state->cur_re + state->cur_im * I;
}
float complex carrier = 1.0f + 0.0f * I;
if (state->lo) {
    lo_steps(state->lo, 1, &carrier);
} else if (state->wtype == WFM_SYNTH_CHIRP) {
    /* Sweeping carrier: f(n) = f0 + k*n (normalised cycles/sample), held at
     * f_end once the span is reached. Phase accumulates in cycles, wrapped to
     * [0,1) each step so the double keeps precision over a long sweep. The
     * fused sym*carrier + noise below is the *same* expression the tone path
     * (and wfm_synth_steps) uses, so step()/steps() stay byte-identical. */
    double nf = (state->chirp_span && state->chirp_n >= state->chirp_span)
                    ? (double)state->chirp_span
                    : (double)state->chirp_n;
    double w   = state->chirp_f0 + state->chirp_k * nf;
    carrier    = cexpf((float)(6.283185307179586 * state->chirp_ph) * I);
    state->chirp_ph += w;
    state->chirp_ph -= floor(state->chirp_ph);
    state->chirp_n++;
}
float complex noise = 0.0f + 0.0f * I;
if (state->awgn)
    awgn_generate(state->awgn, 1, &noise);
return sym * carrier + noise;
"""
create_impl = """
obj->wtype = type;
obj->nsps = (sps < 1) ? 1 : sps;
obj->sym_pos = 0;
obj->cur_re = (type == WFM_SYNTH_TONE || type == WFM_SYNTH_CHIRP) ? 1.0f : 0.0f;
obj->cur_im = 0.0f;
obj->fir = NULL; /* RRC pulse-shaping FIR, attached via set_rrc() */

/* Chirp: store the normalised start/end frequencies (freq is the start, i.e.
 * the instantaneous frequency at t=0). The per-sample slope chirp_k locks once
 * the sweep span is known — from wfm_synth_set_chirp_span() (composer/CLI, span
 * = the segment length) or the first wfm_synth_steps() call (standalone). */
obj->chirp_f0 = (fs != 0.0) ? freq / fs : 0.0;
obj->chirp_fend = (fs != 0.0) ? f_end / fs : 0.0;
obj->chirp_k = 0.0;
obj->chirp_ph = 0.0;
obj->chirp_n = 0;
obj->chirp_span = 0;

/* LO carrier for everything but pure noise (freq is Hz → cycles/sample).
 * Chirp synthesises its own swept carrier, so it never builds a static LO. */
if (type != WFM_SYNTH_NOISE && type != WFM_SYNTH_CHIRP && freq != 0.0) {
    obj->lo = lo_create(fs != 0.0 ? freq / fs : 0.0);
    if (!obj->lo) {
        free(obj);
        return NULL;
    }
}

/* Bit-pattern state — the array itself is attached after create() via
 * wfm_synth_set_bits() (the pattern is variable-length, not a ctor scalar). */
obj->bits = NULL;
obj->n_bits = 0;
obj->bit_idx = 0;
obj->bit_mod = 1; /* default bpsk; overridden by set_bits */

/* PN chip/data source for pn/bpsk/qpsk; poly 0 → MLS poly for the length */
if (type >= WFM_SYNTH_PN && type <= WFM_SYNTH_QPSK) {
    uint64_t poly = pn_poly ? pn_poly : wfm_synth_mls_poly((uint32_t)pn_length);
    if (poly == 0) { /* no MLS table entry for this length */
        if (obj->lo)
            lo_destroy(obj->lo);
        free(obj);
        return NULL;
    }
    obj->pn = pn_create(poly, seed ? seed : 1u, (uint32_t)pn_length, lfsr);
    if (!obj->pn) {
        if (obj->lo)
            lo_destroy(obj->lo);
        free(obj);
        return NULL;
    }
}

/* AWGN at the resolved SNR. snr_mode: 0 auto, 1 fs, 2 ebno, 3 esno.
 * Noise only when requested: type=noise always; else only when
 * snr < WFM_SYNTH_SNR_CLEAN (a clean waveform skips AWGN entirely). */
int want_noise = (type == WFM_SYNTH_NOISE) || (snr < WFM_SYNTH_SNR_CLEAN);
if (type == WFM_SYNTH_NOISE) {
    obj->awgn = awgn_create((uint64_t)seed, (float)(1.0 / 1.4142135623730951));
} else if (snr < WFM_SYNTH_SNR_CLEAN) {
    int mode = snr_mode;
    if (mode == 0)
        mode = (type == WFM_SYNTH_BPSK || type == WFM_SYNTH_QPSK)
                   ? 3
                   : 1; /* *psk → esno; tone/pn/chirp/bits → fs */
    int bps = (type == WFM_SYNTH_QPSK) ? 2 : 1;
    double snr_fs;
    if (mode == 2) /* Eb/No → SNR over fs */
        snr_fs = snr + 10.0 * log10((double)bps)
                 - 10.0 * log10((double)obj->nsps);
    else if (mode == 3) /* Es/No → SNR over fs (Es spans nsps samples) */
        snr_fs = snr - 10.0 * log10((double)obj->nsps);
    else /* over fs */
        snr_fs = snr;
    float amp = sqrtf(1.0f / (2.0f * powf(10.0f, (float)snr_fs / 10.0f)));
    obj->awgn = awgn_create((uint64_t)seed, amp);
}
if (want_noise && !obj->awgn) {
    if (obj->pn)
        pn_destroy(obj->pn);
    if (obj->lo)
        lo_destroy(obj->lo);
    free(obj);
    return NULL;
}
"""
reset_impl = """
state->sym_pos = 0;
state->cur_re = (state->wtype == WFM_SYNTH_TONE
                || state->wtype == WFM_SYNTH_CHIRP)
                   ? 1.0f
                   : 0.0f;
state->cur_im = 0.0f;
state->bit_idx = 0;    /* rewind the bit pattern to its start */
state->chirp_ph = 0.0; /* rewind the sweep; chirp_span/chirp_k stay locked */
state->chirp_n = 0;
if (state->lo)
    lo_reset(state->lo);
if (state->awgn)
    awgn_reset(state->awgn);
if (state->pn)
    pn_reset(state->pn);
if (state->fir)
    fir_reset(state->fir); /* clear the RRC delay line */
"""
destroy_impl = """
free(state->bits);
if (state->lo)
    lo_destroy(state->lo);
if (state->awgn)
    awgn_destroy(state->awgn);
if (state->pn)
    pn_destroy(state->pn);
if (state->fir)
    fir_destroy(state->fir);
"""
serializable = "true"

[[wfm_synth.state]]
name = "fir"
type = "fir_state_t *"
opaque = true

[[wfm_synth.state]]
name = "lo"
type = "lo_state_t *"
opaque = true

[[wfm_synth.state]]
name = "awgn"
type = "awgn_state_t *"
opaque = true

[[wfm_synth.state]]
name = "pn"
type = "pn_state_t *"
opaque = true

[[wfm_synth.state]]
name = "wtype"
type = "int"
default = "0"

[[wfm_synth.state]]
name = "nsps"
type = "int"
default = "8"

[[wfm_synth.state]]
name = "sym_pos"
type = "int"
default = "0"

[[wfm_synth.state]]
name = "cur_re"
type = "float"
default = "1.0f"

[[wfm_synth.state]]
name = "cur_im"
type = "float"
default = "0.0f"

[[wfm_synth.state]]
name = "chirp_f0"
type = "double"
opaque = true

[[wfm_synth.state]]
name = "chirp_fend"
type = "double"
opaque = true

[[wfm_synth.state]]
name = "chirp_k"
type = "double"
opaque = true

[[wfm_synth.state]]
name = "chirp_ph"
type = "double"
opaque = true

[[wfm_synth.state]]
name = "chirp_n"
type = "size_t"
opaque = true

[[wfm_synth.state]]
name = "chirp_span"
type = "size_t"
opaque = true

[[wfm_synth.state]]
name = "bits"
type = "uint8_t *"
opaque = true

[[wfm_synth.state]]
name = "n_bits"
type = "size_t"
opaque = true

[[wfm_synth.state]]
name = "bit_idx"
type = "size_t"
opaque = true

[[wfm_synth.state]]
name = "bit_mod"
type = "int"
opaque = true

[[wfm_synth.init_params]]
name = "type"
type = "string_enum:tone,noise,pn,bpsk,qpsk,chirp,bits"
default = "tone"

[[wfm_synth.init_params]]
name = "fs"
type = "double"
default = "1000000.0"

[[wfm_synth.init_params]]
name = "freq"
type = "double"
default = "0.0"

[[wfm_synth.init_params]]
name = "snr"
type = "double"
default = "100.0"

[[wfm_synth.init_params]]
name = "snr_mode"
type = "string_enum:auto,fs,ebno,esno"
default = "auto"

[[wfm_synth.init_params]]
name = "seed"
type = "uint32_t"
default = "1"

[[wfm_synth.init_params]]
name = "sps"
type = "int"
default = "8"

[[wfm_synth.init_params]]
name = "pn_length"
type = "int"
default = "7"

[[wfm_synth.init_params]]
name = "pn_poly"
type = "uint64_t"
default = "0"

[[wfm_synth.init_params]]
name = "lfsr"
type = "string_enum:galois,fibonacci"
default = "galois"

[[wfm_synth.init_params]]
name = "f_end"
type = "double"
default = "0.0"
