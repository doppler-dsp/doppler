[symsync]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "SymbolSync"
depends_on = [
  { name = "nco", link = true },
  { name = "farrow", link = true },
  { name = "loop_filter", link = true },
  { name = "lockdet", link = true },
  { name = "telemetry", link = true },
]
serializable = "true"

[[symsync.init_params]]
name = "sps"
type = "size_t"
default = "4"

[[symsync.init_params]]
name = "bn"
type = "double"
default = "0.01"

[[symsync.init_params]]
name = "zeta"
type = "double"
default = "0.707"

[[symsync.init_params]]
name = "order"
type = "string_enum:linear,parabolic,cubic"
default = "cubic"

[[symsync.init_params]]
name = "ted"
type = "string_enum:gardner,dttl"
default = "gardner"
doc = "Timing-error detector: \"gardner\" (blind, works for any constellation) or \"dttl\" (decision-directed sign-sign Data Transition Tracking Loop; lower self-noise near lock but degrades faster at low SNR. BPSK/QPSK only -- invalid for 8PSK/QAM)."

[[symsync.methods]]
name = "steps"
doc = "Recover symbol timing from an oversampled cf32 baseband block: a timing-error detector (Gardner or DTTL, see the `ted` param) drives an integer timing NCO whose post-wrap value gives the interpolation fraction for free, and a Farrow interpolator emits one symbol-rate sample per recovered symbol instant."
arg_type = "void"
return_type = "float _Complex"
variable_output = true
pass_capacity = true
nogil = true
params = [{ name = "x", type = "float _Complex[]" }]

# Telemetry attach (jm gh-432; mirrors objects/dll.toml): registers
# "<prefix>.e" / "<prefix>.freq" / "<prefix>.rate" / "<prefix>.lock" /
# "<prefix>.locked" (the last is the verify-counted lockdet decision, 0/1),
# emitted once per recovered symbol. None detaches; the int status binds ->
# None with ValueError on failure.
[[symsync.methods]]
name = "set_telemetry"
arg_type = "void"
return_type = "int"
status_return = true
params = [
  { name = "tlm", type = "dp_tlm_t *", capsule = "doppler.telemetry.dp_tlm", header = "telemetry/telemetry.h" },
  { name = "prefix", type = "const char *" },
  { name = "decim", type = "uint32_t", default = "1" },
]

[[symsync.methods]]
name = "configure"
doc = "Recompute the loop gains for a new (bn, zeta); preserve the timing estimate."
arg_type = "void"
return_type = "void"
params = [{ name = "bn", type = "double" }, { name = "zeta", type = "double" }]

[[symsync.methods]]
name = "configure_lock"
doc = "Tune the always-on timing-lock detector to a target (pfa, pd) at a given link operating point. The statistic is a Gardner-style eye-opening ratio, lock_signal = 2*(|on-time|^2-|mid-symbol|^2)/(|on-time|^2+|mid-symbol|^2), non-coherently block-averaged over avgs looks before each decision (mirroring Dll's tumbling-window CFAR pattern). avgs and the declare threshold are sized from a Gaussian approximation: a per-look mean is estimated from rolloff and esno_min_db, then the classic N = variance*((Q^-1(pfa)-Q^-1(pd))/mean)^2 / threshold = Q^-1(pfa)*mean/(Q^-1(pfa)-Q^-1(pd)) derivation gives (avgs, threshold). No level hysteresis by default (up=down=threshold, matching Dll.configure_lock's shape); n_up=1, n_down=8. Raises ValueError if pfa/pd are outside (0, 1) or pd does not exceed pfa. Read the result from the locked / lock_stat properties."
arg_type = "void"
return_type = "int"
status_return = true
params = [
  { name = "rolloff", type = "double" },
  { name = "esno_min_db", type = "double" },
  { name = "pfa", type = "double" },
  { name = "pd", type = "double" },
]

[[symsync.methods]]
name = "configure_lock_raw"
doc = "Escape hatch under configure_lock() for direct control of the lock detector's geometry: an explicit non-coherent block size (avgs), a split declare/drop threshold pair on lock_stat (level hysteresis), and both verify counts (time hysteresis) independently. Re-tuning clears the in-flight block sum and drops the lock so the next decision uses only looks gathered under the new config."
arg_type = "void"
return_type = "void"
params = [
  { name = "avgs", type = "size_t" },
  { name = "up_thresh", type = "double" },
  { name = "down_thresh", type = "double" },
  { name = "n_up", type = "uint32_t" },
  { name = "n_down", type = "uint32_t" },
]

[[symsync.methods]]
name = "reset"
doc = "Re-seed the timing loop to its nominal rate and zero phase."
arg_type = "void"
return_type = "void"

[[symsync.properties]]
name = "bn"
type = "double"
writable = true

[[symsync.properties]]
name = "timing_error"
type = "double"

[[symsync.properties]]
name = "rate"
type = "double"

[[symsync.properties]]
name = "lock_stat"
type = "double"
doc = "Last block-averaged lock statistic: mean(2*(|on-time|^2-|mid-symbol|^2)/(|on-time|^2+|mid-symbol|^2)) over the configured avgs looks; compare against the configured threshold (see configure_lock)."

[[symsync.properties]]
name = "locked"
type = "bool"
doc = "Current timing-lock decision: True after the verify count of consecutive above-threshold decisions, False again after the drop count of consecutive below-threshold ones (see configure_lock)."
