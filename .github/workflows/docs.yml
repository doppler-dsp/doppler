name: Docs

on:
  push:
    branches: [main]
  # Unfiltered so stacked PRs (non-main base) build docs too; the deploy job
  # is already gated on push-to-main.
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one deploy at a time; don't cancel in-progress deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Build — runs on every push and PR
  # ------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'

      - name: Install deps
        run: uv sync --group dev --group docs

      - name: Install doxygen
        run: sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Generate C API docs
        run: |
          uv run mkdocs build -f mkdocs-capi.yml
          cp -r .mkdoxy/doppler/c-api/. docs/c-api/
          rm -rf .mkdoxy .capi-site
          # mkdoxy doesn't generate index.md; restore the committed landing page
          git checkout -- docs/c-api/index.md

      - name: Build site
        run: uv run zensical build

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # ------------------------------------------------------------------
  # Deploy — only on push to main
  # ------------------------------------------------------------------
  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
