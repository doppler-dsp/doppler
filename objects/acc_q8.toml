[acc_q8]
arg_type = "int8_t"
return_type = "void"
mutable = "true"
class_name = "AccQ8"

[[acc_q8.state]]
name = "acc"
type = "int32_t"
default = "0"

[[acc_q8.methods]]
name = "get"
arg_type = "void"
return_type = "int32_t"
doc = "Return the current accumulated value without resetting."

[[acc_q8.methods]]
name = "dump"
arg_type = "void"
return_type = "int32_t"
doc = "Return the accumulated value and reset to zero."

[[acc_q8.methods]]
name = "madd"
arg_type = "void"
return_type = "void"
params = [{name = "a", type = "int8_t[]"}, {name = "b", type = "int8_t[]"}]
doc = "Multiply-accumulate: acc += sum(a[i] * b[i]) for i in [0, len(a))."
