# =============================================================================
# doppler — mkdocs-material documentation configuration
# (migrated from Zensical; the C API docs are still pre-generated separately via
#  `mkdocs build -f mkdocs-capi.yml` into docs/c-api/ — see the Makefile.)
# =============================================================================
site_name: doppler
site_description: Dead-simple, ultra-fast digital signal processing
site_url: https://doppler-dsp.github.io/doppler/
repo_url: https://github.com/doppler-dsp/doppler
repo_name: doppler-dsp/doppler
copyright: Copyright &copy; 2026 doppler contributors — MIT License
docs_dir: docs
site_dir: site

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  language: en
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - navigation.prune
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    # Dark mode first — preferred for a DSP / embedded dev audience.
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/doppler-dsp/doppler

plugins:
  - search
  - glightbox
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            # jm-generated .pyi ctors expose the internal --state fields while
            # the header-derived docstring documents the public init_params
            # (e.g. Synth: signature wtype/nsps/… vs documented type/fs/…), so
            # griffe flags every documented param as "not in the signature".
            # The runtime ctor *does* accept those params (bridged in C); this
            # is a known jm init_params/state stub gap, not a real mismatch.
            docstring_options:
              warn_unknown_params: false
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            allow_inspection: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

