# ============================================================================
# doppler — Zensical documentation configuration
# https://zensical.org/docs/
# ============================================================================

[project]
site_name        = "doppler"
site_description = "Dead-simple, ultra-fast digital signal processing"
site_url         = "https://doppler-dsp.github.io/doppler/"
repo_url         = "https://github.com/doppler-dsp/doppler"
copyright        = "Copyright &copy; 2026 doppler contributors — MIT License"
docs_dir         = "docs"
site_dir         = "site"

nav = [
  { "Home"            = "index.md"                    },
  { "Quick Start"     = "quickstart.md"               },
  { "Architecture"    = "architecture.md"             },
  { "Build & Install" = "build.md"                    },
  { "Examples" = [
    { "C"         = "examples/c.md"         },
    { "Python"    = "examples/python.md"    },
    { "Streaming" = "examples/streaming.md" },
  ]},
  { "C API Reference"   = "c-api/"                     },
  { "API: FFT"          = "api/python-fft.md"           },
  { "API: NCO / LO"     = "api/python-nco.md"           },
  { "API: FIR Filter"   = "api/python-filter.md"        },
  { "API: DDC"          = "api/python-ddc.md"           },
  { "API: Resample"     = "api/python-resample.md"      },
  { "API: Polyphase"    = "api/python-polyphase.md"     },
  { "API: Streaming"    = "api/python-streaming.md"     },
  { "API: Buffer"       = "api/python-buffer.md"        },
  { "API: Delay"        = "api/python-delay.md"         },
  { "API: Accumulator"  = "api/python-accumulator.md"   },
  { "Type System"       = "types.md"                    },
  { "Spectrum Analyzer" = "specan/"                     },
  { "CLI & Pipelines"   = "cli/"                        },
  { "Dopplerfile"       = "cli/dopplerfile.md"          },
  { "Contributing" = [
    { "Module Layout"   = "dev/module-layout.md"   },
    { "Adding a Module" = "dev/adding-a-module.md" },
    { "Release"         = "dev/release.md"         },
  ]},
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
logo     = "assets/logo.svg"
favicon  = "assets/logo.svg"
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# Dark mode first — preferred for a DSP / embedded dev audience
[[project.theme.palette]]
scheme      = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme      = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/doppler-dsp/doppler"

# ----------------------------------------------------------------------------
# mkdocstrings — auto-generate API reference from Python docstrings
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings.config]
default_handler = "python"

[project.plugins.mkdocstrings.config.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.config.handlers.python.options]
docstring_style            = "numpy"
show_source                = false
show_root_heading          = true
show_root_full_path        = false
show_symbol_type_heading   = true
show_symbol_type_toc       = true
members_order              = "source"
separate_signature         = true
show_signature_annotations = true
allow_inspection           = false

[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
