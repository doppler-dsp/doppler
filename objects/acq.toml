[acq]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "Acquisition"
serializable = "true"
# OBJECT-library object files do not propagate transitively through corr2d, so
# fft2d/fft must be linked explicitly (as the spectral module does) for the
# slow-time fft_create + corr2d FFTs. detection_core supplies det_threshold/
# det_pd for the auto-config. det_private.h / the detector2d header are
# header-only (statics + the enum) → no link line needed for them.
depends_on = [
    { name = "corr2d", link = true },
    { name = "fft2d", link = true },
    { name = "fft", link = true },
    { name = "detection", link = true },
]

# ── Construction: physics in, grid out ───────────────────────────────────────
# The user states the waveform, front end, and operating point in real units;
# the engine derives the whole search grid (coherent depth, threshold, looks).
# chip_rate / cn0_dbhz carry valid nonzero placeholder defaults so jm's auto-
# doctest builds a non-NULL object; acq_create still rejects an explicit 0.

[[acq.init_params]]
name = "code"
type = "uint8_t[]"

[[acq.init_params]]
name = "reps"
type = "size_t"
default = "1"

[[acq.init_params]]
name = "spc"
type = "size_t"
default = "4"

[[acq.init_params]]
name = "chip_rate"
type = "double"
default = "1000000.0"

[[acq.init_params]]
name = "cn0_dbhz"
type = "double"
default = "50.0"

[[acq.init_params]]
name = "doppler_uncertainty"
type = "double"
default = "0.0"

[[acq.init_params]]
name = "pfa"
type = "double"
default = "1e-3"

[[acq.init_params]]
name = "pd"
type = "double"
default = "0.9"

[[acq.init_params]]
name = "noise_mode"
type = "string_enum:mean,median,min,max"
default = "mean"

# Advanced: non-coherent look cap. 1 (default) = coherent-only; raise it to let
# auto-config add magnitude-summed looks when reps coherent alone can't reach pd.
[[acq.init_params]]
name = "max_noncoh"
type = "size_t"
default = "1"

# Continuous data-modulated signals: a data-bit transition landing mid-coherent
# -epoch splits the coherent sum -- a loss the physics above can't see. <= 0
# (default) keeps the legacy Doppler/code-phase-only search; > 0 switches to a
# joint (doppler_bins, n_noncoh) search that prices that loss honestly. See
# docs/guide/dsss-acquisition.md's "Continuous, data-modulated signals" section.
[[acq.init_params]]
name = "symbol_rate"
type = "double"
default = "0.0"

# Only meaningful with symbol_rate > 0. 0 (default) keeps the joint search's
# fewest-total-epochs objective (unchanged). > 0 floors doppler_bins at
# ceil(chip_rate/(sf*doppler_resolution)) and takes the first grid at or
# above that floor meeting pd -- trading the epoch-count guarantee for a
# resolution guarantee, and, critically, keeping construction cheap when reps
# is raised to reach a fine resolution (the unfloored search is a full
# reps x max_noncoh sweep of the data-modulation model's O(doppler_bins^2)
# cost, cubic in reps; anchoring at the floor touches only a handful of
# doppler_bins near it, independent of reps).
[[acq.init_params]]
name = "doppler_resolution"
type = "double"
default = "0.0"

# Only meaningful with symbol_rate > 0. 0 (default) assumes a static Doppler
# (no ceiling beyond reps). > 0 caps doppler_bins at the largest depth whose
# in-window Doppler drift stays under one resolution bin
# (doppler_bins < chip_rate/(sf*sqrt(doppler_rate))) -- tightens, never
# loosens, reps and any doppler_resolution floor.
[[acq.init_params]]
name = "doppler_rate"
type = "double"
default = "0.0"

[[acq.methods]]
name = "push"
arg_type = "float _Complex"
return_type = "acq_result_t"
nogil = true
max_results = 64
result_fields = [{name = "doppler_bin", type = "size_t"}, {name = "code_phase", type = "size_t"}, {name = "peak_mag", type = "float"}, {name = "noise_est", type = "float"}, {name = "test_stat", type = "float"}, {name = "cn0_dbhz_est", type = "float"}]

# Advanced escape hatch: pin the search grid directly, bypassing both
# auto-sizing searches (mirrors Dll's/Costas's configure_lock_raw()). Raises
# ValueError if doppler_bins is outside [1, reps] or n_noncoh outside
# [1, max_noncoh]. Resizes every grid-dependent buffer/plan and clears
# in-flight accumulation (ring contents, the non-coherent power accumulator) --
# call between push() calls, never a substitute for one.
[[acq.methods]]
name = "configure_search_raw"
doc = "Pin the search grid directly, bypassing both auto-sizing searches -- the advanced escape hatch (mirrors Dll.configure_lock_raw/Costas.configure_lock). Resizes every buffer/plan that depends on the grid (the slow-time FFT, the code correlator, the reference, and every per-frame scratch buffer), re-derives the threshold ladder for the pinned grid from the same physics __init__ used, and clears in-flight accumulation (ring contents, the non-coherent power accumulator, dwell bookkeeping) -- call between push() calls, never a substitute for one. Raises ValueError if doppler_bins is outside [1, reps] or n_noncoh is outside [1, max_noncoh]."
arg_type = "void"
return_type = "int"
status_return = true
params = [
  { name = "doppler_bins", type = "size_t" },
  { name = "n_noncoh", type = "size_t" },
]

# ── Read-back grid the engine derived ────────────────────────────────────────

[[acq.properties]]
name = "code_bins"
type = "size_t"
field = true
doc = "Code-phase hypotheses searched (= sf*spc, one code period)."

[[acq.properties]]
name = "doppler_bins"
type = "size_t"
field = true
doc = "Coherent depth chosen: the slow-time FFT length in code reps (<= reps)."

[[acq.properties]]
name = "sf"
type = "size_t"
field = true
doc = "Chips per PN segment, inferred from len(code)."

[[acq.properties]]
name = "spc"
type = "size_t"
field = true
doc = "Samples per chip (chip-rate oversample factor)."

[[acq.properties]]
name = "reps"
type = "size_t"
field = true
doc = "Max coherent code repetitions (the coherence ceiling)."

[[acq.properties]]
name = "n_noncoh"
type = "size_t"
field = true
doc = "Non-coherent looks per detection (1 = pure coherent)."

[[acq.properties]]
name = "ring_cap"
type = "size_t"
field = true
doc = "Input ring capacity in complex samples."

[[acq.properties]]
name = "noise_lo"
type = "size_t"
field = true
doc = "First CFAR reference bin (inclusive)."

[[acq.properties]]
name = "noise_hi"
type = "size_t"
field = true
doc = "Last CFAR reference bin (inclusive)."

[[acq.properties]]
name = "threshold"
type = "float"
field = true
doc = "CFAR gate on the test statistic (coherent path)."

[[acq.properties]]
name = "eta"
type = "float"
field = true
doc = "Raw per-cell Rayleigh amplitude threshold."

[[acq.properties]]
name = "eta_nc"
type = "float"
field = true
doc = "Non-coherent CFAR threshold (order-N_nc Marcum)."

[[acq.properties]]
name = "pfa_cell"
type = "double"
field = true
doc = "Bonferroni per-cell false-alarm probability over the searched cells."

[[acq.properties]]
name = "pd_predicted"
type = "double"
field = true
doc = "Predicted Pd at cn0_dbhz and the chosen grid: the average Pd over the straddle priors (slow-time scalloping, intra-segment rotation, code-phase sample offset - quadrature over uniform priors), matching what the Monte-Carlo characterization measures rather than the on-grid best case."

[[acq.properties]]
name = "straddle_loss"
type = "double"
field = true
doc = "Mean amplitude derating of the correlation peak from grid straddle (slow-time Doppler scalloping x intra-segment rotation x code-phase sample offset, each averaged over a uniform prior) - a diagnostic summary; 20*log10(straddle_loss) is the loss in dB. Sizing and pd_predicted average Pd itself over the priors (Pd at this mean amplitude would overstate the mean Pd)."

[[acq.properties]]
name = "fs"
type = "double"
field = true
doc = "Sample rate (Hz) = chip_rate * spc."

[[acq.properties]]
name = "chip_rate"
type = "double"
field = true
doc = "Chip rate (Hz)."

[[acq.properties]]
name = "cn0_dbhz"
type = "double"
field = true
doc = "Carrier-to-noise density used to size the search (dB-Hz)."

[[acq.properties]]
name = "doppler_span_hz"
type = "double"
field = true
doc = "Native unambiguous Doppler half-range = +/- chip_rate/(2*sf) Hz."

[[acq.properties]]
name = "doppler_res_hz"
type = "double"
field = true
doc = "Doppler bin width = chip_rate/(sf*doppler_bins) Hz."

[[acq.properties]]
name = "pd"
type = "double"
field = true
doc = "Target detection probability."

[[acq.properties]]
name = "underpowered"
type = "bool"
field = true
doc = "True when pd_predicted < pd (the search cannot meet the target)."

[[acq.properties]]
name = "symbol_rate"
type = "double"
field = true
doc = "Continuous data-symbol rate (Hz) used to size the search; 0 means the legacy Doppler/code-phase-only search (no known data-modulation clock)."

[[acq.properties]]
name = "epochs_per_symbol"
type = "double"
field = true
doc = "(chip_rate/sf)/symbol_rate -- code epochs per data symbol; 0 when symbol_rate is 0."

[[acq.properties]]
name = "doppler_resolution"
type = "double"
field = true
doc = "Desired Doppler-bin resolution (Hz) floored on the data-modulation search; 0 means no floor (the joint search minimizes total epochs outright). Compare against the achieved doppler_res_hz."

[[acq.properties]]
name = "doppler_rate"
type = "double"
field = true
doc = "Expected Doppler rate of change (Hz/s) capping the data-modulation search's coherent-depth ceiling; 0 means a static Doppler (no ceiling beyond reps)."
