[ddcr]
arg_type = "float"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "DDCR"
# ddcr_create / reset / destroy / execute live in ddc_core.c (shared with the
# Ddc object); ddcr_core.c only carries the execute_max_out hook. So the ddcr
# core/test/bench must link ddc_core. Bare string: ddcr's own targets only —
# the ddc .so already links ddc_core as the module core.
depends_on = ["ddc_core", "lo_core", "RateConverter_core", "resamp_core", "hbdecim_core", "hbdecim_r2c_core", "cic_core", "fir_core", "resample_core"]

[[ddcr.init_params]]
name = "norm_freq"
type = "double"
default = "0.0"

[[ddcr.init_params]]
name = "rate"
type = "double"
default = "0.25"

[[ddcr.methods]]
name = "execute"
doc = "Halfband R2C decimate, LO mix, then rate-convert."
arg_type = "void"
return_type = "float _Complex"
variable_output = true
pass_capacity = true
nogil = true
params = [{name = "x", type = "float[]"}]

[[ddcr.methods]]
name = "reset"
doc = "Zero halfband, LO phase, and filter history."
arg_type = "void"
return_type = "void"

[[ddcr.properties]]
name = "norm_freq"
type = "double"
writable = true

[[ddcr.properties]]
name = "rate"
type = "double"
