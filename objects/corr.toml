[corr]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "Corr"
depends_on = ["fft_core"]

[[corr.init_params]]
name = "ref"
type = "float _Complex[]"

[[corr.init_params]]
name = "dwell"
type = "size_t"
default = "1"

[[corr.init_params]]
name = "nthreads"
type = "int"
default = "1"

[[corr.methods]]
name = "execute"
arg_type = "float _Complex"
return_type = "float _Complex"
variable_output = true
none_on_empty = true

[[corr.properties]]
name = "n"
type = "size_t"
field = true

[[corr.properties]]
name = "dwell"
type = "size_t"
field = true

[[corr.properties]]
name = "count"
type = "size_t"
field = true
