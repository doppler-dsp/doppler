<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>doppler specan — live demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --accent:  #22d3ee;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --grid:    rgba(48,54,61,0.8);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: "JetBrains Mono", "Fira Mono", monospace;
    font-size: 12px;
    height: 100%;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;       /* fallback */
    height: 100dvh;      /* dynamic viewport — excludes browser chrome on mobile */
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* ── Canvas area ── */
  .canvas-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 8px;
    gap: 6px;
  }

  canvas {
    display: block;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
  }

  #spectrum  { flex: 3; min-height: 0; }
  #waterfall { flex: 2; min-height: 0; }

  .canvas-wrap { min-height: 0; }

  /* ── Controls bar ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .controls::-webkit-scrollbar { display: none; }

  .btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: inherit;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn:hover  { border-color: #22d3ee; color: var(--text); }
  .btn.active { border-color: #a855f7; color: #a855f7; }

  /* ── Footer ── */
  footer {
    padding: 4px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  footer a {
    color: var(--accent);
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
  .badge {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>doppler specan</h1>
  <span class="pill" id="sr-pill">Fs = —</span>
  <span class="pill" id="fc-pill">Fc = —</span>
  <span class="pill" id="fft-pill">FFT = —</span>
  <span class="pill" id="rbw-pill">RBW = —</span>
  <div class="status">
    <div class="dot"></div>
    <span id="fps-label">-- fps</span>
  </div>
</header>

<div class="controls">
  <button class="btn" id="chirp-btn">Chirp</button>
  <button class="btn" id="maxhold-btn">Max hold</button>
  <button class="btn" id="reset-btn">Reset</button>
  <span style="color:var(--muted);font-size:11px" id="mode-label">playback</span>
</div>

<div class="canvas-wrap">
  <canvas id="spectrum"></canvas>
  <canvas id="waterfall"></canvas>
</div>

<footer>
  <span>Recorded with
    <a href="https://doppler-dsp.github.io/doppler/" target="_blank">
      doppler
    </a>
    — NCO + Kaiser window + FFTW
  </span>
  <span id="frame-label"></span>
  <span class="badge">no server · no JS DSP · pure C output</span>
</footer>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let frames      = [];    // tone demo frames (frames.json)
let chirpFrames = [];    // chirp sweep frames (chirp_frames.json)
let chirpMaxHold = null; // pre-computed max-hold across all chirp frames

let frameIdx      = 0;
let chirpFrameIdx = 0;
let chirpEnabled  = false;

// Max-hold (user-toggled, live accumulation during playback)
let maxHoldEnabled = false;
let maxHold        = null;

// Load both datasets in parallel, start loop when tone frames are ready
Promise.all([
  fetch("frames.json").then(r => r.json()),
  fetch("chirp_frames.json").then(r => r.json()).catch(() => null),
]).then(([toneData, chirpData]) => {
  frames = toneData;
  if (chirpData) {
    chirpFrames = chirpData;
    // Pre-compute max-hold across all chirp frames
    const N = chirpFrames[0].db.length;
    chirpMaxHold = new Float32Array(N).fill(-Infinity);
    for (const f of chirpFrames) {
      for (let i = 0; i < N; i++) {
        if (f.db[i] > chirpMaxHold[i]) chirpMaxHold[i] = f.db[i];
      }
    }
  } else {
    // chirp_frames.json not yet recorded — hide button
    const btn = document.getElementById("chirp-btn");
    if (btn) btn.style.display = "none";
  }
  updatePills(frames[0]);
  startLoop();
}).catch(err => console.error("Failed to load frames:", err));

// ── Canvas setup ───────────────────────────────────────────────────────────
const specCanvas = document.getElementById("spectrum");
const wfCanvas   = document.getElementById("waterfall");
const specCtx    = specCanvas.getContext("2d");
const wfCtx      = wfCanvas.getContext("2d");

let wfImageData = null;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  for (const c of [specCanvas, wfCanvas]) {
    const r = c.getBoundingClientRect();
    c.width  = Math.round(r.width  * dpr);
    c.height = Math.round(r.height * dpr);
  }
  wfImageData = null;
}

const ro = new ResizeObserver(resize);
ro.observe(specCanvas);
ro.observe(wfCanvas);
resize();

// ── Waterfall colormap (dark blue → cyan → yellow → white) ────────────────
const REF_DBM   = 10;
const DB_RANGE  = 120;

function dbToColor(v) {
  const t = Math.max(0, Math.min(1, (v - (REF_DBM - DB_RANGE)) / DB_RANGE));
  let r, g, b;
  if (t < 0.25) {
    const s = t / 0.25;
    r = 0; g = 0; b = Math.round(s * 200);
  } else if (t < 0.5) {
    const s = (t - 0.25) / 0.25;
    r = 0; g = Math.round(s * 220); b = Math.round(200 + s * 55);
  } else if (t < 0.75) {
    const s = (t - 0.5) / 0.25;
    r = Math.round(s * 255); g = 220; b = Math.round(255 * (1 - s));
  } else {
    const s = (t - 0.75) / 0.25;
    r = 255; g = 220; b = Math.round(s * 255);
  }
  return [r, g, b];
}

// ── Spectrum draw ─────────────────────────────────────────────────────────
const TRACE_COLOR = "#22d3ee";
const FILL_TOP    = "rgba(34,211,238,0.25)";
const FILL_BOT    = "rgba(34,211,238,0.00)";

function fmtFreq(hz) {
  const a = Math.abs(hz);
  if (a >= 1e6) return `${(hz/1e6).toFixed(2)}M`;
  if (a >= 1e3) return `${(hz/1e3).toFixed(1)}k`;
  return `${hz.toFixed(0)}`;
}

function drawSpectrum(db, fsOut, centerFreq, holdTrace) {
  const W = specCanvas.width;
  const H = specCanvas.height;
  const N = db.length;
  const dpr = window.devicePixelRatio || 1;
  const PAD = { l: 52*dpr, r: 8*dpr, t: 8*dpr, b: 24*dpr };
  const pw = W - PAD.l - PAD.r;
  const ph = H - PAD.t - PAD.b;

  specCtx.clearRect(0, 0, W, H);

  // Grid
  specCtx.font = `${10*dpr}px "JetBrains Mono",monospace`;
  const nLines = DB_RANGE / 10;
  for (let i = 0; i <= nLines; i++) {
    const dbVal = REF_DBM - i * 10;
    const y = PAD.t + (i / nLines) * ph;
    specCtx.strokeStyle = "rgba(48,54,61,0.8)";
    specCtx.lineWidth = 1;
    specCtx.beginPath();
    specCtx.moveTo(PAD.l, y); specCtx.lineTo(W - PAD.r, y);
    specCtx.stroke();
    specCtx.fillStyle = "#8b949e";
    specCtx.textAlign = "right";
    specCtx.textBaseline = "middle";
    const lbl = dbVal >= 0 ? `+${dbVal}` : `${dbVal}`;
    specCtx.fillText(lbl, PAD.l - 4*dpr, y);
  }

  // Freq ticks
  specCtx.textBaseline = "top";
  specCtx.textAlign = "center";
  for (let i = 0; i <= 4; i++) {
    const frac = i / 4;
    const x = PAD.l + frac * pw;
    const freq = centerFreq + (frac - 0.5) * fsOut;
    specCtx.fillStyle = "#8b949e";
    specCtx.fillText(fmtFreq(freq), x, H - PAD.b + 4*dpr);
    specCtx.strokeStyle = "rgba(48,54,61,0.8)";
    specCtx.beginPath();
    specCtx.moveTo(x, PAD.t); specCtx.lineTo(x, H - PAD.b);
    specCtx.stroke();
  }

  const toX = i => PAD.l + (i / (N-1)) * pw;
  const toY = v => PAD.t + ((REF_DBM - v) / DB_RANGE) * ph;

  // Max-hold trace (behind live trace)
  if (holdTrace && holdTrace.length === N) {
    specCtx.strokeStyle = "#a855f7";
    specCtx.lineWidth   = 1 * dpr;
    specCtx.beginPath();
    for (let i = 0; i < N; i++) {
      const y = Math.max(PAD.t, Math.min(PAD.t + ph, toY(holdTrace[i])));
      if (i === 0) specCtx.moveTo(toX(i), y);
      else         specCtx.lineTo(toX(i), y);
    }
    specCtx.stroke();
  }

  // Fill
  const grad = specCtx.createLinearGradient(0, PAD.t, 0, PAD.t + ph);
  grad.addColorStop(0, FILL_TOP);
  grad.addColorStop(1, FILL_BOT);
  specCtx.fillStyle = grad;
  specCtx.beginPath();
  specCtx.moveTo(toX(0), H - PAD.b);
  for (let i = 0; i < N; i++) {
    specCtx.lineTo(toX(i), Math.max(PAD.t, Math.min(PAD.t+ph, toY(db[i]))));
  }
  specCtx.lineTo(toX(N-1), H - PAD.b);
  specCtx.closePath();
  specCtx.fill();

  // Line
  specCtx.strokeStyle = TRACE_COLOR;
  specCtx.lineWidth = 1.5 * dpr;
  specCtx.beginPath();
  for (let i = 0; i < N; i++) {
    const y = Math.max(PAD.t, Math.min(PAD.t+ph, toY(db[i])));
    if (i === 0) specCtx.moveTo(toX(i), y);
    else         specCtx.lineTo(toX(i), y);
  }
  specCtx.stroke();
}

// ── Waterfall draw ────────────────────────────────────────────────────────
function drawWaterfall(db) {
  const W = wfCanvas.width;
  const H = wfCanvas.height;
  const N = db.length;
  const dpr = window.devicePixelRatio || 1;
  // Same PAD as drawSpectrum — pixel-exact alignment guaranteed.
  const PAD = { l: 52*dpr, r: 8*dpr };
  const pw  = Math.round(W - PAD.l - PAD.r);

  // imageData covers the plot area only; putImageData offsets it into
  // position so the margin columns show the canvas CSS background.
  if (!wfImageData || wfImageData.width !== pw || wfImageData.height !== H) {
    wfImageData = wfCtx.createImageData(pw, H);
    wfCtx.clearRect(0, 0, W, H);
  }

  // Scroll down
  const rowBytes = pw * 4;
  wfImageData.data.copyWithin(rowBytes, 0, (H-1) * rowBytes);

  // New top row
  for (let x = 0; x < pw; x++) {
    const idx = Math.round((x / (pw-1)) * (N-1));
    const [r, g, b] = dbToColor(db[idx]);
    const px = x * 4;
    wfImageData.data[px]   = r;
    wfImageData.data[px+1] = g;
    wfImageData.data[px+2] = b;
    wfImageData.data[px+3] = 255;
  }
  wfCtx.putImageData(wfImageData, Math.round(PAD.l), 0);
}

// ── Playback loop ─────────────────────────────────────────────────────────
let fpsAcc = 0, fpsCnt = 0, fpsTs = performance.now();

function updatePills(f) {
  document.getElementById("sr-pill").textContent =
    `Fs = ${(f.fs_out/1e6).toFixed(3)} MHz`;
  document.getElementById("fc-pill").textContent =
    `Fc = ${(f.center_freq/1e6).toFixed(3)} MHz`;
  document.getElementById("fft-pill").textContent =
    `FFT = ${f.fft_size}`;
  document.getElementById("rbw-pill").textContent =
    `RBW = ${f.rbw >= 1000
        ? (f.rbw/1e3).toFixed(1)+"k"
        : f.rbw.toFixed(0)}Hz`;
}

function tick() {
  if (!frames.length) return;

  let f;
  if (chirpEnabled && chirpFrames.length) {
    f = chirpFrames[chirpFrameIdx];
    chirpFrameIdx = (chirpFrameIdx + 1) % chirpFrames.length;
    document.getElementById("frame-label").textContent =
      `chirp frame ${chirpFrameIdx + 1} / ${chirpFrames.length}`;
  } else {
    f = frames[frameIdx];
    frameIdx = (frameIdx + 1) % frames.length;
    document.getElementById("frame-label").textContent =
      `frame ${frameIdx + 1} / ${frames.length}`;
  }

  const { db, fs_out: fsOut, center_freq: centerFreq } = f;

  // Live max-hold accumulation (user-toggled)
  if (maxHoldEnabled) {
    if (!maxHold || maxHold.length !== db.length) {
      maxHold = new Float32Array(db);
    } else {
      for (let i = 0; i < db.length; i++) {
        if (db[i] > maxHold[i]) maxHold[i] = db[i];
      }
    }
  }

  // In chirp mode, always show the pre-computed full-sweep max-hold
  const holdTrace = chirpEnabled ? chirpMaxHold : maxHold;

  drawSpectrum(db, fsOut, centerFreq, holdTrace);
  drawWaterfall(db);

  fpsCnt++;
  const now = performance.now();
  if (now - fpsTs >= 500) {
    document.getElementById("fps-label").textContent =
      `${(fpsCnt / (now - fpsTs) * 1000).toFixed(1)} fps`;
    fpsCnt = 0;
    fpsTs  = now;
  }
}

function startLoop() {
  setInterval(tick, 1000 / 30);
}

// ── Buttons ───────────────────────────────────────────────────────────────
document.getElementById("chirp-btn").addEventListener("click", function() {
  chirpEnabled = !chirpEnabled;
  this.classList.toggle("active", chirpEnabled);
  document.getElementById("mode-label").textContent =
    chirpEnabled ? "chirp" : "playback";
  // Clear waterfall and max-hold when switching modes
  wfImageData = null;
  maxHold = null;
});

document.getElementById("maxhold-btn").addEventListener("click", function() {
  maxHoldEnabled = !maxHoldEnabled;
  this.classList.toggle("active", maxHoldEnabled);
  if (!maxHoldEnabled) maxHold = null;
});

document.getElementById("reset-btn").addEventListener("click", function() {
  maxHold = null;
});
</script>
</body>
</html>
