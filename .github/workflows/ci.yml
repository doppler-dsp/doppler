name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------------------------
  # Native C build + CTest on Ubuntu and macOS
  # ------------------------------------------------------------------
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is intentionally unsupported: signal-processing users on
        # Windows run under WSL2, a VM, or a container. Dropping it removes the
        # flaky MSYS2 toolchain setup and the MinGW build/test matrix.
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      run: |
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://just-buildit.github.io/just-runit" \
          -o "$HOME/.local/bin/just-runit"
        chmod +x "$HOME/.local/bin/just-runit"
        ln -sf just-runit "$HOME/.local/bin/jb"
        ln -sf just-runit "$HOME/.local/bin/jbx"
        ln -sf just-runit "$HOME/.local/bin/just-buildit"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install dependencies (Ubuntu)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        jbx just-bashit:install-deps -g runtime,dev -s apt

    - name: Install dependencies (macOS)
      if: startsWith(matrix.os, 'macos')
      run: jbx just-bashit:install-deps -g runtime,dev -s brew

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Example smoke tests
      run: make test-examples

    - name: Rust FFI tests
      run: make rust-test

    # Early portability signal: the release pipeline already objdumps every
    # wheel .so for leaked AVX (release.yml), but only on tags — too late to
    # catch a flag regression in review. The default `make build` here uses the
    # portable baseline (x86-64-v2, no AVX), identical to the manylinux wheel,
    # so any %ymm/%zmm outside a runtime-dispatched *avx512* function means
    # -march=native (or a stray wide-SIMD flag) leaked into the default build.
    # x86_64 Linux only: macOS is arm64 (NEON, no AVX) and Windows isn't shipped.
    - name: Verify portable SIMD (no leaked AVX2/AVX-512)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        bad=$(objdump -d build/libdoppler.so 2>/dev/null | awk '
          /^[0-9a-f]+ <.*>:/ { fn=$2; gsub(/[<>:]/, "", fn) }
          /%zmm[0-9]|%ymm[0-9]/ { if (fn !~ /avx512/) { print fn; exit } }
        ')
        if [ -n "$bad" ]; then
          echo "::error::libdoppler.so has wide SIMD in non-dispatched function '${bad}' — non-portable (a wide-SIMD flag leaked into the default build?)"
          exit 1
        fi
        echo "OK — wide SIMD only in runtime-dispatched *avx512* functions."

    # The core libdoppler is pure C and must link only -lm — no libstdc++/CXXABI.
    # pocketfft is C99 (no longer C++) and the C++ zmq/stream layer is split into
    # the optional libdoppler_stream component. This gate catches any C++ creeping
    # back into the core (a new .cc TU, or zmq re-folded into the core archive),
    # which would re-break downstreams that cannot supply a matching libstdc++.
    # NB: __cxa_finalize@GLIBC is a libc symbol (not libstdc++) and is excluded by
    # matching only GLIBCXX_/CXXABI_/std::/operator new|delete.
    - name: Verify C++-free core (no libstdc++/CXXABI)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        pat='GLIBCXX_|CXXABI_|std::|operator new|operator delete'
        bad=$(nm -CD build/libdoppler.so 2>/dev/null | grep -E "$pat" || true)
        bad="$bad$(nm -C build/libdoppler.a 2>/dev/null | grep -E "$pat" || true)"
        if [ -n "$bad" ]; then
          echo "::error::core libdoppler references the C++ runtime — it must be pure C:"
          echo "$bad" | head -20
          exit 1
        fi
        if ldd build/libdoppler.so | grep -qi 'libstdc++'; then
          echo "::error::libdoppler.so has a dynamic libstdc++ dependency"
          exit 1
        fi
        echo "OK — core libdoppler is C++-free (libstdc++/CXXABI absent; links -lm only)."

    # Statically link the core archive into a downstream C program with just -lm
    # — no -lstdc++, no zmq, no special linker flags — on EVERY platform. This is
    # the consumer scenario the release C-tarball smoke checks, hoisted into CI
    # so a regression (e.g. an undefined-symbol seam that only ld64 rejects) is
    # caught on macOS *before* a release rather than after the PyPI publish. The
    # consumer drives doppler_wfmgen (file output), exercising the wfm_zmq_sink_*
    # weak-stub seam that keeps libdoppler.a self-contained.
    - name: Smoke-test static link (libdoppler.a -lm)
      run: |
        cc examples/consumer/main.c -Inative/inc -Ibuild/native/inc \
           build/libdoppler.a -lm -o "${RUNNER_TEMP}/consumer_smoke"
        ( cd "${RUNNER_TEMP}" && ./consumer_smoke )
        echo "OK — libdoppler.a links into a downstream with only -lm on ${{ matrix.os }}."

  # ------------------------------------------------------------------
  # Python package build + pytest
  # ------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      run: |
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://just-buildit.github.io/just-runit" \
          -o "$HOME/.local/bin/just-runit"
        chmod +x "$HOME/.local/bin/just-runit"
        ln -sf just-runit "$HOME/.local/bin/jb"
        ln -sf just-runit "$HOME/.local/bin/jbx"
        ln -sf just-runit "$HOME/.local/bin/just-buildit"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install system deps
      run: |
        sudo apt-get update
        jbx just-bashit:install-deps -g runtime,dev -s apt

    - name: Install uv + Python + package deps
      uses: astral-sh/setup-uv@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dev deps
      run: uv sync --group dev

    - name: Build C library
      run: make build

    - name: Build Python C extensions
      run: make pyext

    - name: Doctest generated stubs
      # The .pyi docstrings are derived from each _core.h's Doxygen by jm.
      # Run their synthesized examples against the freshly built extensions so
      # a doc that no longer matches the API fails CI ("passing examples
      # everywhere"). Only the .pyi files are collected as doctest sources.
      run: |
        uv run python -m pytest --doctest-glob='*.pyi' -q \
          $(find src/doppler -name '*.pyi')

    - name: Test with coverage
      run: |
        uv run pytest src/ -v \
          --cov \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml

    - name: Python example smoke tests
      run: make test-examples-python

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: matrix.python-version == '3.12'
      with:
        name: coverage-report
        path: coverage.xml

  # ------------------------------------------------------------------
  # glibc 2.28 compatibility (Debian 10 / Buster)
  # Catches any accidental use of glibc symbols > 2.28 at build time.
  # ------------------------------------------------------------------
  glibc-228:
    name: glibc 2.28 (Debian 10)
    runs-on: ubuntu-latest
    container: debian:buster-slim

    steps:
    - uses: actions/checkout@v4

    - name: Install build deps + cmake ≥ 3.16
      run: |
        # Debian Buster reached EOL; packages are on the archive mirror.
        printf 'deb http://archive.debian.org/debian buster main\ndeb http://archive.debian.org/debian-security buster/updates main\n' \
          > /etc/apt/sources.list
        apt-get -o Acquire::Check-Valid-Until=false update
        apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          libzmq3-dev \
          libfftw3-dev \
          ca-certificates \
          wget
        # Kitware's Buster apt repo is also EOL; use the statically-linked
        # cmake binary from the GitHub release instead.
        CMAKE_VER=3.28.6
        wget -q "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VER}/cmake-${CMAKE_VER}-linux-x86_64.sh" \
          -O /tmp/cmake-install.sh
        sh /tmp/cmake-install.sh --skip-license --prefix=/usr/local
        rm /tmp/cmake-install.sh

    - name: Build
      run: make build

    - name: Test examples
      run: make test-examples

    - name: Verify no glibc symbols > 2.28
      run: |
        BAD=$(objdump -T build/libdoppler.so \
              | grep -oP 'GLIBC_\K[0-9.]+' \
              | sort -Vu \
              | awk -F. '$1 > 2 || ($1 == 2 && $2 > 28)')
        if [ -n "$BAD" ]; then
          echo "ERROR: libdoppler.so references glibc > 2.28: $BAD"
          objdump -T build/libdoppler.so | grep 'GLIBC_' | grep -v 'GLIBC_2\.[0-9]\b\|GLIBC_2\.1[0-9]\b\|GLIBC_2\.2[0-8]\b'
          exit 1
        fi
        echo "OK — all glibc symbols ≤ 2.28"

  # ------------------------------------------------------------------
  # Doxygen C API docs — zero warnings required
  # ------------------------------------------------------------------
  doxygen:
    name: Doxygen
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      run: |
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://just-buildit.github.io/just-runit" \
          -o "$HOME/.local/bin/just-runit"
        chmod +x "$HOME/.local/bin/just-runit"
        ln -sf just-runit "$HOME/.local/bin/jb"
        ln -sf just-runit "$HOME/.local/bin/jbx"
        ln -sf just-runit "$HOME/.local/bin/just-buildit"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install doxygen + LaTeX
      run: |
        sudo apt-get update
        jbx just-bashit:install-deps -g docs -s apt

    - name: Run doxygen (zero warnings)
      run: |
        doxygen Doxyfile 2>&1 | tee doxygen.log
        if grep -q 'warning:' doxygen.log; then
          echo "Doxygen produced warnings — failing."
          exit 1
        fi

  # ------------------------------------------------------------------
  # Specan demo frames staleness check
  # ------------------------------------------------------------------
  specan-demo:
    name: Specan demo frames
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check frames kept in sync with specan source
      run: |
        BASE=${{ github.event.pull_request.base.sha || 'HEAD^' }}
        SPECAN=$(git diff --name-only "$BASE"...HEAD -- src/specan/doppler_specan/ | wc -l)
        FRAMES=$(git diff --name-only "$BASE"...HEAD -- docs/specan/frames.json | wc -l)
        if [ "$SPECAN" -gt 0 ] && [ "$FRAMES" -eq 0 ]; then
          echo "src/specan/doppler_specan/ changed but docs/specan/frames.json was not updated."
          echo "Run 'make record-demo' and commit the result."
          exit 1
        fi
        echo "OK (specan_changes=$SPECAN frames_changes=$FRAMES)"

  # ------------------------------------------------------------------
  # Documentation build (zensical)
  # ------------------------------------------------------------------
  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.12'

    - name: Install dev deps
      run: uv sync --group dev --group docs

    - name: Check Python API docs coverage
      # Fails if a public symbol (module __all__) is documented nowhere under
      # docs/api/. Pre-existing gaps are baselined in .api-coverage-ignore, so
      # this only trips on a NEW undocumented surface. doppler is importable
      # here because uv sync built the extensions for mkdocstrings.
      run: uv run python scripts/check_api_docs.py

    - name: Build docs
      run: uv run zensical build

  # ------------------------------------------------------------------
  # Docker image build + container tests
  # ------------------------------------------------------------------
  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build image
      run: docker build -t doppler:test .

    - name: Run C unit tests
      run: |
        docker run --rm doppler:test sh -c '
          rc=0
          for t in /app/test_*; do
            echo "--- $t ---"
            "$t" || rc=$?
          done
          exit $rc'

  # ------------------------------------------------------------------
  # just-makeit manifest drift gate
  #
  # Asserts the generated glue (bindings, stubs, CMake, _core.h decls) on disk
  # still matches what `jm apply` would produce from just-makeit.toml +
  # objects/*.toml. This is what makes doppler a clean jm poster child: any
  # hand-edit to a glue file, or a manifest change left un-applied, fails CI.
  #
  # Uses jm's native gate (jm status --check, just-makeit#140). jm is pinned to
  # the version the tree was generated with; bump it in lock step with a
  # `jm apply` reconcile commit. No allowlist: ddc/ddcr's 5-arg
  # `*_execute(..., out, max_out)` is now declared `pass_capacity = true`
  # (just-makeit#138) so apply generates it exactly and there is zero drift.
  # ------------------------------------------------------------------
  # Lint + format gate for hand-written code and docs (ruff, clang-format v19,
  # mdformat, hygiene hooks). jm-generated glue (.pyi, *_ext.c aggregators,
  # native/inc headers, generated CMakeLists, re-export __init__.py, wavegen.py)
  # is excluded in .pre-commit-config.yaml and guarded instead by manifest-drift.
  pre-commit:
    name: pre-commit (lint + format)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - uses: pre-commit/action@v3.0.1

  manifest-drift:
    name: jm manifest drift gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Check manifest drift
      # --refresh: ignore setup-uv's cached PyPI index so a just-published jm
      # pin resolves on the first run after a release (no stale-cache race).
      run: uvx --refresh --from 'just-makeit==0.19.30' just-makeit status --check

  # ------------------------------------------------------------------
  # Aggregator: a single "CI passed" check that is green only when every
  # required job above succeeded. The release workflow polls this check on the
  # tagged commit (verify-ci) instead of re-running the suite — the merge to
  # main already gated it, so the release only confirms + builds + publishes.
  # ------------------------------------------------------------------
  ci-passed:
    name: CI passed
    needs:
      - build-and-test
      - python
      - glibc-228
      - doxygen
      - specan-demo
      - docs
      - docker
      - pre-commit
      - manifest-drift
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Require all jobs to have succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || \
                "${{ contains(needs.*.result, 'cancelled') }}" == "true" || \
                "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::a required CI job did not succeed — CI not green"
            exit 1
          fi
          echo "All required CI jobs succeeded."
