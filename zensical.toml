# ============================================================================
# doppler — Zensical documentation configuration
# https://zensical.org/docs/
# ============================================================================

[project]
site_name        = "doppler"
site_description = "Dead-simple, ultra-fast digital signal processing"
site_url         = "https://doppler-dsp.github.io/doppler/"
repo_url         = "https://github.com/doppler-dsp/doppler"
copyright        = "Copyright &copy; 2026 doppler contributors — MIT License"

nav = [
  { "Home"            = "index.md"                  },
  { "Quick Start"     = "quickstart.md"             },
  { "Overview"        = "overview.md"               },
  { "Build & Install" = "build.md"                  },
  { "Examples"        = "examples.md"               },
  { "pkg-config"      = "pkg-config-guide.md"       },
  { "API: FFT"        = "api/python-fft.md"         },
  { "API: Streaming"  = "api/python-streaming.md"   },
  { "API: NCO"        = "api/python-nco.md"         },
  { "API: Resample"   = "api/python-resample.md"    },
  { "API: Polyphase"  = "api/python-polyphase.md"   },
  { "API: Data Types" = "api/datatypes.md"          },
  { "Spectrum Analyzer" = "specan/"                 },
  { "CLI & Pipelines"  = "cli/"                     },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
logo    = "assets/logo.svg"
favicon = "assets/logo.svg"
language = "en"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

# Dark mode first — preferred for a DSP / embedded dev audience
[[project.theme.palette]]
scheme      = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme      = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/doppler-dsp/doppler"

# ----------------------------------------------------------------------------
# mkdocstrings — auto-generate API reference from Python docstrings
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings.config]
default_handler = "python"

[project.plugins.mkdocstrings.config.handlers.python]
paths = ["python"]

[project.plugins.mkdocstrings.config.handlers.python.options]
docstring_style          = "numpy"
show_source              = false
show_root_heading        = true
show_root_full_path      = false
show_symbol_type_heading = true
show_symbol_type_toc     = true
members_order            = "source"
separate_signature       = true
show_signature_annotations = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
