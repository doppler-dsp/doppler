name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------------------------
  # Native C build + CTest on Ubuntu and macOS
  # ------------------------------------------------------------------
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://raw.githubusercontent.com/just-buildit/just-bashit/main/src/just-runit" \
          -o "$HOME/.local/bin/just-runit"
        chmod +x "$HOME/.local/bin/just-runit"
        ln -sf just-runit "$HOME/.local/bin/jb"
        ln -sf just-runit "$HOME/.local/bin/jbx"
        ln -sf just-runit "$HOME/.local/bin/just-buildit"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install dependencies (Ubuntu)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        jbx -r install-deps -g runtime,dev -s apt

    - name: Install dependencies (macOS)
      if: startsWith(matrix.os, 'macos')
      run: jbx -r install-deps -g runtime,dev -s brew

    - name: Install dependencies (Windows / MSYS2)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >
          mingw-w64-ucrt-x86_64-uv
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-zeromq
          mingw-w64-ucrt-x86_64-fftw
          mingw-w64-ucrt-x86_64-rust
          make

    - name: Build
      if: matrix.os != 'windows-latest'
      run: make build

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        make build

    - name: Test
      if: matrix.os != 'windows-latest'
      run: make test

    - name: Test (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: make test

    - name: Example smoke tests
      if: matrix.os != 'windows-latest'
      run: make test-examples

    - name: Example smoke tests (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: make test-examples

    - name: Rust FFI tests
      if: matrix.os != 'windows-latest'
      run: make rust-test

    - name: Rust FFI tests (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: make rust-test

  # ------------------------------------------------------------------
  # Python package build + pytest
  # ------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      run: |
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://raw.githubusercontent.com/just-buildit/just-bashit/main/src/just-runit" \
          -o "$HOME/.local/bin/just-runit"
        chmod +x "$HOME/.local/bin/just-runit"
        ln -sf just-runit "$HOME/.local/bin/jb"
        ln -sf just-runit "$HOME/.local/bin/jbx"
        ln -sf just-runit "$HOME/.local/bin/just-buildit"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install system deps
      run: |
        sudo apt-get update
        jbx -r install-deps -g runtime,dev -s apt

    - name: Install uv + Python + package deps
      uses: astral-sh/setup-uv@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dev deps
      run: uv sync --group dev

    - name: Build C library
      run: make build

    - name: Build Python C extensions
      run: make pyext

    - name: Test with coverage
      run: |
        uv run pytest src/ -v \
          --cov \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml

    - name: Python example smoke tests
      run: make test-examples-python

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: matrix.python-version == '3.12'
      with:
        name: coverage-report
        path: coverage.xml

  # ------------------------------------------------------------------
  # glibc 2.28 compatibility (Debian 10 / Buster)
  # Catches any accidental use of glibc symbols > 2.28 at build time.
  # ------------------------------------------------------------------
  glibc-228:
    name: glibc 2.28 (Debian 10)
    runs-on: ubuntu-latest
    container: debian:buster-slim

    steps:
    - uses: actions/checkout@v4

    - name: Install build deps + cmake ≥ 3.16
      run: |
        # Debian Buster reached EOL; packages are on the archive mirror.
        printf 'deb http://archive.debian.org/debian buster main\ndeb http://archive.debian.org/debian-security buster/updates main\n' \
          > /etc/apt/sources.list
        apt-get -o Acquire::Check-Valid-Until=false update
        apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          libzmq3-dev \
          libfftw3-dev \
          ca-certificates \
          wget
        # Kitware's Buster apt repo is also EOL; use the statically-linked
        # cmake binary from the GitHub release instead.
        CMAKE_VER=3.28.6
        wget -q "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VER}/cmake-${CMAKE_VER}-linux-x86_64.sh" \
          -O /tmp/cmake-install.sh
        sh /tmp/cmake-install.sh --skip-license --prefix=/usr/local
        rm /tmp/cmake-install.sh

    - name: Build
      run: make build

    - name: Test examples
      run: make test-examples

    - name: Verify no glibc symbols > 2.28
      run: |
        BAD=$(objdump -T build/libdoppler.so \
              | grep -oP 'GLIBC_\K[0-9.]+' \
              | sort -Vu \
              | awk -F. '$1 > 2 || ($1 == 2 && $2 > 28)')
        if [ -n "$BAD" ]; then
          echo "ERROR: libdoppler.so references glibc > 2.28: $BAD"
          objdump -T build/libdoppler.so | grep 'GLIBC_' | grep -v 'GLIBC_2\.[0-9]\b\|GLIBC_2\.1[0-9]\b\|GLIBC_2\.2[0-8]\b'
          exit 1
        fi
        echo "OK — all glibc symbols ≤ 2.28"

  # ------------------------------------------------------------------
  # Doxygen C API docs — zero warnings required
  # ------------------------------------------------------------------
  doxygen:
    name: Doxygen
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      run: |
        mkdir -p "$HOME/.local/bin"
        curl -fsSL "https://raw.githubusercontent.com/just-buildit/just-bashit/main/src/just-runit" \
          -o "$HOME/.local/bin/just-runit"
        chmod +x "$HOME/.local/bin/just-runit"
        ln -sf just-runit "$HOME/.local/bin/jb"
        ln -sf just-runit "$HOME/.local/bin/jbx"
        ln -sf just-runit "$HOME/.local/bin/just-buildit"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install doxygen + LaTeX
      run: |
        sudo apt-get update
        jbx -r install-deps -g docs -s apt

    - name: Run doxygen (zero warnings)
      run: |
        doxygen Doxyfile 2>&1 | tee doxygen.log
        if grep -q 'warning:' doxygen.log; then
          echo "Doxygen produced warnings — failing."
          exit 1
        fi

  # ------------------------------------------------------------------
  # Specan demo frames staleness check
  # ------------------------------------------------------------------
  specan-demo:
    name: Specan demo frames
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check frames kept in sync with specan source
      run: |
        BASE=${{ github.event.pull_request.base.sha || 'HEAD^' }}
        SPECAN=$(git diff --name-only "$BASE"...HEAD -- src/specan/doppler_specan/ | wc -l)
        FRAMES=$(git diff --name-only "$BASE"...HEAD -- docs/specan/frames.json | wc -l)
        if [ "$SPECAN" -gt 0 ] && [ "$FRAMES" -eq 0 ]; then
          echo "src/specan/doppler_specan/ changed but docs/specan/frames.json was not updated."
          echo "Run 'make record-demo' and commit the result."
          exit 1
        fi
        echo "OK (specan_changes=$SPECAN frames_changes=$FRAMES)"

  # ------------------------------------------------------------------
  # Zensical documentation build
  # ------------------------------------------------------------------
  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.12'

    - name: Install dev deps
      run: uv sync --group dev

    - name: Build docs
      run: uv run zensical build --clean

  # ------------------------------------------------------------------
  # Docker image build + container tests
  # ------------------------------------------------------------------
  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build image
      run: docker build -t doppler:test .

    - name: Run C unit tests
      run: |
        docker run --rm doppler:test sh -c '
          rc=0
          for t in /app/test_*; do
            echo "--- $t ---"
            "$t" || rc=$?
          done
          exit $rc'
