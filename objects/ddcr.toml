[ddcr]
arg_type = "float"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "DDCR"
depends_on = ["lo_core", "RateConverter_core", "resamp_core", "hbdecim_core", "hbdecim_r2c_core", "cic_core", "fir_core", "resample_core"]

[[ddcr.init_params]]
name = "norm_freq"
type = "double"
default = "0.0"

[[ddcr.init_params]]
name = "rate"
type = "double"
default = "0.25"

[[ddcr.methods]]
name = "execute"
doc = "Halfband R2C decimate, LO mix, then rate-convert."
arg_type = "void"
return_type = "float _Complex"
variable_output = true
pass_capacity = true
nogil = true
params = [{name = "x", type = "float[]"}]

[[ddcr.methods]]
name = "reset"
doc = "Zero halfband, LO phase, and filter history."
arg_type = "void"
return_type = "void"

[[ddcr.properties]]
name = "norm_freq"
type = "double"
writable = true

[[ddcr.properties]]
name = "rate"
type = "double"
