<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- The Doppler shift: approaching (blue) → brand purple → receding (red). -->
    <linearGradient id="shift" x1="0" y1="0" x2="512" y2="0"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#2979FF"/>
      <stop offset="0.52" stop-color="#7C4DFF"/>
      <stop offset="1"    stop-color="#FF3D6E"/>
    </linearGradient>
    <radialGradient id="hi" cx="0.36" cy="0.30" r="0.72">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="badge">
      <circle cx="256" cy="256" r="254"/>
    </clipPath>
  </defs>

  <!-- Disc carries the shift gradient; a soft top-left highlight adds depth. -->
  <circle cx="256" cy="256" r="256" fill="url(#shift)"/>
  <circle cx="256" cy="256" r="256" fill="url(#hi)"/>

  <!-- Wavefront arcs — four circles whose centers shift left as radius
       grows, so the right side (direction of motion) is compressed and
       the left side is expanded: the classic Doppler shift pattern. -->
  <circle cx="200" cy="256" r="190" fill="none" stroke="white"
          stroke-width="16" opacity="0.28" clip-path="url(#badge)"/>
  <circle cx="220" cy="256" r="140" fill="none" stroke="white"
          stroke-width="16" opacity="0.48" clip-path="url(#badge)"/>
  <circle cx="240" cy="256" r="90"  fill="none" stroke="white"
          stroke-width="16" opacity="0.68" clip-path="url(#badge)"/>
  <circle cx="257" cy="256" r="43"  fill="none" stroke="white"
          stroke-width="16" opacity="0.88" clip-path="url(#badge)"/>

  <!-- Source (the moving emitter) -->
  <circle cx="268" cy="256" r="24" fill="white"/>
</svg>
