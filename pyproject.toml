[build-system]
requires = ["just-buildit", "numpy"]
build-backend = "just_buildit"

[project]
name = "doppler-dsp"
version = "0.3.2"
description = "TODO: describe your project."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
]

[project.optional-dependencies]
cli = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "rich>=13.0",
]
specan = [
    "rich>=13.0",
]
specan-web = [
    "fastapi>=0.100",
    "uvicorn[standard]>=0.23",
    "websockets>=12.0",
]

[project.scripts]
doppler        = "doppler.cli.__main__:main"
doppler-source = "doppler.cli.source:main"
doppler-specan = "doppler.specan.__main__:main"

[tool.just-buildit]
command = "make just-build"
editable_path = "src"

[tool.pytest.ini_options]
python_files = ["test_*.py", "bench_*.py"]
testpaths = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-benchmark>=5.2.3",
    "pytest-cov>=6.0",
    "scipy>=1.17.1",
    "zensical>=0.0.29",
    "mkdocstrings[python]>=0.29",
    "mkdoxy>=1.2.8",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    "matplotlib>=3.10.9",
]
