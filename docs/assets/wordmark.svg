<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 380" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- The Doppler shift itself: approaching (blue) → brand purple →
         receding (red), left to right across the wordmark. -->
    <linearGradient id="shift" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#2979FF"/>
      <stop offset="0.52" stop-color="#7C4DFF"/>
      <stop offset="1"    stop-color="#FF3D6E"/>
    </linearGradient>
    <!-- Badge disc: blue (matching the "d"), lit top-left for a little depth. -->
    <radialGradient id="disc" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0"   stop-color="#5C97FF"/>
      <stop offset="0.6" stop-color="#2979FF"/>
      <stop offset="1"   stop-color="#1657D6"/>
    </radialGradient>
    <clipPath id="badge"><circle cx="256" cy="256" r="254"/></clipPath>
    <!-- soft glow for the emitter -->
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#ffffff"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Mark: the moving emitter + compressed wavefronts ───────────────── -->
  <g transform="translate(26,62) scale(0.56)">
    <circle cx="256" cy="256" r="256" fill="url(#disc)"/>
    <!-- subtle top highlight rim -->
    <circle cx="256" cy="256" r="248" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.18"/>
    <g clip-path="url(#badge)">
      <circle cx="200" cy="256" r="190" fill="none" stroke="#fff" stroke-width="17" opacity="0.30"/>
      <circle cx="220" cy="256" r="140" fill="none" stroke="#fff" stroke-width="17" opacity="0.50"/>
      <circle cx="240" cy="256" r="90"  fill="none" stroke="#fff" stroke-width="17" opacity="0.72"/>
      <circle cx="257" cy="256" r="43"  fill="none" stroke="#fff" stroke-width="17" opacity="0.9"/>
    </g>
    <circle cx="268" cy="256" r="40" fill="url(#spark)" opacity="0.6"/>
    <circle cx="268" cy="256" r="24" fill="#fff"/>
  </g>

  <!-- ── Wordmark ───────────────────────────────────────────────────────── -->
  <text x="338" y="240" font-size="208" font-weight="800"
        letter-spacing="-8" fill="url(#shift)">doppler</text>
  <text x="344" y="332" font-size="43" font-weight="500"
        letter-spacing="13.5" fill="#8b90a6">signal, shifted</text>
</svg>
