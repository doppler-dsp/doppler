include = ["objects/*.toml"]

[project]
jm_version = "0.32.0"
name = "doppler"
version = "0.1.0"
build = "cmake"
# doppler does not target Windows (signal-processing users run WSL2/VM/container
# — see docs). Omitting "windows" drops jm's per-component MinGW DLL-copy
# boilerplate (jm-gh-213); the drift gate treats its absence as correct.
platforms = ["linux", "macos"]
# NOT adopting [project] c_style = "clang-format" (gh-265): jm 0.30.1's
# _cfmt.py walks and reformats ALL of native/inc/** + native/src/** with
# no exclusion, including the sacred native/inc/** headers that doppler's
# OWN pre-commit config deliberately excludes from clang-format (jm's
# decl-injection detection is whitespace-sensitive, so reformatting a
# header confuses a LATER `jm apply` into re-patching it — an endless
# churn loop, reproduced directly on this repo: reformatting touched 148
# files project-wide, and a second `jm apply` re-"patched" impls that had
# not actually changed in the manifest). Revisit if jm adds a native/inc
# exclusion/scope option to c_style.
perf = "true"
pytest = "true"
pytest_benchmark = "true"
schema = "7"
c_deps = ["hbdecim", "resamp", "wfmcompose"]
# dsss.pyi came OFF this list in jm 0.28.3 (gh-428): its ten hand-maintained
# has_params-single-array-param members (despreader.steps/bits,
# burst_despreader.steps/bits, burst_demod.demod, + each *_max_out()) are now
# individually marked `# jm:hand` in the stub itself, and `jm apply`'s
# member-level merge preserves exactly those spans byte-for-byte while
# regenerating everything else — so new manifest-derived API (docstrings,
# properties) flows into the file again instead of silently rotting behind
# the old whole-file skip. Verified on the 0.28.3 pin bump: 10/10 marked
# members survived; unmarked content picked up real accumulated doc updates.
# The same migration is a good follow-up for the remaining files below —
# not yet done, they still use the coarser whole-file skip.
#
# measure.pyi's analyze() methods are jm-generated (single=true, gh-244) but
# spectrum_dbfs() is hand-maintained: jm's stub aggregator didn't reconcile
# out=/spectrum_dbfs_max_out() for this has_params-single-array-param method
# even after the sacred fragments freshly regenerated with the new binding —
# the same gap analyzer.pyi/delay.pyi hit below.
# analyzer.pyi is hand-maintained for the same has_params-single-array-param
# stub-lag (a separate, pre-existing jm gap from the has_params predicate
# fixed in gh-219's follow-up — the .c binding is correct, only the .pyi
# stub lagged).
# delay.pyi is hand-maintained for ptr()/push_ptr(): jm's stub generator drops
# the implicit "count"/out= params for this has_params=False shape (the .c
# binding gets them correctly; the .pyi generator doesn't) — a separate,
# analogous jm gap. spectral.pyi is hand-maintained for FFT/FFT2D's execute*
# methods and PSD's band_power() for the same reason (plus FFT's execute_ci16/
# execute_ci8, which are hand-written and never had a stub at all).
# resample.pyi is hand-maintained for RateConverter.execute(): the fragment
# itself is entirely hand-written (custom growth/ping-pong logic, a `stages`
# getset and DP_PY_STATE_METHODS macro not representable in the manifest at
# all), so out= was added by hand rather than via jm apply/regenerate — the
# .pyi needs the matching hand-fix for the same reason as the rest of this
# list. Restore these hand-fixes after every `jm apply` until fixed
# upstream.
#
# source.pyi (NCO/LO.steps_ctrl) and accumulator.pyi (AccTrace.value) came
# OFF this list on the 0.30.1 pin bump: both were here for the same
# has_params-single-array-param stub-lag as analyzer.pyi/delay.pyi above,
# and both now regenerate byte-identical to the prior hand-maintained
# content (verified directly: dropped from status_allow, ran a full
# `jm apply`, diffed — zero unwanted change, NCO's newly-added
# steps_u32_ctrl picked up its stub correctly for free). wfm.pyi does NOT
# come off despite being exempted for the same original reason
# (PN.generate()) — a full regen silently drops Gold's entire class
# docstring (the CCSDS Code #365 worked example, the "preferred pair"
# three-valued autocorrelation description) in favour of generic
# boilerplate, a different and still-live gap (the sacred header's own
# doxygen for Gold apparently never carried this detail — jm has nothing
# richer to pull from). Re-test wfm.pyi the same way after any future pin
# bump; don't assume the fix generalizes without re-diffing.
#
# util_core.h's square_clip came OFF this list in jm 0.28.11 (gh-468):
# jm's decl-injector previously had no case for a non-static, header-only,
# self-defining module function (square_clip was made non-static to fix a
# GCC -Wstatic-in-inline warning; jm then injected a redundant, malformed
# forward declaration for it). The gh-133 check now treats `static` as
# optional before inline/JM_FORCEINLINE, so the existing definition alone
# satisfies the manifest again.
status_allow = [
    "zensical.toml",
    "src/doppler/analyzer/analyzer.pyi",
    "src/doppler/delay/delay.pyi",
    "src/doppler/measure/measure.pyi",
    "src/doppler/spectral/spectral.pyi",
    "src/doppler/wfm/wfm.pyi",
    "src/doppler/resample/resample.pyi",
]

# Benchmark only the 64k block (jm-gh-390). doppler dropped the small-block
# (_1k) bench suite library-wide in #234 — 1k blocks are dominated by call
# overhead and only add noise to the perf-regression gate. Without this, every
# newly scaffolded object reintroduced a `test_bench_steps_1k`, which had to be
# hand-trimmed after each `jm apply`. Declaring it here stops the reintroduction.
[project.bench]
block_sizes = [65536]

# ── Waveform enum single-source-of-truth (gh-285) ────────────────────────────
# One string↔int table per synth enum; list order IS the C enum value
# (append-only — never reorder). The wfm_compose composer (below) emits its C
# lookup tables from these, collapsing the string tables historically duplicated
# across wfmgen.c / wfm_json.c / wfmcompose_py.c / compose.py to this one source.
[module.wfm_reader]
kind            = "handle"
backing         = "wfm_reader"
header          = "wfm/wfm_reader.h"
package         = "wfm"
type_name       = "Reader"
context_manager = true
close_fn        = "wfm_reader_close"
create_fn       = "wfm_reader_open"
# wfm_reader.c parses SigMF sidecars via the vendored cJSON OBJECT lib; libm too.
extra_link_libs = ["wfm_cjson", "m"]

[[module.wfm_reader.create_args]]
name = "path"
type = "path"

[[module.wfm_reader.create_args]]
name = "sample_type"
type = "int"
enum = "stype"
default = "cf32"
kwonly = true

[[module.wfm_reader.create_args]]
name = "endian"
type = "int"
enum = "endian"
default = "le"
kwonly = true
[[module.wfm_reader.depends_on]]
name = "wfm_reader"
link = true
[[module.wfm_reader.methods]]
name = "read"
fn = "wfm_reader_read"
returns = "float _Complex[]"
nogil = true

[[module.wfm_reader.methods.args]]
name = "n"
type = "size_t"
[[module.wfm_reader.getters]]
fn = "wfm_reader_info"
out = "wfm_reader_info_t"
cache = true

[[module.wfm_reader.getters.fields]]
name = "file_type"
from = "file_type"
type = "int"
enum = "ftype"

[[module.wfm_reader.getters.fields]]
name = "sample_type"
from = "sample_type"
type = "int"
enum = "stype"

[[module.wfm_reader.getters.fields]]
name = "endian"
from = "endian"
type = "int"
enum = "endian"

[[module.wfm_reader.getters.fields]]
name = "fs"
from = "fs"
type = "double"

[[module.wfm_reader.getters.fields]]
name = "fc"
from = "fc"
type = "double"

[[module.wfm_reader.getters.fields]]
name = "num_samples"
from = "num_samples"
type = "size_t"

# ── wfm_plan: "prepare once, materialize many" stimulus engine ───────────────
# Constructed from a spec-JSON string (Composer.to_json()); render/at return a
# cf32 array sized from the handle (wfm_plan_len) — the jm 0.25.0 string-arg +
# out_len_fn handle features. The core (wfm_plan.c) is compiled into
# wfm_compose_core, so the .so links the SAME cores as the composer module.
[module.wfm_plan]
kind            = "handle"
backing         = "wfm_plan"
header          = "wfm/wfm_plan.h"
package         = "wfm"
type_name       = "Plan"
context_manager = true
close_fn        = "wfm_plan_destroy"
create_fn       = "wfm_plan_prepare"
extra_link_libs = ["wfm_draw_core", "wfm_cjson", "m"]

[[module.wfm_plan.create_args]]
name = "spec_json"
type = "string"

# link=true cores (jm appends _core): wfm_compose_core carries wfm_plan.o +
# the composer/json/resolve; the rest are the synth engine it reuses.
[[module.wfm_plan.depends_on]]
name = "wfm_compose"
link = true
[[module.wfm_plan.depends_on]]
name = "wfm_dsp"
link = true
[[module.wfm_plan.depends_on]]
name = "wfm_synth"
link = true
[[module.wfm_plan.depends_on]]
name = "lo"
link = true
[[module.wfm_plan.depends_on]]
name = "awgn"
link = true
[[module.wfm_plan.depends_on]]
name = "pn"
link = true
[[module.wfm_plan.depends_on]]
name = "fir"
link = true

# General render: a small JSON override object → cf32 array (length from the
# handle). Baseline (empty object) reproduces a full compose bit-for-bit.
[[module.wfm_plan.methods]]
name = "render"
fn = "wfm_plan_render"
returns = "float _Complex[]"
out_len_fn = "wfm_plan_len"
nogil = true
[[module.wfm_plan.methods.args]]
name = "overrides_json"
type = "string"

# Scalar fast-path for the hot SNR/Monte-Carlo loop (no JSON parse).
[[module.wfm_plan.methods]]
name = "at"
fn = "wfm_plan_at"
returns = "float _Complex[]"
out_len_fn = "wfm_plan_len"
nogil = true
[[module.wfm_plan.methods.args]]
name = "snr"
type = "double"
[[module.wfm_plan.methods.args]]
name = "seed"
type = "uint64_t"

# Scalar introspection (no-arg → scalar): the Python wrapper reads anchor_seed
# for render()'s default seed and n_sources to size override arrays.
[[module.wfm_plan.methods]]
name = "length"
fn = "wfm_plan_len"
returns = "size_t"
[[module.wfm_plan.methods]]
name = "n_sources"
fn = "wfm_plan_n_sources"
returns = "size_t"
[[module.wfm_plan.methods]]
name = "anchor_seed"
fn = "wfm_plan_anchor_seed"
returns = "uint64_t"

[module.sample_clock]
kind            = "handle"
backing         = "dp_sample_clock"
handle_type     = "dp_sample_clock_t"
header          = "timing/timing_core.h"
package         = "wfm"
type_name       = "SampleClock"
init_fn         = "dp_sample_clock_init"
# Empty close_fn: the clock owns no internal resources, so teardown is jm's
# free(self->h) alone (no <backing>_close finalizer). init_fn makes jm own the
# malloc/free.
close_fn        = ""

[[module.sample_clock.create_args]]
name = "fs"
type = "double"

[[module.sample_clock.create_args]]
name = "resync"
type = "int"
default = "0"
kwonly = true
[[module.sample_clock.depends_on]]
name = "timing"
link = true
[[module.sample_clock.methods]]
name = "pace"
fn = "dp_sample_clock_pace"
returns = "double"
nogil = true

[[module.sample_clock.methods.args]]
name = "count"
type = "size_t"

[[module.sample_clock.methods]]
name = "stamp"
fn = "dp_sample_clock_stamp"
returns = "uint64_t"

[[module.sample_clock.methods]]
name = "stamp_at"
fn = "dp_sample_clock_stamp_at"
returns = "uint64_t"

[[module.sample_clock.methods.args]]
name = "n"
type = "uint64_t"

[[module.sample_clock.methods]]
name = "track"
fn = "dp_sample_clock_track"
returns = "int"

[[module.sample_clock.methods.args]]
name = "observed_timestamp_ns"
type = "uint64_t"

[[module.sample_clock.methods.args]]
name = "n_at_observation"
type = "uint64_t"

[[module.sample_clock.methods.args]]
name = "tolerance_ns"
type = "uint64_t"

[[module.sample_clock.methods]]
name = "reset"
fn = "dp_sample_clock_reset"

[[module.sample_clock.methods]]
name = "resync"
fn = "dp_sample_clock_resync"
[[module.sample_clock.getters]]
fn = "dp_sample_clock_stats"
out = "dp_sample_clock_t"
cache = false

[[module.sample_clock.getters.fields]]
name = "samples"
from = "n"
type = "uint64_t"

[[module.sample_clock.getters.fields]]
name = "underruns"
from = "underruns"
type = "uint64_t"

[[module.sample_clock.getters.fields]]
name = "max_lateness"
from = "max_late_ns"
type = "double"
scale = "1e-9"
[module.wfm_writer]
kind            = "handle"
backing         = "wfm_writer"
header          = "wfm/wfm_writer.h"
package         = "wfm"
type_name       = "Writer"
context_manager = true
close_fn        = "wfm_writer_close"
close_returns   = "int"
