<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="badge">
      <circle cx="256" cy="256" r="236"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#4C1D95"/>

  <!-- Wavefront arcs — four circles whose centers shift left as radius
       grows, so the right side (direction of motion) is compressed and
       the left side is expanded: the classic Doppler shift pattern.

       Right-side gaps are equal (~30 px); left-side gaps are ~2× wider. -->
  <circle cx="200" cy="256" r="190" fill="none" stroke="white"
          stroke-width="16" opacity="0.25" clip-path="url(#badge)"/>
  <circle cx="220" cy="256" r="140" fill="none" stroke="white"
          stroke-width="16" opacity="0.45" clip-path="url(#badge)"/>
  <circle cx="240" cy="256" r="90"  fill="none" stroke="white"
          stroke-width="16" opacity="0.65" clip-path="url(#badge)"/>
  <circle cx="257" cy="256" r="43"  fill="none" stroke="white"
          stroke-width="16" opacity="0.85" clip-path="url(#badge)"/>

  <!-- Source (the moving emitter) -->
  <circle cx="268" cy="256" r="24" fill="#22D3EE"/>

  <!-- Velocity arrow — points in direction of motion (right) -->
  <line x1="304" y1="256" x2="334" y2="256"
        stroke="#22D3EE" stroke-width="9" stroke-linecap="round"/>
  <polyline points="323,245 335,256 323,267"
            stroke="#22D3EE" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
