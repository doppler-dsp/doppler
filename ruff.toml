line-length = 79
target-version = "py39"

# jm-generated type stubs and package inits are owned by the manifest-drift
# gate; formatters must not rewrite them. force-exclude ensures pre-commit's
# per-file invocations also respect this when ruff receives a path explicitly.
extend-exclude = ["*.pyi", "vendor", "src/doppler/*/__init__.py"]
force-exclude = true

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "TC",   # flake8-type-checking
    "ANN",  # flake8-annotations
    "N",    # pep8-naming
    "NPY",  # numpy rules
    "RUF",  # ruff-specific
]
ignore = [
    # DSP naming conventions: N (sample count), Fs (sample rate), Q (filter
    # quality), H (transfer function), etc. are standard uppercase symbols in
    # signal-processing literature and map directly to C API parameter names.
    "N803",  # argument name should be lowercase
    "N806",  # variable in function should be lowercase

    # Unicode in technical content: Greek letters (α, β, ω, μ) and typographic
    # minus (−) are intentional in DSP docstrings and inline comments; replacing
    # them with ASCII lookalikes degrades readability of mathematical content.
    "RUF001",  # ambiguous unicode character in string
    "RUF002",  # ambiguous unicode character in docstring
    "RUF003",  # ambiguous unicode character in comment

    "ANN204",  # missing return type on __init__ — always None, noisy
    "ANN401",  # disallows `Any` — too strict at C extension boundaries
]

[lint.per-file-ignores]
# ANN not enforced outside the importable DSP API.
# - tests, benchmarks, examples, scripts: coverage noise, not public API
# - cli/ and specan/: application entry points, not the library surface
"**/tests/**"           = ["ANN"]
"**/benchmarks/**"      = ["ANN"]
"examples/**"           = ["ANN"]
"scripts/**"            = ["ANN"]
"conftest.py"           = ["ANN"]
"**/conftest.py"        = ["ANN"]
"src/doppler/cli/**"    = ["ANN"]
"src/doppler/specan/**" = ["ANN"]

# CamelCase test/bench filenames mirror the class under test (HalfbandDecimator,
# RateConverter, Resampler); renaming would break references across the repo.
"src/doppler/resample/tests/test_*.py" = ["N999"]
"src/doppler/resample/benchmarks/bench_*.py" = ["N999"]

[lint.isort]
known-first-party = ["doppler"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
docstring-code-line-length = 79
