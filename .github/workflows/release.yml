name: Release

# Triggered by pushing a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------------------------
  # Sanity check: tag version matches pyproject.toml
  # ------------------------------------------------------------------
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: get
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.2.1
          VERSION="${TAG#v}"                # e.g.   0.2.1
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check pyproject.toml matches tag
        run: |
          PY=$(grep '^version' pyproject.toml | head -1 | \
               sed 's/version = "\(.*\)"/\1/')
          TAG="${{ steps.get.outputs.version }}"
          if [ "$PY" != "$TAG" ]; then
            echo "ERROR: pyproject.toml version ($PY) != tag ($TAG)"
            echo "Run: make bump-version VERSION=$TAG"
            exit 1
          fi

      - name: Check Cargo.toml matches tag
        run: |
          CARGO=$(grep '^version' ffi/rust/Cargo.toml | head -1 | \
                  sed 's/version = "\(.*\)"/\1/')
          TAG="${{ steps.get.outputs.version }}"
          if [ "$CARGO" != "$TAG" ]; then
            echo "ERROR: Cargo.toml version ($CARGO) != tag ($TAG)"
            echo "Run: make bump-version VERSION=$TAG"
            exit 1
          fi

      - name: Check CMakeLists.txt matches tag
        run: |
          CMAKE=$(grep '^project' CMakeLists.txt | \
                  sed 's/.*VERSION \([0-9.]*\).*/\1/')
          TAG="${{ steps.get.outputs.version }}"
          if [ "$CMAKE" != "$TAG" ]; then
            echo "ERROR: CMakeLists.txt version ($CMAKE) != tag ($TAG)"
            echo "Run: make bump-version VERSION=$TAG"
            exit 1
          fi

  # ------------------------------------------------------------------
  # Belt-and-suspenders test gate.
  #
  # release.yml is tag-triggered and runs independently of ci.yml — so without
  # this, a tag on a red commit would still publish to PyPI (irreversible). The
  # PR flow keeps `main` green, but this re-runs the suite on the tagged commit,
  # and `publish-python` needs it, so a failing test blocks the PyPI upload.
  #
  # Scoped to ubuntu-latest — the same surface ci.yml's `python` job gates. The
  # macOS *Python* suite has never been part of CI (the macOS CI job runs only
  # CTest), and running it here surfaced two pre-existing, macOS-only bugs that
  # are not release regressions and must be fixed on their own:
  #   * #66 — ring buffers assume 4 KB pages; broken on macOS arm64 (16 KB)
  #   * #67 — qpsk/cf32 compose-vs-CLI byte-parity divergence on macOS
  # Re-add macos-latest once both are fixed. macOS wheels still build + the
  # macOS CTest suite still runs in ci.yml.
  # ------------------------------------------------------------------
  test:
    name: Test gate on ${{ matrix.os }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install jbx
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://raw.githubusercontent.com/just-buildit/just-bashit/main/src/just-runit" \
            -o "$HOME/.local/bin/just-runit"
          chmod +x "$HOME/.local/bin/just-runit"
          ln -sf just-runit "$HOME/.local/bin/jbx"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          jbx -r install-deps -g runtime,dev -s apt

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: jbx -r install-deps -g runtime,dev -s brew

      # `make pyext` ends in `uv sync`, so uv must be on PATH (the per-version
      # CI job gets this from setup-uv; the gate needs it too). Pin a single
      # interpreter — CI already ran the full 3.9–3.14 matrix on this commit;
      # the gate only re-confirms the suite on the shipping platforms.
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'

      - name: Build + Python extensions
        run: make pyext

      - name: CTest + pytest + example smoke tests
        run: make test-all

  # ------------------------------------------------------------------
  # Build Python wheels
  #
  # just-buildit is a minimal PEP 517 backend
  # that calls `make just-build` (cmake + pyext), assembles the wheel
  # from output_dir, detects the platform tag from the .so suffix, and
  # runs `uvx auditwheel repair` to produce a manylinux wheel.
  #
  # Each Python version gets its own docker run so the .so suffix
  # (cpXYZ) matches the interpreter that will load it.
  #
  # The sdist is built once on the host runner.
  # ------------------------------------------------------------------
  build-python:
    name: Build wheels (manylinux_2_28 x86_64)
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [cp39, cp310, cp311, cp312, cp313, cp314]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel (${{ matrix.python }}) in manylinux container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w /project \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -euxc "
              dnf install -y cmake zeromq-devel fftw-devel pkg-config
              PYTHON=/opt/python/${{ matrix.python }}-${{ matrix.python }}/bin/python
              export PATH=\"\$(dirname \$PYTHON):\$PATH\"
              \$PYTHON -m pip install --quiet numpy uv build just-buildit
              mkdir -p dist
              \$PYTHON -m build --no-isolation --wheel --outdir dist/
            "

      - name: Verify wheel is portable (no -march=native AVX2/AVX-512)
        run: |
          # Defense in depth: a distributed wheel must run on any x86-64 CPU.
          # -march=native on the build host would spray AVX2 (%ymm) / AVX-512
          # (%zmm) across every function and SIGILL on older hardware
          # (doppler-dsp 0.5.1 shipped exactly this bug).
          #
          # Wide SIMD is allowed ONLY inside runtime-dispatched functions whose
          # name contains "avx512" (e.g. awgn's generate_avx512). Those carry a
          # per-function target attribute and are reached only behind a
          # __builtin_cpu_supports() check — present in the binary but never
          # executed on a baseline CPU. Wide SIMD in any other function means
          # -march=native leaked in → reject.
          #
          # Scan ONLY doppler's own compiled extensions (*.cpython-*.so), not
          # the third-party libraries auditwheel/delocate vendor into the
          # `<dist>.libs/` (Linux) or `.dylibs/` (macOS) bundle dir. Those
          # vendored libs are not ours to make portable: glibc's libmvec, for
          # instance, ships AVX vector-math variants (e.g. _ZGVcN4v_cos) that
          # are ifunc-/caller-ISA-selected and never executed on a baseline
          # CPU — scanning them is a guaranteed false positive (it flagged the
          # cp39 wheel, whose build happened to vendor libmvec).
          fail=0
          tmp="$(mktemp -d)"
          for whl in dist/*.whl; do
            unzip -q -o "$whl" -d "$tmp/extract"
            while IFS= read -r so; do
              bad=$(objdump -d "$so" 2>/dev/null | awk '
                /^[0-9a-f]+ <.*>:/ { fn=$2; gsub(/[<>:]/, "", fn) }
                /%zmm[0-9]|%ymm[0-9]/ { if (fn !~ /avx512/) { print fn; exit } }
              ')
              if [ -n "$bad" ]; then
                echo "::error::$(basename "$whl"): $(basename "$so") has wide SIMD in non-dispatched function '${bad}' — non-portable (built with -march=native?)"
                fail=1
              fi
              # The bundled wfmgen CLI binary (wfm/_bin/wfmgen) gets the same
              # scan — it links the runtime-dispatched AWGN, so wide SIMD is
              # only legal in *avx512* functions, exactly like the extensions.
            done < <(find "$tmp/extract" \( -name '*.cpython-*.so' -o -path '*/wfm/_bin/wfmgen' \))
            rm -rf "$tmp/extract"
          done
          rm -rf "$tmp"
          if [ "$fail" -ne 0 ]; then
            echo "Refusing to publish a non-portable wheel. Build the wheel WITHOUT -DDOPPLER_NATIVE." >&2
            exit 1
          fi
          echo "Portable: wide SIMD only in runtime-dispatched *avx512* functions."

      - name: Upload wheel (${{ matrix.python }})
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ matrix.python }}
          path: dist/*.whl

  # ------------------------------------------------------------------
  # Build Python wheels (macOS arm64)
  #
  # Uses the same just-buildit backend; delocate-wheel (run via uvx)
  # bundles dylib deps and stamps the macosx platform tag.
  # ------------------------------------------------------------------
  build-macos:
    name: Build wheels (macOS arm64)
    needs: verify-version
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install jbx
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://raw.githubusercontent.com/just-buildit/just-bashit/main/src/just-runit" \
            -o "$HOME/.local/bin/just-runit"
          chmod +x "$HOME/.local/bin/just-runit"
          ln -sf just-runit "$HOME/.local/bin/jb"
          ln -sf just-runit "$HOME/.local/bin/jbx"
          ln -sf just-runit "$HOME/.local/bin/just-buildit"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        run: jbx -r install-deps -g runtime,dev -s brew

      - name: Build wheel (Python ${{ matrix.python }})
        run: |
          uv python install ${{ matrix.python }}
          uv venv .venv --python ${{ matrix.python }}
          uv pip install --python .venv/bin/python numpy build just-buildit
          mkdir -p dist
          .venv/bin/python -m build --no-isolation --wheel --outdir dist/

      - name: Upload wheel (Python ${{ matrix.python }})
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-macos-${{ matrix.python }}
          path: dist/*.whl

  # ------------------------------------------------------------------
  # Build sdist (source distribution for PyPI)
  # ------------------------------------------------------------------
  build-sdist:
    name: Build sdist
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build sdist
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python build just-buildit numpy
          mkdir -p dist
          .venv/bin/python -m build --no-isolation --sdist --outdir dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-sdist
          path: dist/*.tar.gz

  # ------------------------------------------------------------------
  # Build and package C libraries (headers + static + shared)
  # for Linux x86_64 and macOS arm64.
  # ------------------------------------------------------------------
  build-c-linux:
    name: Package C library (manylinux_2_28 x86_64)
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build in manylinux container and install to prefix
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w /project \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -euxc "
              dnf install -y cmake zeromq-devel fftw-devel pkg-config
              cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_PYTHON=OFF
              cmake --build build --parallel
              cmake --install build --prefix /project/install
            "

      - name: Create tarball
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/doppler-${VERSION}-linux-x86_64.tar.gz" \
            -C install .

      - name: Upload C library (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: c-dist-linux
          path: dist/doppler-*-linux-x86_64.tar.gz

  build-c-macos:
    name: Package C library (macOS arm64)
    needs: verify-version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install cmake zeromq fftw pkg-config

      - name: Build and install to prefix
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_PYTHON=OFF
          cmake --build build --parallel
          cmake --install build \
            --prefix "${{ github.workspace }}/install"

      - name: Create tarball
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/doppler-${VERSION}-macos-arm64.tar.gz" \
            -C install .

      - name: Upload C library (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: c-dist-macos
          path: dist/doppler-*-macos-arm64.tar.gz

  # ------------------------------------------------------------------
  # Publish to PyPI (uses trusted publishing — configure in PyPI)
  # ------------------------------------------------------------------
  publish-python:
    name: Publish to PyPI
    needs: [verify-version, test, build-sdist, build-python, build-macos]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------------------------------------------------
  # GitHub Release with auto-generated notes
  # ------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs:
      - verify-version
      - test
      - build-sdist
      - build-python
      - build-macos
      - build-c-linux
      - build-c-macos
      - publish-python
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          merge-multiple: true
          path: dist/

      - name: Download C artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: c-dist-*
          merge-multiple: true
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            ## Install

            **Python:**
            ```sh
            pip install doppler-dsp==${{ needs.verify-version.outputs.version }}
            pip install "doppler-dsp[cli]==${{ needs.verify-version.outputs.version }}"
            pip install "doppler-dsp[specan]==${{ needs.verify-version.outputs.version }}"
            ```

            **C library:** download the pre-built tarballs from the assets below.

            See [CHANGELOG.md](CHANGELOG.md) for details.
