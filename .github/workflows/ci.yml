name: CI

on:
  push:
    branches: [ main, develop ]
  # No base-branch filter: a stacked PR (base = another feature branch) must
  # get the same CI as one targeting main — an unfiltered pull_request event
  # runs on every PR, while the push trigger above keeps post-merge runs
  # scoped to the long-lived branches (no double-run for feature pushes).
  pull_request:

# A force-push to a PR (routine while a stacked branch rebases) supersedes
# the in-flight run — cancel it. Pushes to main/develop never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------------------------
  # Native C build + CTest on Ubuntu and macOS
  # ------------------------------------------------------------------
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is intentionally unsupported: signal-processing users on
        # Windows run under WSL2, a VM, or a container. Dropping it removes the
        # flaky MSYS2 toolchain setup and the MinGW build/test matrix.
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      run: |
        curl -sSL https://just-buildit.github.io/get-jb.sh | bash
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install dependencies (Ubuntu)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        jbx just-bashit:install-deps -g runtime,dev -s apt

    - name: Install dependencies (macOS)
      if: startsWith(matrix.os, 'macos')
      run: jbx just-bashit:install-deps -g runtime,dev -s brew

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Example smoke tests
      run: make test-examples

    - name: Rust FFI tests
      run: make rust-test

    # Early portability signal: the release pipeline already objdumps every
    # wheel .so for leaked AVX (release.yml), but only on tags — too late to
    # catch a flag regression in review. The default `make build` here uses the
    # portable baseline (x86-64-v2, no AVX), identical to the manylinux wheel,
    # so any %ymm/%zmm outside a runtime-dispatched *avx512* function means
    # -march=native (or a stray wide-SIMD flag) leaked into the default build.
    # x86_64 Linux only: macOS is arm64 (NEON, no AVX) and Windows isn't shipped.
    - name: Verify portable SIMD (no leaked AVX2/AVX-512)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        bad=$(objdump -d build/libdoppler.so 2>/dev/null | awk '
          /^[0-9a-f]+ <.*>:/ { fn=$2; gsub(/[<>:]/, "", fn) }
          /%zmm[0-9]|%ymm[0-9]/ { if (fn !~ /avx512/) { print fn; exit } }
        ')
        if [ -n "$bad" ]; then
          echo "::error::libdoppler.so has wide SIMD in non-dispatched function '${bad}' — non-portable (a wide-SIMD flag leaked into the default build?)"
          exit 1
        fi
        echo "OK — wide SIMD only in runtime-dispatched *avx512* functions."

    # The core libdoppler is pure C and must link only -lm — no libstdc++/CXXABI.
    # pocketfft is C99 (no longer C++). This gate catches any C++ creeping back
    # into the core (e.g. a new .cc TU), which would re-break downstreams that
    # cannot supply a matching libstdc++. ZMQ (the only C++ ever in this repo)
    # was removed entirely, so libdoppler_stream (the optional NATS component)
    # is checked here too — the whole build is pure C now, not just the core.
    # NB: __cxa_finalize@GLIBC is a libc symbol (not libstdc++) and is excluded by
    # matching only GLIBCXX_/CXXABI_/std::/operator new|delete.
    - name: Verify C++-free build (no libstdc++/CXXABI anywhere)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        pat='GLIBCXX_|CXXABI_|std::|operator new|operator delete'
        bad=$(nm -CD build/libdoppler.so 2>/dev/null | grep -E "$pat" || true)
        bad="$bad$(nm -C build/libdoppler.a 2>/dev/null | grep -E "$pat" || true)"
        bad="$bad$(nm -CD build/libdoppler_stream.so 2>/dev/null | grep -E "$pat" || true)"
        bad="$bad$(nm -C build/libdoppler_stream.a 2>/dev/null | grep -E "$pat" || true)"
        if [ -n "$bad" ]; then
          echo "::error::doppler references the C++ runtime — the whole build must be pure C:"
          echo "$bad" | head -20
          exit 1
        fi
        if ldd build/libdoppler.so | grep -qi 'libstdc++'; then
          echo "::error::libdoppler.so has a dynamic libstdc++ dependency"
          exit 1
        fi
        if ldd build/libdoppler_stream.so | grep -qi 'libstdc++'; then
          echo "::error::libdoppler_stream.so has a dynamic libstdc++ dependency"
          exit 1
        fi
        echo "OK — doppler is C++-free everywhere (libstdc++/CXXABI absent; links -lm only)."

    # Statically link the core archive into a downstream C program with just -lm
    # — no -lstdc++, no special linker flags — on EVERY platform. This is the
    # consumer scenario the release C-tarball smoke checks, hoisted into CI so a
    # regression (e.g. an undefined-symbol seam that only ld64 rejects) is caught
    # on macOS *before* a release rather than after the PyPI publish. The
    # consumer drives doppler_wfmgen (file output), exercising the
    # wfm_stream_sink_* weak-stub seam that keeps libdoppler.a self-contained.
    - name: Smoke-test static link (libdoppler.a -lm)
      run: |
        cc examples/consumer/main.c -Inative/inc -Ibuild/native/inc \
           build/libdoppler.a -lm -o "${RUNNER_TEMP}/consumer_smoke"
        ( cd "${RUNNER_TEMP}" && ./consumer_smoke )
        echo "OK — libdoppler.a links into a downstream with only -lm on ${{ matrix.os }}."

  # ------------------------------------------------------------------
  # Python package build + pytest
  # ------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      run: |
        curl -sSL https://just-buildit.github.io/get-jb.sh | bash
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install system deps
      run: |
        sudo apt-get update
        jbx just-bashit:install-deps -g runtime,dev -s apt

    - name: Install uv + Python + package deps
      uses: astral-sh/setup-uv@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dev deps
      run: uv sync --group dev

    - name: Start NATS JetStream broker (for nats:// stream tests)
      # The stream suite's nats:// tests self-skip when 127.0.0.1:4222 is
      # unreachable; start a JetStream broker so they actually run in CI.
      # A service container can't pass the `-js` flag, so run it explicitly.
      # Started here, before any build/test step, because the "Doctest
      # generated stubs" step below now needs a live broker too (stream.pyi's
      # examples create real nats:// Publisher/Push/etc. handles).
      run: |
        docker run -d --name nats -p 4222:4222 nats:2.10 -js
        for _ in $(seq 1 50); do
          (exec 3<>/dev/tcp/127.0.0.1/4222) 2>/dev/null && break || sleep 0.2
        done
        echo "NATS JetStream broker ready on 127.0.0.1:4222"

    - name: Build C library
      run: make build

    - name: Build Python C extensions
      run: make pyext

    - name: Doctest generated stubs
      # The .pyi docstrings are derived from each _core.h's Doxygen by jm.
      # Run their synthesized examples against the freshly built extensions so
      # a doc that no longer matches the API fails CI ("passing examples
      # everywhere"). Only the .pyi files are collected as doctest sources.
      run: |
        uv run python -m pytest --doctest-glob='*.pyi' -q \
          $(find src/doppler -name '*.pyi')

    - name: Doctest API reference pages
      # jm synthesizes .pyi docstrings for *objects* but not module-level free
      # functions (detection, spectral helpers, ...), so those modules' runnable
      # examples live in their curated docs/api/*.md page instead. Gate them the
      # same way: any `>>>` example on an API page must pass against the build.
      run: uv run python -m pytest --doctest-glob='*.md' -q docs/api/

    - name: Doc snippet drift gate
      # Fail-closed: every ```python fence in docs/ (guides, gallery, prose) is
      # executed or output-checked, discovered — not registered — so a NEW page
      # is gated on arrival. Version-independent, so run it once. Backlog of
      # not-yet-gated pages: docs/.doc-snippet-ignore. See docs/dev/doc-examples.md.
      if: matrix.python-version == '3.12'
      run: uv run python -m pytest -m docs_snippets -q src/doppler/tests/test_doc_snippets.py

    - name: Test with coverage
      # The doc-snippet gate is version-independent and has its own step above
      # (3.12 only), so exclude it here to avoid running it on all 6 versions
      # and to keep a slow/hanging snippet out of the coverage matrix.
      run: |
        uv run pytest src/ -v -m "not docs_snippets" \
          --cov \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml

    - name: Stop NATS broker
      if: always()
      run: docker rm -f nats || true

    - name: Python example smoke tests
      run: make test-examples-python

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: matrix.python-version == '3.12'
      with:
        name: coverage-report
        path: coverage.xml

  # ------------------------------------------------------------------
  # glibc 2.28 compatibility (Debian 10 / Buster)
  # Catches any accidental use of glibc symbols > 2.28 at build time.
  # ------------------------------------------------------------------
  glibc-228:
    name: glibc 2.28 (Debian 10)
    runs-on: ubuntu-latest
    container: debian:buster-slim

    steps:
    - uses: actions/checkout@v4

    - name: Install build deps + cmake ≥ 3.16
      run: |
        # Debian Buster reached EOL; packages are on the archive mirror.
        printf 'deb http://archive.debian.org/debian buster main\ndeb http://archive.debian.org/debian-security buster/updates main\n' \
          > /etc/apt/sources.list
        apt-get -o Acquire::Check-Valid-Until=false update
        apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          ca-certificates \
          wget
        # Kitware's Buster apt repo is also EOL; use the statically-linked
        # cmake binary from the GitHub release instead.
        CMAKE_VER=3.28.6
        wget -q "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VER}/cmake-${CMAKE_VER}-linux-x86_64.sh" \
          -O /tmp/cmake-install.sh
        sh /tmp/cmake-install.sh --skip-license --prefix=/usr/local
        rm /tmp/cmake-install.sh

    - name: Build
      run: make build

    - name: Test examples
      run: make test-examples

    - name: Verify no glibc symbols > 2.28
      run: |
        BAD=$(objdump -T build/libdoppler.so \
              | grep -oP 'GLIBC_\K[0-9.]+' \
              | sort -Vu \
              | awk -F. '$1 > 2 || ($1 == 2 && $2 > 28)')
        if [ -n "$BAD" ]; then
          echo "ERROR: libdoppler.so references glibc > 2.28: $BAD"
          objdump -T build/libdoppler.so | grep 'GLIBC_' | grep -v 'GLIBC_2\.[0-9]\b\|GLIBC_2\.1[0-9]\b\|GLIBC_2\.2[0-8]\b'
          exit 1
        fi
        echo "OK — all glibc symbols ≤ 2.28"

  # ------------------------------------------------------------------
  # Doxygen C API docs — zero warnings required
  # ------------------------------------------------------------------
  doxygen:
    name: Doxygen
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install jbx
      run: |
        curl -sSL https://just-buildit.github.io/get-jb.sh | bash
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install doxygen + LaTeX
      run: |
        sudo apt-get update
        jbx just-bashit:install-deps -g docs -s apt

    - name: Run doxygen (zero warnings)
      run: |
        doxygen Doxyfile 2>&1 | tee doxygen.log
        if grep -q 'warning:' doxygen.log; then
          echo "Doxygen produced warnings — failing."
          exit 1
        fi

  # ------------------------------------------------------------------
  # Specan demo frames staleness check
  # ------------------------------------------------------------------
  specan-demo:
    name: Specan demo frames
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check frames kept in sync with specan source
      run: |
        BASE=${{ github.event.pull_request.base.sha || 'HEAD^' }}
        SPECAN=$(git diff --name-only "$BASE"...HEAD -- src/specan/doppler_specan/ | wc -l)
        FRAMES=$(git diff --name-only "$BASE"...HEAD -- docs/specan/frames.json | wc -l)
        if [ "$SPECAN" -gt 0 ] && [ "$FRAMES" -eq 0 ]; then
          echo "src/specan/doppler_specan/ changed but docs/specan/frames.json was not updated."
          echo "Run 'make record-demo' and commit the result."
          exit 1
        fi
        echo "OK (specan_changes=$SPECAN frames_changes=$FRAMES)"

  # ------------------------------------------------------------------
  # Documentation build (zensical)
  # ------------------------------------------------------------------
  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.12'

    - name: Install dev deps
      run: uv sync --group dev --group docs

    - name: Check Python API docs coverage
      # Fails if a public symbol (module __all__) is documented nowhere under
      # docs/api/. Pre-existing gaps are baselined in .api-coverage-ignore, so
      # this only trips on a NEW undocumented surface. doppler is importable
      # here because uv sync built the extensions for mkdocstrings.
      run: uv run python scripts/check_api_docs.py

    - name: Check docs nav index coverage
      # Fails if a page under docs/design/, docs/dev/, or docs/gallery/ (on
      # disk, or listed in mkdocs.yml's nav) has no bullet in that section's
      # index.md. Those index pages are hand-curated and have rotted more
      # than once already; this keeps the backlog at zero going forward.
      run: uv run python scripts/check_nav_index.py

    - name: Check related-pages drift
      # Fails if docs/api/*.md's generated "## Related pages" block doesn't
      # match a fresh scan of docs/gallery|guide|design|dev for a backtick
      # or link-text mention of that page's symbols. Run
      # `make docs-relink` locally to regenerate after adding a cross-link.
      run: uv run python scripts/gen_related_pages.py --check

    - name: Check serialization stance
      # Fails if an object declares neither serializable="true" nor is opted
      # out as stateless (scripts/.serializable-stateless). The rollout set is
      # baselined in scripts/.serializable-ignore (burn-down to empty), so this
      # only trips on a NEW object that skipped the choice. Pure-Python check.
      run: uv run python scripts/check_serializable.py

    - name: Build docs
      run: uv run zensical build

  # ------------------------------------------------------------------
  # Docker image build + container tests
  # ------------------------------------------------------------------
  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build image
      run: docker build -t doppler:test .

    - name: Run C unit tests
      run: |
        docker run --rm doppler:test sh -c '
          rc=0
          for t in /app/test_*; do
            echo "--- $t ---"
            "$t"
            tc=$?
            if [ "$tc" -ne 0 ] && [ "$tc" -ne 77 ]; then rc=$tc; fi
          done
          exit $rc'

  # ------------------------------------------------------------------
  # just-makeit manifest drift gate
  #
  # Asserts the generated glue (bindings, stubs, CMake, _core.h decls) on disk
  # still matches what `jm apply` would produce from just-makeit.toml +
  # objects/*.toml. This is what makes doppler a clean jm poster child: any
  # hand-edit to a glue file, or a manifest change left un-applied, fails CI.
  #
  # Uses jm's native gate (jm status --check, just-makeit#140). jm is pinned to
  # the version the tree was generated with; bump it in lock step with a
  # `jm apply` reconcile commit. No allowlist: ddc/ddcr's 5-arg
  # `*_execute(..., out, max_out)` is now declared `pass_capacity = true`
  # (just-makeit#138) so apply generates it exactly and there is zero drift.
  # ------------------------------------------------------------------
  # Lint + format gate for hand-written code and docs (ruff, clang-format v19,
  # mdformat, hygiene hooks). jm-generated glue (.pyi, *_ext.c aggregators,
  # native/inc headers, generated CMakeLists, re-export __init__.py, wavegen.py)
  # is excluded in .pre-commit-config.yaml and guarded instead by manifest-drift.
  pre-commit:
    name: pre-commit (lint + format)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - uses: pre-commit/action@v3.0.1

  manifest-drift:
    name: jm manifest drift gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Check manifest drift
      # --refresh: ignore setup-uv's cached PyPI index so a just-published jm
      # pin resolves on the first run after a release (no stale-cache race).
      run: uvx --refresh --from 'just-makeit==0.28.9' just-makeit status --check

  # ------------------------------------------------------------------
  # Code coverage (C tests ∪ Python ∪ Rust). clang source-based instrumentation
  # (-fprofile-instr-generate -fcoverage-mapping) on every first-party C object;
  # the CTest suite, pytest (against the instrumented .so), and the Rust FFI
  # tests (linking the instrumented libdoppler.so) each emit .profraw, merged
  # into one llvm-cov report attributed to the hand-written _core.c. Publishes
  # the HTML + lcov as an artifact, and GATES PRs via diff-cover: a PR's
  # added/changed C lines must be >= 90% covered (it's in ci-passed needs). Pure
  # .py/.rs diffs carry no C coverage data and aren't counted.
  # ------------------------------------------------------------------
  coverage:
    name: coverage (C + Python + Rust)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        # Full history so the patch gate can diff against origin/main.
        fetch-depth: 0

    - name: Install jbx
      run: |
        curl -sSL https://just-buildit.github.io/get-jb.sh | bash
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install system deps
      run: |
        sudo apt-get update
        jbx just-bashit:install-deps -g runtime,dev -s apt
        # clang + the matching llvm tools (llvm-profdata / llvm-cov).
        sudo apt-get install -y clang llvm

    - name: Install uv + Python + package deps
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.13'

    - name: Install Python dev deps
      run: uv sync --group dev

    - name: Start NATS JetStream broker (covers the nats:// stream path)
      # The stream suite's nats:// tests self-skip when 127.0.0.1:4222 is
      # unreachable; start a JetStream broker so stream_nats.c is exercised.
      run: |
        docker run -d --name nats -p 4222:4222 nats:2.10 -js
        for _ in $(seq 1 50); do
          (exec 3<>/dev/tcp/127.0.0.1/4222) 2>/dev/null && break || sleep 0.2
        done
        echo "NATS JetStream broker ready on 127.0.0.1:4222"

    - name: Coverage (clang source-based; C ∪ Python ∪ Rust)
      run: make coverage | tee coverage.txt

    - name: Stop NATS broker
      if: always()
      run: docker rm -f nats 2>/dev/null || true

    - name: Patch-coverage gate (changed C lines must be >= 90%)
      # diff-cover fails the job (→ blocks ci-passed) when a PR's added/changed
      # C lines aren't covered by the merged report. Pure .py/.rs diffs carry no
      # C coverage data and aren't counted. Pushes to main diff empty → pass.
      run: |
        git fetch --no-tags origin main
        make coverage-gate COV_BASE=origin/main

    - name: Coverage summary
      if: always()
      run: |
        echo '### Merged coverage (C ∪ Python ∪ Rust)' >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        grep -E '^TOTAL' coverage.txt >> "$GITHUB_STEP_SUMMARY" || true
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          build-cov/html
          build-cov/coverage.lcov

  # ------------------------------------------------------------------
  # Aggregator: a single "CI passed" check that is green only when every
  # required job above succeeded. The release workflow polls this check on the
  # tagged commit (verify-ci) instead of re-running the suite — the merge to
  # main already gated it, so the release only confirms + builds + publishes.
  # ------------------------------------------------------------------
  ci-passed:
    name: CI passed
    needs:
      - build-and-test
      - python
      - glibc-228
      - doxygen
      - specan-demo
      - docs
      - docker
      - pre-commit
      - manifest-drift
      - coverage
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Require all jobs to have succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || \
                "${{ contains(needs.*.result, 'cancelled') }}" == "true" || \
                "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::a required CI job did not succeed — CI not green"
            exit 1
          fi
          echo "All required CI jobs succeeded."
