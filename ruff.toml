# Ruff configuration for DSP Python projects.
# Covers linting (replaces flake8 + isort + pyupgrade) and formatting.
# Pair with mypy.ini for full type inference and checking.
#
# Per-project override — add to pyproject.toml or a local ruff.toml:
#   [tool.ruff.lint.isort]
#   known-first-party = ["myproject"]

line-length = 79
target-version = "py39"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes — undefined names, unused imports, redefinitions
    "I",    # isort — import ordering
    "UP",   # pyupgrade — modernise syntax to target-version
    "B",    # flake8-bugbear — common bugs and design issues
    "C4",   # flake8-comprehensions — idiomatic list/dict/set expressions
    "SIM",  # flake8-simplify — unnecessary complexity
    "TC",   # flake8-type-checking — TYPE_CHECKING import hygiene
    "ANN",  # flake8-annotations — require type annotations on all functions
    "N",    # pep8-naming — consistent identifier casing
    "NPY",  # numpy rules — deprecated API, random generator hygiene
    "RUF",  # ruff-specific — miscellaneous correctness and style
]
ignore = [
    "ANN101",  # `self` annotation — deprecated rule, handled automatically
    "ANN102",  # `cls` annotation — same
    "ANN204",  # missing return type on __init__ — always None, noisy
    "ANN401",  # disallows `Any` — too strict for C extension wrapper boundaries
]

[lint.isort]
known-first-party = []    # override per project: known-first-party = ["myproject"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true      # format code blocks inside docstrings
docstring-code-line-length = 79
