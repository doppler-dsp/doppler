name: Perf regression (advisory)

# Advisory perf gate (jm bench --check, just-makeit#141). On a PR it benches the
# base (main) and the PR head on the SAME pinned runner and flags any benchmark
# that regresses beyond the threshold.
#
# Why advisory (continue-on-error) and not blocking: microbenchmark wall-times
# vary run-to-run on shared CI runners. A same-runner base-vs-head comparison
# with pytest-benchmark (--python-only, which calibrates rounds/iterations) is
# the least-noisy signal available, but it is still not tight enough to *block*
# merges without false positives. This surfaces regressions for a human to
# judge; promote to a required check once the variance is characterised.
#
# A committed baseline is deliberately NOT used: snapshots in benchmarks/history
# drift across releases/implementations and produce meaningless deltas.

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  perf:
    name: perf regression (advisory)
    runs-on: ubuntu-24.04        # pinned for run-to-run comparability
    continue-on-error: true      # informational — never blocks the PR

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0           # need the PR base commit for the baseline

    - name: Install jbx
      run: |
        curl -sSL https://just-buildit.github.io/get-jb.sh | bash
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install system deps
      run: |
        sudo apt-get update
        jbx just-bashit:install-deps -g runtime,dev -s apt

    - name: Install uv + Python 3.12
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.12'   # pinned for comparability

    - name: Benchmark the PR base (main) as baseline
      run: |
        git worktree add /tmp/base "${{ github.event.pull_request.base.sha }}"
        cd /tmp/base
        uv sync --group dev
        # Build the Python extensions first — jm bench builds with BUILD_PYTHON
        # off, so the pytest-benchmark suite can't import doppler.* without this.
        make build
        make pyext
        uvx --refresh --from 'just-makeit==0.19.32' just-makeit bench --python-only --tag base
        mkdir -p "$GITHUB_WORKSPACE/benchmarks/history"
        cp benchmarks/history/base.json \
           "$GITHUB_WORKSPACE/benchmarks/history/base.json"

    - name: Benchmark the PR head and check against the baseline
      run: |
        uv sync --group dev
        make build
        make pyext
        # The `*_1k` (1024-sample) benches are overhead-bound: per-call Python +
        # scheduler cost dominates the tiny kernel work, so their min wall-time
        # swings far past 30% from runner jitter alone (base and head are benched
        # in separate steps, not interleaved). Across recent PRs they produced
        # ~all the false positives — flagging +50–78% on changes that touch no
        # hot path (coverage config, enum renames). Exempt the whole family so a
        # surfaced regression is trustworthy; a real kernel regression still
        # shows in the throughput-bound (64k/block) variants, which stay gated.
        # `--allow` matches the bare test name, exempting it across all modules.
        uvx --refresh --from 'just-makeit==0.19.32' just-makeit bench --check \
          --python-only --baseline base --threshold 0.30 \
          --allow test_bench_decimate_1k \
          --allow test_bench_execute_1k \
          --allow test_bench_execute_cf32_1k \
          --allow test_bench_execute_cf64_1k \
          --allow test_bench_execute_decim_1k \
          --allow test_bench_execute_interp_1k \
          --allow test_bench_generate_1k \
          --allow test_bench_interp_1k \
          --allow test_bench_push_1k \
          --allow test_bench_push_ptr_1k \
          --allow test_bench_steps_1k \
          --allow test_bench_steps_ctrl_1k \
          --allow test_bench_steps_u32_1k \
          --allow test_bench_steps_u32_ovf_1k
