include = ["objects/*.toml"]

[project]
jm_version = "0.19.21"
name = "doppler"
version = "0.1.0"
build = "cmake"
# doppler does not target Windows (signal-processing users run WSL2/VM/container
# — see docs). Omitting "windows" drops jm's per-component MinGW DLL-copy
# boilerplate (jm-gh-213); the drift gate treats its absence as correct.
platforms = ["linux", "macos"]
perf = "true"
pytest = "true"
pytest_benchmark = "true"
schema = "6"
c_deps = ["hbdecim", "resamp", "wfmcompose"]
# measure.pyi is now jm-generated: the analyze() methods use single=true (gh-244),
# so jm emits the PyStructSequence binding + the stub itself — no hand-maintenance.
status_allow = ["zensical.toml"]

# ── Waveform enum single-source-of-truth (gh-285) ────────────────────────────
# One string↔int table per synth enum; list order IS the C enum value
# (append-only — never reorder). The wfm_compose composer (below) emits its C
# lookup tables from these, collapsing the string tables historically duplicated
# across wfmgen.c / wfm_json.c / wfmcompose_py.c / compose.py to this one source.
[[enum]]
name = "wfm_type"
values = ["tone", "noise", "pn", "bpsk", "qpsk", "chirp", "bits"]

[[enum]]
name = "snr_mode"
values = ["auto", "fs", "ebno", "esno"]

[[enum]]
name = "wfm_lfsr"
values = ["galois", "fibonacci"]

[[enum]]
name = "bitmod"
values = ["none", "bpsk", "qpsk"]

[[enum]]
name = "wfm_pulse"
values = ["rect", "rrc"]

# Transport SSOT enums (order = the C int contract; match _FTYPES/_STYPES/_ENDIANS
# in the old compose.py and the wfm_filetype_t / sample_type / endian ints).
[[enum]]
name = "ftype"
values = ["raw", "csv", "blue", "sigmf"]

[[enum]]
name = "stype"
values = ["cf32", "cf64", "ci32", "ci16", "ci8"]

[[enum]]
name = "endian"
values = ["le", "be"]

# Transport handle module: Reader (the dual of Writer). Path-based open, the
# wfm_reader_info struct getter (resolved once — fixed per open), read int->array.
[module.wfm_reader]
kind            = "handle"
backing         = "wfm_reader"
header          = "wfm/wfm_reader.h"
package         = "wfm"
type_name       = "Reader"
context_manager = true
close_fn        = "wfm_reader_close"
create_fn       = "wfm_reader_open"
depends_on      = [{ name = "wfm_reader", link = true }]
# wfm_reader.c parses SigMF sidecars via the vendored cJSON OBJECT lib; libm too.
extra_link_libs = ["wfm_cjson", "m"]
create_args = [
    { name = "path", type = "path" },
    { name = "sample_type", type = "int", enum = "stype", default = "cf32", kwonly = true },
    { name = "endian", type = "int", enum = "endian", default = "le", kwonly = true },
]

[[module.wfm_reader.methods]]
name = "read"
fn = "wfm_reader_read"
returns = "float _Complex[]"
args = [{ name = "n", type = "size_t" }]

[[module.wfm_reader.getters]]
fn = "wfm_reader_info"
out = "wfm_reader_info_t"
cache = true
fields = [
    { name = "file_type", from = "file_type", type = "int", enum = "ftype" },
    { name = "sample_type", from = "sample_type", type = "int", enum = "stype" },
    { name = "endian", from = "endian", type = "int", enum = "endian" },
    { name = "fs", from = "fs", type = "double" },
    { name = "fc", from = "fc", type = "double" },
    { name = "num_samples", from = "num_samples", type = "size_t" },
]

# Transport handle module: SampleClock over dp_sample_clock_t (timing_core).
# init_fn (jm#320) constructs in place: jm mallocs sizeof(dp_sample_clock_t),
# calls dp_sample_clock_init(h, fs, resync), and frees on close/dealloc — no
# hand-written create/destroy. The stats getter reads the real public struct
# (a genuine decoded-getter, not a shim). No optional_backend: doppler targets
# linux/macos (both POSIX) so the clock is always present.
[module.sample_clock]
kind            = "handle"
backing         = "dp_sample_clock"
handle_type     = "dp_sample_clock_t"
header          = "timing/timing_core.h"
package         = "wfm"
type_name       = "SampleClock"
init_fn         = "dp_sample_clock_init"
# Empty close_fn: the clock owns no internal resources, so teardown is jm's
# free(self->h) alone (no <backing>_close finalizer). init_fn makes jm own the
# malloc/free.
close_fn        = ""
depends_on      = [{ name = "timing", link = true }]
create_args = [
    { name = "fs", type = "double" },
    { name = "resync", type = "int", default = "0", kwonly = true },
]

[[module.sample_clock.methods]]
name = "pace"
fn = "dp_sample_clock_pace"
returns = "double"
args = [{ name = "count", type = "size_t" }]

[[module.sample_clock.methods]]
name = "stamp"
fn = "dp_sample_clock_stamp"
returns = "uint64_t"

[[module.sample_clock.methods]]
name = "reset"
fn = "dp_sample_clock_reset"

[[module.sample_clock.methods]]
name = "resync"
fn = "dp_sample_clock_resync"

[[module.sample_clock.getters]]
fn = "dp_sample_clock_stats"
out = "dp_sample_clock_t"
cache = false
fields = [
    { name = "samples", from = "n", type = "uint64_t" },
    { name = "underruns", from = "underruns", type = "uint64_t" },
    { name = "max_lateness", from = "max_late_ns", type = "double", scale = "1e-9" },
]

# Transport handle module: Writer. Path-opening shim owns the FILE (closes it)
# and folds headroom->set_gain so headroom is a plain ctor arg. Live stats getter
# (peak_dbfs/clipped are derived exprs over the snapshot + the stashed sample_type).
[module.wfm_writer]
kind            = "handle"
backing         = "wfm_writer"
header          = "wfm/wfm_writer.h"
package         = "wfm"
type_name       = "Writer"
context_manager = true
close_fn        = "wfm_writer_close"
create_fn       = "wfm_writer_open_path"
depends_on      = [{ name = "wfm_writer", link = true }]
extra_link_libs = ["wfm_cjson", "m"]
create_args = [
    { name = "path", type = "path" },
    { name = "file_type", type = "int", enum = "ftype", default = "raw", kwonly = true },
    { name = "sample_type", type = "int", enum = "stype", default = "cf32", kwonly = true },
    { name = "endian", type = "int", enum = "endian", default = "le", kwonly = true },
    { name = "fs", type = "double", default = "1e6", kwonly = true },
    { name = "fc", type = "double", default = "0.0", kwonly = true },
    { name = "total", type = "size_t", default = "0", kwonly = true },
    { name = "headroom", type = "double", default = "0.0", kwonly = true },
]

[[module.wfm_writer.methods]]
name = "write"
fn = "wfm_writer_write"
returns = "size_t"
args = [{ name = "iq", type = "float _Complex[]" }]

[[module.wfm_writer.methods]]
name = "track_clipping"
fn = "wfm_writer_track_clipping"
args = [{ name = "on", type = "int", default = "1" }]

# Per-field scalar getters (jm#320): each property binds its own getter fn
# directly over the writer's existing peak/clip_fraction accessors — no struct
# snapshot shim. peak_dbfs/clipped are derived exprs: `tmp` is the bound
# getter's scalar return; `self->sample_type` is the stashed ctor arg.
[[module.wfm_writer.getters]]
fields = [
    { name = "clip_fraction", getter = "wfm_writer_clip_fraction", type = "double" },
    { name = "peak_dbfs", getter = "wfm_writer_peak", type = "double", expr = "tmp > 0 ? 20*log10(tmp) : -INFINITY" },
    { name = "clipped", getter = "wfm_writer_clipped", type = "int" },
]

# Transport handle module: ZmqSink (POSIX, opt-in zmq). No stats props (the old
# class exposes only send/close). send is the array+scalars shape (#308). The zmq
# backend is the vendored C++ libzmq via the weak-seam real component — hence the
# stream_core_obj / zmq_vendor_static / Threads / stdc++ link line.
[module.wfm_sink]
kind            = "handle"
backing         = "wfm_zmq_sink"
handle_type     = "wfm_zmq_sink_t"
header          = "wfm/wfm_sink.h"
package         = "wfm"
type_name       = "ZmqSink"
context_manager = true
close_fn        = "wfm_zmq_sink_close"
create_fn       = "wfm_zmq_sink_open"
depends_on      = [{ name = "wfm_sink", link = true }]
extra_link_libs = ["$<TARGET_OBJECTS:stream_core_obj>", "zmq_vendor_static", "Threads::Threads", "stdc++", "m"]
create_args = [
    { name = "endpoint", type = "const char *" },
    { name = "sample_type", type = "int", enum = "stype", default = "cf32", kwonly = true },
]

[[module.wfm_sink.methods]]
name = "send"
fn = "wfm_zmq_sink_send"
returns = "int"
args = [
    { name = "iq", type = "float _Complex[]" },
    { name = "fs", type = "double" },
    { name = "fc", type = "double" },
]

[[module.wfm_sink.methods]]
name = "track_clipping"
fn = "wfm_zmq_sink_track_clipping"
args = [{ name = "on", type = "int", default = "1" }]

# Symmetric with Writer: the C tracks clip stats on integer paths (the old Python
# class under-exposed them). Per-field getters (jm#320) bind the sink's existing
# peak/clip_fraction accessors directly; peak_dbfs/clipped are derived exprs
# (`tmp` = the getter scalar, `self->sample_type` = the stashed ctor arg).
[[module.wfm_sink.getters]]
fields = [
    { name = "clip_fraction", getter = "wfm_zmq_sink_clip_fraction", type = "double" },
    { name = "peak_dbfs", getter = "wfm_zmq_sink_peak", type = "double", expr = "tmp > 0 ? 20*log10(tmp) : -INFINITY" },
    { name = "clipped", getter = "wfm_zmq_sink_clipped", type = "int" },
]

[module.cvt]
objects = ["f32_to_i16", "i16_to_f32", "i32_to_f32", "i8_to_f32", "f32_to_i16u32", "f32_to_i16u64", "i16u32_to_f32", "i16u64_to_f32", "f32_to_uq15", "uq15_to_f32", "adc"]

[module.accumulator]
objects = ["acc_f32", "acc_cf64", "acc_trace"]

[module.filter]
objects = ["fir", "hbdecim_q15"]

[module.source]
objects = ["nco", "lo", "awgn"]
extra_link_libs = ["$<$<PLATFORM_ID:Linux>:mvec>"]

[module.wfm]
objects = ["pn", "wfm_synth"]
# wfm_synth.toml's depends_on link=true (gh-225) links lo/awgn/fir _core into the
# wfm .so; pn is in-module (linked via objects). Replaces extra_link_libs.

# Fold the hand-written composition / I/O surface into doppler.wfm so the whole
# subsystem has one import path (D7). The Python `Synth` (a thin wrapper in
# compose.py over the C engine) is re-exported AFTER the C-extension import, so
# it shadows the raw engine type — the public doppler.wfm.Synth is the wrapper
# (its get_*/set_* engine accessors stay internal, D9).
[module.wfm.reexports]
compose = ["Synth", "tone", "bpsk", "qpsk", "pn", "noise", "chirp", "bits", "Segment", "Timeline", "Composer", "Writer", "Reader", "ZmqSink", "SampleClock", "sigmf_meta", "write_blue_header", "rrc_taps", "dsss_spread", "mls_poly"]
readback = ["read_iq"]

[[module.wfm.functions]]
name = "bpsk_map"
doc = "Map bits {0,1} to BPSK symbols {+1,-1} (cf32)."
out_type = "float _Complex"

[[module.wfm.functions.params]]
name = "bits"
type = "uint8_t[]"

[[module.wfm.functions]]
name = "qpsk_map"
doc = "Map QPSK symbol indices {0,1,2,3} to Gray-coded symbols (cf32)."
out_type = "float _Complex"

[[module.wfm.functions.params]]
name = "syms"
type = "uint8_t[]"

[[module.wfm.functions]]
name = "wfm_awgn_amplitude"
doc = "AWGN amplitude for a target SNR (dB, over fs) given signal power."
return_type = "float"

[[module.wfm.functions.params]]
name = "snr_db"
type = "float"

[[module.wfm.functions.params]]
name = "signal_power"
type = "float"

[[module.wfm.functions]]
name = "wfm_ebno_to_snr_db"
doc = "Convert Eb/No (dB) to SNR (dB over fs)."
return_type = "float"

[[module.wfm.functions.params]]
name = "ebno_db"
type = "float"

[[module.wfm.functions.params]]
name = "bits_per_symbol"
type = "int"

[[module.wfm.functions.params]]
name = "samples_per_symbol"
type = "float"

# ── Multi-segment waveform composer (gh-287, additive adoption) ──────────────
# The OO surface (Synth/Segment/Timeline/Composer + factories) generated INTO
# the .so as CPython types over the wfm_compose backing. Dual-runs alongside the
# hand-written compose.py / _wfmcompose during adoption; the cutover that retires
# the hand glue is a later PR. JSON is DELEGATED to the backing
# wfm_spec_to_json / wfm_compose_from_json|from_file so the wire format stays
# byte-identical to the existing wfmgen / --from-file schema.
[module.wfm_compose]
kind         = "composer"
backing      = "wfm_compose"
capsule_name = "doppler.wfm.compose_state"
package      = "wfm"
header       = "wfm/wfm_compose.h"
composes     = ["wfm_synth"]
sample_type  = true
# link=true cores (jm appends _core): wfm_compose (composer + wfm_json + resolve),
# wfm_dsp (DSSS/RRC taps), and the synth chain wfm_synth/lo/awgn/pn/fir. The
# vendored cJSON OBJECT lib (wfm_cjson) + libm go in extra_link_libs. This mirrors
# native/src/wfmcompose/CMakeLists.txt's test_wfm_compose link line.
depends_on = [
    { name = "wfm_compose", link = true },
    { name = "wfm_dsp", link = true },
    { name = "wfm_synth", link = true },
    { name = "lo", link = true },
    { name = "awgn", link = true },
    { name = "pn", link = true },
    { name = "fir", link = true },
]
extra_link_libs = ["wfm_cjson", "m"]

# The source type wraps wfm_source_t field-for-field (struct order); enum fields
# cross as validated strings via the SSOT, `bits` as an owned bytes buffer.
[module.wfm_compose.source]
object    = "wfm_synth"
struct    = "wfm_source_t"
type_name = "Synth"
fields = [
    { name = "type", type = "int", enum = "wfm_type", default = "tone" },
    { name = "freq", type = "double", default = "0.0", aliases = ["f_start"] },
    { name = "snr", type = "double", default = "100.0" },
    { name = "snr_mode", type = "int", enum = "snr_mode", default = "auto" },
    { name = "seed", type = "uint32_t", default = "1" },
    { name = "sps", type = "int", default = "8" },
    { name = "pn_length", type = "int", default = "7" },
    { name = "pn_poly", type = "uint64_t", default = "0" },
    { name = "lfsr", type = "int", enum = "wfm_lfsr", default = "galois" },
    { name = "level", type = "double", default = "0.0" },
    { name = "f_end", type = "double", default = "0.0" },
    { name = "bits", type = "uint8_t*", bytes = true, aliases = ["pattern"], coerce = "bit_pattern" },
    { name = "modulation", type = "int", enum = "bitmod", default = "bpsk" },
    { name = "pulse", type = "int", enum = "wfm_pulse", default = "rect" },
    { name = "rrc_beta", type = "double", default = "0.35" },
    { name = "rrc_span", type = "int", default = "8" },
]

# Standalone generation: a Synth generates samples on its own (Synth(...).steps(n))
# by delegating to the composed wfm_synth generator, built from the source config
# by the straight-C bridge `wfm_source_to_synth` (native/src/wfm/wfm_synth_bridge.c
# — no CPython; jm generates the steps/step/reset plumbing that calls it).
[module.wfm_compose.source.generates]
generator = "wfm_synth"
bridge_fn = "wfm_source_to_synth"

[module.wfm_compose.segment]
type_name = "Segment"
struct    = "wfm_segment_t"
sources   = "multi"
# Round 3 feature 4: a single-source segment proxies its source's fields as
# read-only attributes (segment.freq -> segment.sources[0].freq).
flat_sources = true
fields = [
    { name = "fs", type = "double", default = "1e6" },
    { name = "num_samples", type = "size_t", default = "1024" },
    { name = "off_samples", type = "size_t", default = "0" },
]

[module.wfm_compose.timeline]
type_name = "Timeline"
loop = ["once", "repeat", "continuous"]

[module.wfm_compose.oo]
factories          = ["tone", "noise", "pn", "bpsk", "qpsk", "chirp", "bits"]
emit               = "ctypes"
discriminant       = "type"
composer_type_name = "Composer"

# Generated Composer.stream(block) iterator (drains execute into blocks) +
# to_dict() (resolved repeat/continuous/segments as a plain nested dict — the
# generic introspection primitive SigMF/BLUE sidecars are built from).
[module.wfm_compose.composer]
stream  = true
to_dict = true

# Delegated JSON: call the backing wfm_spec_to_json (trailing headroom arg = 0.0)
# and wfm_compose_from_json / wfm_compose_from_file so the wire format is
# byte-identical to the hand-written schema. (from_json_fn/from_file_fn default to
# <backing>_from_json/_from_file, which match the real symbols.)
[module.wfm_compose.json]
enabled          = true
to_json_fn       = "wfm_spec_to_json"
to_json_trailing = ["0.0"]

[module.delay]
objects = ["delay"]

[module.spectral]
objects = ["fft", "fft2d", "corr", "corr2d", "detector", "detector2d", "psd"]
# psd_core composes acc_trace_core (the AccTrace averager); its OBJECT symbols
# are linked into the spectral .so via psd.toml's depends_on link=true (gh-225).

[[module.spectral.functions]]
name = "kaiser_enbw"
return_type = "float"

[[module.spectral.functions.params]]
name = "w"
type = "float[]"

[[module.spectral.functions]]
name = "kaiser_window"

[[module.spectral.functions.params]]
name = "w"
type = "float[]"
out = true

[[module.spectral.functions.params]]
name = "beta"
type = "float"

[[module.spectral.functions]]
name = "hann_window"

[[module.spectral.functions.params]]
name = "w"
type = "float[]"
out = true

[[module.spectral.functions]]
name = "magnitude_db_cf32"
out_type = "float"

[[module.spectral.functions.params]]
name = "x"
type = "float _Complex[]"

[[module.spectral.functions.params]]
name = "lin_floor"
type = "float"

[[module.spectral.functions.params]]
name = "offset_db"
type = "float"

[[module.spectral.functions]]
name = "magnitude_db_cf64"
out_type = "float"

[[module.spectral.functions.params]]
name = "x"
type = "double _Complex[]"

[[module.spectral.functions.params]]
name = "lin_floor"
type = "double"

[[module.spectral.functions.params]]
name = "offset_db"
type = "float"

[[module.spectral.functions]]
name = "find_peaks_f32"
return_type = "dp_peak_t"
max_results_param = "n_peaks"

[[module.spectral.functions.result_fields]]
name = "freq_norm"
type = "float"

[[module.spectral.functions.result_fields]]
name = "amplitude_db"
type = "float"

[[module.spectral.functions.params]]
name = "db"
type = "float[]"

[[module.spectral.functions.params]]
name = "n_peaks"
type = "size_t"

[[module.spectral.functions.params]]
name = "min_db"
type = "float"

[[module.spectral.functions]]
name = "obw_from_power"
return_type = "double"

[[module.spectral.functions.params]]
name = "pwr"
type = "double[]"

[[module.spectral.functions.params]]
name = "fs"
type = "double"

[[module.spectral.functions.params]]
name = "frac"
type = "double"

[[module.spectral.functions]]
name = "noise_floor_db"
return_type = "double"

[[module.spectral.functions.params]]
name = "db"
type = "float[]"
[module.measure]
objects = ["tonemeas", "nprmeas", "imdmeas"]
# measure objects compose fft_core + the spectral_core window / find_peaks free
# functions; tonemeas.toml's depends_on link=true (gh-225) links both OBJECT
# libs into the measure .so (one link=true owner suffices for the module target).

[[module.measure.functions]]
