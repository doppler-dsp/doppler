<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shift" x1="0" y1="0" x2="512" y2="0"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#2979FF"/>
      <stop offset="0.52" stop-color="#7C4DFF"/>
      <stop offset="1"    stop-color="#FF3D6E"/>
    </linearGradient>
  </defs>
  <!-- Square, full-bleed shift gradient for apple-touch / maskable PWA icons
       (iOS rounds corners; maskable crops to a safe centre). Mark sits inside
       the central ~66% safe zone. -->
  <rect width="512" height="512" fill="url(#shift)"/>
  <g transform="translate(256,256) scale(0.66) translate(-256,-256)">
    <circle cx="206" cy="256" r="156" fill="none" stroke="#fff" stroke-width="46"/>
    <circle cx="238" cy="256" r="82"  fill="none" stroke="#fff" stroke-width="46"/>
    <circle cx="276" cy="256" r="60" fill="#fff"/>
  </g>
</svg>
