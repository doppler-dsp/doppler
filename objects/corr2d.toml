[corr2d]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "Corr2D"
depends_on = ["fft2d_core"]
serializable = "true"

[[corr2d.init_params]]
name = "ref"
type = "float _Complex[]"

[[corr2d.init_params]]
name = "dwell"
type = "size_t"
default = "1"

[[corr2d.init_params]]
name = "nthreads"
type = "int"
default = "1"

# Decoupled inverse size (0 => native). A larger output zero-pads the
# cross-spectrum before the inverse → band-limited interpolation of the
# correlation surface onto a finer (ny_out, nx_out) grid. Trailing + default 0
# keeps Corr2D(ref, dwell, nthreads) backward-compatible.
[[corr2d.init_params]]
name = "ny_out"
type = "size_t"
default = "0"

[[corr2d.init_params]]
name = "nx_out"
type = "size_t"
default = "0"

[[corr2d.methods]]
name = "execute"
arg_type = "float _Complex"
return_type = "float _Complex"
variable_output = true
none_on_empty = true

[[corr2d.properties]]
name = "ny"
type = "size_t"
field = true

[[corr2d.properties]]
name = "nx"
type = "size_t"
field = true

[[corr2d.properties]]
name = "ny_out"
type = "size_t"
field = true

[[corr2d.properties]]
name = "nx_out"
type = "size_t"
field = true

[[corr2d.properties]]
name = "n_out"
type = "size_t"
field = true

[[corr2d.properties]]
name = "dwell"
type = "size_t"
field = true

[[corr2d.properties]]
name = "count"
type = "size_t"
field = true
