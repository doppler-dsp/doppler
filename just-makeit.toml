return_type = "float"

[[module.wfm.functions.params]]
name = "ebno_db"
type = "float"

[[module.wfm.functions.params]]
name = "bits_per_symbol"
type = "int"

[[module.wfm.functions.params]]
name = "samples_per_symbol"
type = "float"

[[module.wfm.functions]]
name = "mls_poly"
doc = "Maximal-length-sequence primitive polynomial for an LFSR of length n."
return_type = "uint64_t"

[[module.wfm.functions.params]]
name = "n"
type = "uint32_t"

[[module.wfm.functions]]
name = "crc16"
doc = "CRC-16-CCITT (poly 0x1021, init 0xFFFF) over an unpacked 0/1 bit array, MSB-first — the DSSS burst frame trailer wfmgen appends and BurstDemod validates."
return_type = "uint16_t"

[[module.wfm.functions.params]]
name = "bits"
type = "uint8_t[]"

[[module.wfm.functions]]
name = "rrc_taps"
doc = "Root-raised-cosine pulse-shaping taps (2*span*sps+1 unit-energy cf32 taps)."
out_type = "float"
variable_output = true
out_size = "2 * span * sps + 1"

[[module.wfm.functions.params]]
name = "beta"
type = "double"

[[module.wfm.functions.params]]
name = "sps"
type = "int"

[[module.wfm.functions.params]]
name = "span"
type = "int"

[[module.wfm.functions]]
name = "dsss_spread"
doc = "Direct-sequence spread syms by the ±1 chip code; yields len(syms)*sf chips."
out_type = "float _Complex"
variable_output = true
out_size = "syms_len * sf"

[[module.wfm.functions.params]]
name = "syms"
type = "float _Complex[]"

[[module.wfm.functions.params]]
name = "code"
type = "uint8_t[]"

[[module.wfm.functions.params]]
name = "sf"
type = "int"
[module.wfm_compose]
kind         = "composer"
backing      = "wfm_compose"
capsule_name = "doppler.wfm.compose_state"
package      = "wfm"
header       = "wfm/wfm_compose.h"
composes     = ["wfm_synth"]
sample_type  = true
# link=true cores (jm appends _core): wfm_compose (composer + wfm_json + resolve),
# wfm_dsp (DSSS/RRC taps), and the synth chain wfm_synth/lo/awgn/pn/fir. The
# vendored cJSON OBJECT lib (wfm_cjson) + libm go in extra_link_libs. This mirrors
# native/src/wfmcompose/CMakeLists.txt's test_wfm_compose link line.
extra_link_libs = ["wfm_draw_core", "wfm_cjson", "m"]

# The source type wraps wfm_source_t field-for-field (struct order); enum fields
# cross as validated strings via the SSOT, `bits` as an owned bytes buffer.
[[module.wfm_compose.depends_on]]
name = "wfm_compose"
link = true

[[module.wfm_compose.depends_on]]
name = "wfm_dsp"
link = true

[[module.wfm_compose.depends_on]]
name = "wfm_synth"
link = true

[[module.wfm_compose.depends_on]]
name = "lo"
link = true

[[module.wfm_compose.depends_on]]
name = "awgn"
link = true

[[module.wfm_compose.depends_on]]
name = "pn"
link = true

[[module.wfm_compose.depends_on]]
name = "fir"
link = true

[[module.wfm_compose.depends_on]]
name = "timing"
link = true

[[module.wfm_compose.depends_on]]
name = "wfm_writer"
link = true
[module.wfm_compose.source]
object = "wfm_synth"
struct = "wfm_source_t"
type_name = "Synth"
# Fields that accept a (lo, hi) pair drawn uniformly each repeat (composer
# epoch) — not just a scalar. The struct carries a <name>_hi companion + a
# `ranged` bitmask (wfm_compose.h); jm emits float-or-tuple parse/getset/.pyi.
ranged = [
    { name = "freq", flag = "WFM_RANGE_FREQ" },
    { name = "snr", flag = "WFM_RANGE_SNR" },
    { name = "level", flag = "WFM_RANGE_LEVEL" },
    { name = "f_end", flag = "WFM_RANGE_FEND" },
]

[[module.wfm_compose.source.fields]]
name = "type"
type = "int"
enum = "wfm_type"
default = "tone"
doc = "Waveform type."

[[module.wfm_compose.source.fields]]
name = "freq"
type = "double"
default = "0.0"
aliases = ["f_start"]
doc = "Carrier/offset frequency in Hz (normalised cycles/sample when fs=1); for chirp it is the start frequency."

[[module.wfm_compose.source.fields]]
name = "snr"
type = "double"
default = "100.0"
doc = "Signal-to-noise ratio in dB, interpreted per snr_mode; >=100 is treated as clean (no AWGN)."

[[module.wfm_compose.source.fields]]
name = "snr_mode"
type = "int"
enum = "snr_mode"
default = "auto"
doc = "How snr is interpreted: auto picks fs for tone/pn/chirp/bits and Es/No for bpsk/qpsk."

[[module.wfm_compose.source.fields]]
name = "seed"
type = "uint32_t"
default = "0"
doc = "PRNG/LFSR seed for the noise and PN streams."

[[module.wfm_compose.source.fields]]
name = "sps"
type = "int"
default = "1"
doc = "Samples per symbol (PSK) or per chip (PN); the oversampling factor."

[[module.wfm_compose.source.fields]]
name = "pn_length"
type = "int"
default = "15"
doc = "PN LFSR register length; the sequence period is 2^pn_length - 1."

[[module.wfm_compose.source.fields]]
name = "pn_poly"
type = "uint64_t"
default = "0"
doc = "PN generator polynomial; 0 auto-selects a maximal-length (MLS) polynomial for pn_length."

[[module.wfm_compose.source.fields]]
name = "lfsr"
type = "int"
enum = "wfm_lfsr"
default = "galois"
doc = "PN LFSR realization (galois or fibonacci); same period, different chip order."

[[module.wfm_compose.source.fields]]
name = "level"
type = "double"
default = "0.0"
doc = "Source power in dBFS (<=0; 0 = unit power). Applies only when summed in a Segment/Composer (gain 10^(level/20)); ignored by standalone Synth.steps()."

[[module.wfm_compose.source.fields]]
name = "f_end"
type = "double"
default = "0.0"
doc = "Chirp end frequency in Hz; ignored by non-chirp types."

[[module.wfm_compose.source.fields]]
name = "bits"
type = "uint8_t*"
bytes = true
aliases = ["pattern", "payload"]
coerce = "bit_pattern"
doc = "For type=bits: the 0/1 pattern, oversampled by sps and cycled to fill the request. For type=dsss (as `payload`): the payload bits of the burst frame."

[[module.wfm_compose.source.fields]]
name = "modulation"
type = "int"
enum = "bitmod"
default = "bpsk"
doc = "For type=bits: symbol mapping of the pattern (none=0/1 amplitude, bpsk, qpsk)."

[[module.wfm_compose.source.fields]]
name = "pulse"
type = "int"
enum = "wfm_pulse"
default = "rect"
doc = "Pulse shape for the symbol stream (pn/bpsk/qpsk/bits): rect sample-and-hold or rrc matched filter."

[[module.wfm_compose.source.fields]]
name = "rrc_beta"
type = "double"
default = "0.35"
doc = "RRC roll-off factor in (0, 1] when pulse=rrc."

[[module.wfm_compose.source.fields]]
name = "rrc_span"
type = "int"
default = "8"
doc = "RRC filter span in symbols when pulse=rrc (taps = 2*span*sps + 1)."

[[module.wfm_compose.source.fields]]
name = "symbols"
type = "float _Complex*"
complex = true
doc = "For type=symbols: a complex64 constellation stream — each element is the output point itself, oversampled by sps, cycled, and RRC-shaped with pulse=rrc. Generalises any modulation (pi/4-QPSK, QAM, ...)."

[[module.wfm_compose.source.fields]]
name = "acq_code"
type = "uint8_t*"
bytes = true
coerce = "bit_pattern"
doc = "For type=dsss: the acquisition/preamble code (0/1 chips), repeated acq_reps times unmodulated at the head of the burst — the coherent pull-in target BurstDespreader.set_acq/BurstDemod.set_preamble lock to."

[[module.wfm_compose.source.fields]]
name = "acq_reps"
type = "size_t"
default = "1"
doc = "For type=dsss: preamble repetitions (periods of acq_code before the frame)."

[[module.wfm_compose.source.fields]]
name = "data_code"
type = "uint8_t*"
bytes = true
coerce = "bit_pattern"
doc = "For type=dsss: the payload spreading code (0/1 chips) — a second code, distinct from acq_code; every frame bit (sync | payload | crc) is XOR-spread across its full length, so len(data_code) is the spreading factor."

[[module.wfm_compose.source.fields]]
name = "sync"
type = "uint8_t*"
bytes = true
coerce = "bit_pattern"
doc = "For type=dsss: the frame-sync word bits (e.g. Barker-13) between the preamble and the payload — what BurstDemod.set_sync correlates to resolve frame position and BPSK polarity. Optional."

[[module.wfm_compose.source.fields]]
name = "crc"
type = "int"
enum = "crc"
default = "crc16"
doc = "For type=dsss: the frame trailer — crc16 appends a CRC-16-CCITT over the payload bits (what BurstDemod validates as frame_valid); none omits it."

[module.wfm_compose.source.generates]
generator = "wfm_synth"
bridge_fn = "wfm_source_to_synth"

[module.wfm_compose.segment]
type_name = "Segment"
struct = "wfm_segment_t"
sources = "multi"
flat_sources = true
# Per-repeat (lo, hi) uniform draws (see source.ranged) — e.g. off_samples as
# arrival jitter that shifts the next burst's code phase.
ranged = [
    { name = "num_samples", flag = "WFM_RANGE_NUM_SAMPLES" },
    { name = "off_samples", flag = "WFM_RANGE_OFF_SAMPLES" },
    { name = "delay_samples", flag = "WFM_RANGE_DELAY_SAMPLES" },
]

[[module.wfm_compose.segment.fields]]
name = "fs"
type = "double"
default = "1.0"
doc = "Sample rate in Hz — one per segment (all sources share it)."

[[module.wfm_compose.segment.fields]]
name = "num_samples"
type = "size_t"
default = "1024"
doc = "Segment on-time in samples (the active span)."

[[module.wfm_compose.segment.fields]]
name = "off_samples"
type = "size_t"
default = "0"
doc = "Trailing off-time gap in samples (zeros) appended after the segment."

[[module.wfm_compose.segment.fields]]
name = "repeats"
type = "size_t"
default = "1"
doc = "Play the segment this many times back-to-back (each instance = delay + on-time + trailing gap) before advancing. Ranged fields re-draw and the AWGN is fresh per instance; the signal (codes, payload, PN phase) stays fixed."

[[module.wfm_compose.segment.fields]]
name = "delay_samples"
type = "size_t"
default = "0"
doc = "Leading gap before the on-time (samples) — the burst arrives after this delay. Ranged like off_samples and re-drawn per repeats instance, so a (lo, hi) delay is per-burst arrival jitter. Use off_samples for inter-burst spacing, delay_samples for arrival jitter."

[[module.wfm_compose.segment.fields]]
name = "gap_noise"
type = "int"
enum = "gap_noise"
default = "auto"
doc = "Gap policy for this segment's delay and trailing gap. auto (default): gaps carry the segment's noise floor — the sources' AWGN keeps running while the signal stops (clean scenes still get exact-zero gaps). off: gaps are hard zeros."

[module.wfm_compose.timeline]
