[dll]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "Dll"
depends_on = [
  { name = "loop_filter", link = true },
  { name = "lockdet", link = true },
  { name = "detection", link = true },
  { name = "telemetry", link = true },
]
serializable = "true"

[[dll.init_params]]
name = "code"
type = "uint8_t[]"

[[dll.init_params]]
name = "sps"
type = "size_t"
default = "2"

[[dll.init_params]]
name = "init_chip"
type = "double"
default = "0.0"

[[dll.init_params]]
name = "bn"
type = "double"
default = "0.01"

[[dll.init_params]]
name = "zeta"
type = "double"
default = "0.707"

[[dll.init_params]]
name = "spacing"
type = "double"
default = "0.5"

[[dll.init_params]]
name = "segments"
type = "size_t"
default = "1"

[[dll.methods]]
name = "steps"
doc = "Correlate a cf32 block against the local code with early/prompt/late taps and steer the code NCO each code period on the non-coherent (sum|E|-sum|L|)/(sum|E|+sum|L|) discriminator. With segments=1 (default) this is a coherent full-epoch integrate-and-dump: one prompt symbol per period. With segments>1 each epoch is split into that many sub-epoch partial correlations: it emits that many partial prompts per period (a stream at ~segments samples/symbol when the symbol rate is near the code rate) and tracks the code non-coherently across the partials, which a data flip cannot collapse (robust to an asynchronous data-symbol clock). segments>1 is the streaming despreader: it removes the PN code and outputs samples. The non-coherent loop is carrier-blind, so it tracks with a residual carrier still on the input; carrier recovery (Costas) and symbol-timing recovery (SymbolSync) are downstream stages fed from the partial output. Returned blocks are safe to keep across calls (block-size invariant): a block whose array is still referenced is never overwritten by a later call (jm gh-437)."
arg_type = "void"
return_type = "float _Complex"
variable_output = true
pass_capacity = true
nogil = true
params = [{ name = "x", type = "float _Complex[]" }]

# Telemetry attach (jm gh-432; mirrors objects/symsync.toml): registers
# "<prefix>.e" / "<prefix>.rate" / "<prefix>.lock" / "<prefix>.locked"
# (the last is the verify-counted lockdet decision, 0/1), emitted once per
# code epoch. None detaches; the int status binds -> None with ValueError
# on failure.
[[dll.methods]]
name = "set_telemetry"
arg_type = "void"
return_type = "int"
status_return = true
params = [
  { name = "tlm", type = "dp_tlm_t *", capsule = "doppler.telemetry.dp_tlm", header = "telemetry/telemetry.h" },
  { name = "prefix", type = "const char *" },
  { name = "decim", type = "uint32_t", default = "1" },
]

[[dll.methods]]
name = "configure"
doc = "Recompute the loop gains for a new (bn, zeta); preserves the code phase/rate."
arg_type = "void"
return_type = "void"
params = [{ name = "bn", type = "double" }, { name = "zeta", type = "double" }]

[[dll.methods]]
name = "set_rate_aid"
doc = "Set the carrier-aiding code-rate deviation (ratio; 0 = off): a fixed fractional rate bias summed into the code NCO's phase_inc every epoch, on top of the loop's own control. For physically-coupled Doppler, pass carrier_offset_hz / carrier_freq_hz so the code NCO rides the code-rate dilation the discriminator alone can't pull in at low SNR. Applied continuously across the epoch (not a phase pulse), and nudges the current phase_inc so the aid takes effect before the first period update. code_rate stays the loop's own observable and is unaffected."
arg_type = "void"
return_type = "void"
params = [{ name = "rate_aid", type = "double" }]

[[dll.methods]]
name = "configure_lock"
doc = "Tune the always-on code-lock detector to a target (pfa, n_looks). The detector reuses acquisition's non-coherent statistic R = sqrt(2*sum|P|^2 / E|O|^2), where the prompt powers of n_looks consecutive looks are summed and E|O|^2 is an EMA of a random off-peak (noise) correlation re-drawn each epoch; a decision compares R against det_threshold_noncoherent(pfa, n_looks). Size n_looks with detection.det_n_noncoh(snr, ...) for your operating C/N0. The EMA bandwidth is sized probabilistically (detection.det_ema_alpha): ref_snr_db sets the noise reference's estimator SNR (mean^2/variance of the EMA output); the default 0.0 derives it from n_looks so the reference's std stays an eighth of the statistic's intrinsic H0 spread, floored at ~33 dB. Decisions feed a verify-counted lock detector rather than a single-comparison latch: locked flips up only after det_verify_count(pfa, pfa*1e-3) consecutive above-threshold decisions (2 for the default pfa=1e-3, compounding the false-declare rate three decades under pfa) and drops only after 2 consecutive below-threshold decisions, so a statistic grazing the threshold cannot chatter the flag. The default config is pfa=1e-3 over 20 looks. Raises ValueError for pfa outside (0, 1). Read the result from the locked / lock_stat / noise_est properties."
arg_type = "void"
return_type = "int"
status_return = true
params = [
  { name = "pfa", type = "double" },
  { name = "n_looks", type = "size_t" },
  { name = "ref_snr_db", type = "double", default = "0.0" },
]

[[dll.methods]]
name = "configure_lock_raw"
doc = "Escape hatch under configure_lock() for direct control of the lock detector's geometry: a split declare/drop threshold pair on the statistic R (level hysteresis), the noise-EMA coefficient alpha, and both verify counts n_up/n_down (time hysteresis) independently -- configure_lock() only ever derives a symmetric threshold (up_thresh == down_thresh) and a fixed n_down=2. Re-tuning clears the in-flight statistic and drops the lock so the next decision uses only looks gathered under the new config. Size up_thresh/down_thresh with detection.det_threshold_noncoherent(pfa, n_looks), alpha with detection.det_ema_alpha, and n_up/n_down with detection.det_verify_count. Read the result from the locked / lock_stat / noise_est properties."
arg_type = "void"
return_type = "void"
params = [
  { name = "up_thresh", type = "double" },
  { name = "down_thresh", type = "double" },
  { name = "n_looks", type = "size_t" },
  { name = "alpha", type = "double" },
  { name = "n_up", type = "uint32_t" },
  { name = "n_down", type = "uint32_t" },
]

[[dll.methods]]
name = "reset"
doc = "Re-seed the loop to the create-time code phase; preserve config."
arg_type = "void"
return_type = "void"

[[dll.properties]]
name = "bn"
type = "double"
writable = true

[[dll.properties]]
name = "code_phase"
type = "double"

[[dll.properties]]
name = "code_rate"
type = "double"

[[dll.properties]]
name = "last_error"
type = "double"

[[dll.properties]]
name = "segments"
type = "size_t"

[[dll.properties]]
name = "locked"
type = "bool"
doc = "Current lock decision: True after the verify count of consecutive above-threshold N-look decisions, False again after the drop count of consecutive below-threshold ones (see configure_lock)."

[[dll.properties]]
name = "lock_stat"
type = "double"
doc = "Last code-lock test statistic R = sqrt(2*sum|P|^2 / E|O|^2); compare against det_threshold_noncoherent(pfa, n_looks)."

[[dll.properties]]
name = "noise_est"
type = "double"
doc = "Current CFAR noise-power estimate E|O|^2 from the off-peak (noise) tap EMA."
