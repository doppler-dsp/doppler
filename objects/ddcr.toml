[ddcr]
arg_type = "float"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "DDCR"
depends_on = [
    "lo_core",
    "RateConverter_core",
    "resamp_core",
    "hbdecim_core",
    "hbdecim_r2c_core",
    "cic_core",
    "fir_core",
    "resample_core",
]

[[ddcr.init_params]]
name = "norm_freq"
type = "double"
default = "0.0"
doc = "Fine NCO frequency at intermediate rate (fs_in/2)."

[[ddcr.init_params]]
name = "rate"
type = "double"
default = "0.25"
doc = "Total output / input rate ratio.  Must be in (0, 0.5)."

[[ddcr.methods]]
name = "execute"
arg_type = "void"
return_type = "float _Complex"
variable_output = true
params = [{name = "x", type = "float[]"}]
doc = "Halfband R2C decimate, LO mix, then rate-convert."

[[ddcr.methods]]
name = "reset"
arg_type = "void"
return_type = "void"
doc = "Zero halfband, LO phase, and filter history."

[[ddcr.properties]]
name = "norm_freq"
type = "double"
writable = true

[[ddcr.properties]]
name = "rate"
type = "double"
writable = false
