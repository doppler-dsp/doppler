[ddcr]
arg_type = "float"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "DDCR"
# ddcr_create / reset / destroy / execute live in ddc_core.c (shared with the
# Ddc object); ddcr_core.c only carries the execute_max_out hook. The direct dep
# is ddc_core — jm flattens its transitive closure (lo/RateConverter/… cores)
# onto the test/bench link line (gh-280, jm >= 0.19.15).
depends_on = ["ddc_core"]

[[ddcr.init_params]]
name = "norm_freq"
type = "double"
default = "0.0"

[[ddcr.init_params]]
name = "rate"
type = "double"
default = "0.25"

[[ddcr.methods]]
name = "execute"
doc = "Halfband R2C decimate, LO mix, then rate-convert."
arg_type = "void"
return_type = "float _Complex"
variable_output = true
pass_capacity = true
nogil = true
params = [{name = "x", type = "float[]"}]

[[ddcr.methods]]
name = "reset"
doc = "Zero halfband, LO phase, and filter history."
arg_type = "void"
return_type = "void"

[[ddcr.properties]]
name = "norm_freq"
type = "double"
writable = true

[[ddcr.properties]]
name = "rate"
type = "double"
