[project]
name = "doppler-dsp"
version = "0.2.5"
description = "Dead-simple, ultra-fast signal processing in C"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.4.2",
]
license-files = [
    "c/cmake/licenses/README_LICENSE",
    "c/cmake/licenses/FFTW_LICENSE",
    "c/cmake/licenses/POCKETFFT_LICENSE",
]

[project.urls]
Homepage      = "https://doppler-dsp.github.io/doppler/"
Documentation = "https://doppler-dsp.github.io/doppler/"
Repository    = "https://github.com/doppler-dsp/doppler"
"Bug Tracker" = "https://github.com/doppler-dsp/doppler/issues"
Changelog     = "https://github.com/doppler-dsp/doppler/blob/main/CHANGELOG.md"

[project.optional-dependencies]
optimize = [
    "scipy>=1.11",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=6.0",
    "zensical>=0.0.29",
    "mkdocstrings[python]>=0.29",
    "doppler-specan[web]",
    "matplotlib>=3.10.8",
    "scipy>=1.11",
]

[tool.pytest.ini_options]
addopts = "--tb=short --doctest-modules"
testpaths = [
    "python/dsp/doppler/tests",
    "python/dsp/doppler/accumulator",
    "python/dsp/doppler/delay",
    "python/dsp/doppler/fft",
    "python/dsp/doppler/polyphase",
    "python/dsp/doppler/resample",
]
doctest_optionflags = ["NORMALIZE_WHITESPACE", "ELLIPSIS"]

[tool.coverage.run]
source = ["python/dsp/doppler"]
omit = ["python/dsp/doppler/tests/*", "python/dsp/doppler/examples/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[tool.uv.workspace]
members = ["python/specan", "python/cli"]

[tool.uv.sources]
doppler-dsp = { workspace = true }
doppler-specan = { workspace = true }
doppler-cli = { workspace = true }

[tool.uv.build-backend]
module-root = "python/dsp"
module-name = "doppler"

[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"

# ── cibuildwheel ──────────────────────────────────────────────────────────────
# Builds platform wheels for Linux (manylinux_2_28) and macOS (arm64 + x86_64).
#
# before-all  -- runs once per OS; installs system deps + builds the C library
# before-build -- runs per Python version; cleans stale .so files, then builds
#                 and copies extensions for the active interpreter
# repair-wheel-command -- retags py3-none-any → cpXYZ-cpXYZ, then repairs deps
# ─────────────────────────────────────────────────────────────────────────────
[tool.cibuildwheel]
build = ["cp312-*", "cp313-*"]
before-build = """
find python/dsp/doppler -name '*.so' -delete
pip install "numpy>=2.4.2"
make pyext PYTHON_EXECUTABLE=$(python -c 'import sys; print(sys.executable)')
"""

[tool.cibuildwheel.linux]
archs = ["x86_64"]
manylinux-x86_64-image = "manylinux_2_28"
before-all = """
dnf install -y cmake zeromq-devel fftw-devel pkg-config
make build
"""
repair-wheel-command = "bash scripts/retag_wheel.sh {wheel} {dest_dir}"

[tool.cibuildwheel.macos]
before-all = """
brew install zeromq fftw cmake
make build
"""
repair-wheel-command = "bash scripts/retag_wheel.sh {wheel} {dest_dir}"
