include = ["objects/*.toml"]

[project]
name = "doppler"
version = "0.1.0"
build = "cmake"
perf = "true"
pytest = "true"
pytest_benchmark = "true"
schema = "6"
c_deps = ["hbdecim", "resamp"]

[module.cvt]
objects = ["f32_to_i16", "i16_to_f32", "f32_to_i16u32", "f32_to_i16u64", "i16u32_to_f32", "i16u64_to_f32", "f32_to_uq15", "uq15_to_f32"]

[module.accumulator]
objects = ["acc_f32", "acc_cf64"]

[module.filter]
objects = ["fir"]

[module.source]
objects = ["nco", "lo"]

[module.delay]
objects = ["delay"]

[module.spectral]
objects = ["fft", "fft2d", "corr", "corr2d", "detector", "detector2d"]

[[module.spectral.functions]]
name = "kaiser_enbw"
return_type = "float"
params = [{name = "w", type = "float[]"}]

[[module.spectral.functions]]
name = "kaiser_window"
params = [{name = "w", type = "float[]"}, {name = "beta", type = "float"}]

[[module.spectral.functions]]
name = "hann_window"
params = [{name = "w", type = "float[]"}]

[[module.spectral.functions]]
name = "magnitude_db_cf32"
out_type = "float"
params = [{name = "x", type = "float _Complex[]"}, {name = "lin_floor", type = "float"}, {name = "offset_db", type = "float"}]

[[module.spectral.functions]]
name = "magnitude_db_cf64"
out_type = "float"
params = [{name = "x", type = "double _Complex[]"}, {name = "lin_floor", type = "double"}, {name = "offset_db", type = "float"}]

[[module.spectral.functions]]
name = "find_peaks_f32"
return_type = "dp_peak_t"
max_results_param = "n_peaks"
result_fields = [{name = "freq_norm", type = "float"}, {name = "amplitude_db", type = "float"}]
params = [{name = "db", type = "float[]"}, {name = "n_peaks", type = "size_t"}, {name = "min_db", type = "float"}]

[module.buffer]
no_generate = "true"

[module.stream]
no_generate = "true"

[module.ddc]
no_generate = "true"

[module.resample]
objects = ["Resampler", "HalfbandDecimator", "cic", "RateConverter"]
extra_types = ["HalfbandDecimatorDp", "HalfbandDecimatorR2C"]
extra_link_libs = ["resamp_core", "hbdecim_core", "hbdecim_r2c_core", "resample_core", "fir_core", "m"]

[[module.resample.functions]]
name = "ciccompmf"
out_type = "float64[M]"
params = [{name = "N", type = "uint32_t"}, {name = "R", type = "uint32_t"}, {name = "M", type = "uint32_t"}]

[[module.resample.functions]]
name = "kaiser_beta"
return_type = "double"
params = [{name = "atten", type = "double"}]

[[module.resample.functions]]
name = "kaiser_num_taps"
return_type = "int"
params = [{name = "num_phases", type = "int"}, {name = "atten", type = "double"}, {name = "pb", type = "double"}, {name = "sb", type = "double"}]

[module.detection]
objects = []

[[module.detection.functions]]
name = "marcum_q"
return_type = "double"
params = [{name = "m", type = "int"}, {name = "a", type = "double"}, {name = "b", type = "double"}]

[[module.detection.functions]]
name = "det_threshold"
return_type = "double"
params = [{name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_pd"
return_type = "double"
params = [{name = "snr", type = "double"}, {name = "dwell", type = "int"}, {name = "threshold", type = "double"}]

[[module.detection.functions]]
name = "det_dwell"
return_type = "int"
params = [{name = "snr", type = "double"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}, {name = "max_dwell", type = "int"}]

[[module.detection.functions]]
name = "det_snr"
return_type = "double"
params = [{name = "dwell", type = "int"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_threshold_power"
return_type = "double"
params = [{name = "pfa", type = "double"}]

[[module.detection.functions]]
name = "det_pd_power"
return_type = "double"
params = [{name = "snr_power", type = "double"}, {name = "dwell", type = "int"}, {name = "power_threshold", type = "double"}]

[[module.detection.functions]]
name = "det_dwell_power"
return_type = "int"
params = [{name = "snr_power", type = "double"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}, {name = "max_dwell", type = "int"}]

[[module.detection.functions]]
name = "det_snr_power"
return_type = "double"
params = [{name = "dwell", type = "int"}, {name = "pd_min", type = "double"}, {name = "pfa", type = "double"}]

[module.agc]
objects = ["agc"]

[module.util]
objects = []

[[module.util.functions]]
name = "square_clip"
doc = "Square-clip a complex sample: clip the real and imaginary parts independently to [-lin, lin] (a square region in the IQ plane)."
return_type = "float _Complex"
params = [{name = "y", type = "float _Complex"}, {name = "lin", type = "float"}]
