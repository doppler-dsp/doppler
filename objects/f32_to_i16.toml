[f32_to_i16]
arg_type = "float"
return_type = "int16_t"
mutable = "false"
no_state = "true"
no_step = "false"
class_name = "F32ToI16"

[[f32_to_i16.init_params]]
name = "scale"
type = "float"
default = "32768.0f"

[[f32_to_i16.properties]]
name = "clipped"
doc = "True if any sample has been saturated since the last reset()."
type = "bool"
field = true
