[mpsk_receiver]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "MpskReceiver"
# carrier_nda/symsync/fir are the composed cores; lo/loop_filter/farrow are their
# transitive cores the standalone C test/bench must also link (gh-254 additive).
# wfm_dsp_core (the canonical rrc kernel behind the RRC matched filter) is a
# wfmcompose-internal OBJECT lib, not a jm component, so it rides extra_link_libs.
depends_on = [
  { name = "carrier_nda", link = true },
  { name = "symsync", link = true },
  { name = "fir", link = true },
  { name = "lo", link = true },
  { name = "loop_filter", link = true },
  { name = "farrow", link = true },
]
extra_link_libs = ["wfm_dsp_core"]
serializable = "true"

[[mpsk_receiver.init_params]]
name = "m"
type = "int"
default = "4"

[[mpsk_receiver.init_params]]
name = "sps"
type = "size_t"
default = "8"

[[mpsk_receiver.init_params]]
name = "n"
type = "int"
default = "4"

[[mpsk_receiver.init_params]]
name = "pulse"
type = "string_enum:iandd,rrc"
default = "iandd"

[[mpsk_receiver.init_params]]
name = "rrc_beta"
type = "double"
default = "0.35"

[[mpsk_receiver.init_params]]
name = "rrc_span"
type = "int"
default = "8"

[[mpsk_receiver.init_params]]
name = "bn_carrier"
type = "double"
default = "0.01"

[[mpsk_receiver.init_params]]
name = "zeta"
type = "double"
default = "0.707"

[[mpsk_receiver.init_params]]
name = "bn_timing"
type = "double"
default = "0.01"

[[mpsk_receiver.init_params]]
name = "auto_handover"
type = "int"
default = "0"

[[mpsk_receiver.init_params]]
name = "lock_thresh"
type = "double"
default = "0.5"

[[mpsk_receiver.init_params]]
name = "init_norm_freq"
type = "double"
default = "0.0"

[[mpsk_receiver.init_params]]
name = "warmup_syms"
type = "size_t"
default = "100"

[[mpsk_receiver.init_params]]
name = "differential"
type = "int"
default = "0"

[[mpsk_receiver.methods]]
name = "steps"
doc = "Demodulate a cf32 block and return the recovered M-PSK symbols (one cf32 per recovered symbol period, ~ len(x)/sps outputs). Per sample the receiver de-rotates with the integer-NCO carrier (predetection wipe-off), accumulates a non-data-aided M-th-power I/Q arm at n dumps/symbol to acquire the carrier with no data and no symbol timing, matched-filters the de-rotated stream (integrate-and-dump or RRC), and runs a Gardner symbol-timing loop. With auto_handover enabled it switches to a lower-jitter decision-directed carrier loop once locked. The loop locks to one of m phases (M-fold ambiguity); resolve it with bits(differential) or a sync word. Read norm_freq for the tracked carrier and lock for the carrier lock metric."
arg_type = "void"
return_type = "float _Complex"
variable_output = true
pass_capacity = true
nogil = true
params = [{ name = "x", type = "float _Complex[]" }]

[[mpsk_receiver.methods]]
name = "bits"
doc = "Demodulate a cf32 block and return hard Gray-coded bits (log2(m) bytes of 0/1 per recovered symbol, LSB-first). Coherent by default; if the receiver was created with differential=1, each symbol's bits come from the phase DIFFERENCE between consecutive symbols (rotation-invariant — resolves the m-fold carrier ambiguity at ~2x the symbol-error rate). Same per-sample carrier/timing recovery as steps()."
arg_type = "void"
return_type = "uint8_t"
variable_output = true
pass_capacity = true
nogil = true
params = [{ name = "x", type = "float _Complex[]" }]

[[mpsk_receiver.methods]]
name = "reset"
doc = "Re-seed the carrier and symbol-timing loops to their create-time state; preserve configuration."
arg_type = "void"
return_type = "void"

[[mpsk_receiver.properties]]
name = "norm_freq"
type = "double"
writable = true

[[mpsk_receiver.properties]]
name = "lock"
type = "double"

[[mpsk_receiver.properties]]
name = "timing_rate"
type = "double"

[[mpsk_receiver.properties]]
name = "tracking"
type = "int"

[[mpsk_receiver.properties]]
name = "m"
type = "int"

[[mpsk_receiver.properties]]
name = "sps"
type = "size_t"

[[mpsk_receiver.properties]]
name = "n"
type = "int"
