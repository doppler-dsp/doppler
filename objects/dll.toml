[dll]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "Dll"
depends_on = [{ name = "loop_filter", link = true }]

[[dll.init_params]]
name = "code"
type = "uint8_t[]"

[[dll.init_params]]
name = "sps"
type = "size_t"
default = "2"

[[dll.init_params]]
name = "init_chip"
type = "double"
default = "0.0"

[[dll.init_params]]
name = "bn"
type = "double"
default = "0.01"

[[dll.init_params]]
name = "zeta"
type = "double"
default = "0.707"

[[dll.init_params]]
name = "spacing"
type = "double"
default = "0.5"

[[dll.init_params]]
name = "segments"
type = "size_t"
default = "1"

[[dll.methods]]
name = "steps"
doc = "Correlate a carrier-wiped cf32 block against the local code with early/prompt/late taps and steer the code NCO each code period on the non-coherent (sum|E|-sum|L|)/(sum|E|+sum|L|) discriminator. With segments=1 (default) this is a coherent full-epoch integrate-and-dump: one prompt symbol per period. With segments>1 each epoch is split into that many sub-epoch partial correlations: it emits that many partial prompts per period (a stream at ~segments samples/symbol when the symbol rate is near the code rate, for a downstream symbol matched filter + SymbolSync) and tracks the code non-coherently across the partials, which a data flip cannot collapse (robust to an asynchronous data-symbol clock)."
arg_type = "void"
return_type = "float _Complex"
variable_output = true
pass_capacity = true
nogil = true
params = [{ name = "x", type = "float _Complex[]" }]

[[dll.methods]]
name = "configure"
doc = "Recompute the loop gains for a new (bn, zeta); preserves the code phase/rate."
arg_type = "void"
return_type = "void"
params = [{ name = "bn", type = "double" }, { name = "zeta", type = "double" }]

[[dll.methods]]
name = "reset"
doc = "Re-seed the loop to the create-time code phase; preserve config."
arg_type = "void"
return_type = "void"

[[dll.properties]]
name = "bn"
type = "double"
writable = true

[[dll.properties]]
name = "code_phase"
type = "double"

[[dll.properties]]
name = "code_rate"
type = "double"

[[dll.properties]]
name = "last_error"
type = "double"

[[dll.properties]]
name = "segments"
type = "size_t"
