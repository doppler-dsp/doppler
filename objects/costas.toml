[costas]
arg_type = "float _Complex"
return_type = "float _Complex"
mutable = "false"
no_state = "true"
no_step = "true"
class_name = "Costas"
serializable = "true"
depends_on = [
  { name = "lo", link = true },
  { name = "lockdet", link = true },
  { name = "loop_filter", link = true },
  { name = "telemetry", link = true },
]

[[costas.init_params]]
name = "bn"
type = "double"
default = "0.05"

[[costas.init_params]]
name = "zeta"
type = "double"
default = "0.707"

[[costas.init_params]]
name = "init_norm_freq"
type = "double"
default = "0.0"

[[costas.init_params]]
name = "tsamps"
type = "size_t"
default = "64"

[[costas.init_params]]
name = "bn_fll"
type = "double"
default = "0.0"

[[costas.methods]]
name = "steps"
doc = "De-rotate a cf32 block with the integer-NCO carrier, coherently integrate over each tsamps-sample symbol, run the decision-directed Costas discriminator, and emit one complex prompt symbol per symbol."
arg_type = "void"
return_type = "float _Complex"
variable_output = true
pass_capacity = true
nogil = true
params = [{ name = "x", type = "float _Complex[]" }]

# Telemetry attach (jm gh-432; mirrors objects/symsync.toml): registers
# "<prefix>.lock" / "<prefix>.e" / "<prefix>.freq" / "<prefix>.locked"
# (the last is the verify-counted lockdet decision, 0/1), emitted once per
# dumped symbol. None detaches; the int status binds -> None with
# ValueError on failure.
[[costas.methods]]
name = "set_telemetry"
arg_type = "void"
return_type = "int"
status_return = true
params = [
  { name = "tlm", type = "dp_tlm_t *", capsule = "doppler.telemetry.dp_tlm", header = "telemetry/telemetry.h" },
  { name = "prefix", type = "const char *" },
  { name = "decim", type = "uint32_t", default = "1" },
]

[[costas.methods]]
name = "configure"
doc = "Recompute the loop gains for a new (bn, zeta); preserves the frequency/phase estimate."
arg_type = "void"
return_type = "void"
params = [{ name = "bn", type = "double" }, { name = "zeta", type = "double" }]

[[costas.methods]]
name = "configure_lock"
doc = "Re-tune the carrier lock detector: locked flips up after n_up consecutive dumped symbols with the lock-metric EMA above up_thresh, and drops after n_down consecutive symbols below down_thresh (level + time hysteresis; see detection.LockDet). The defaults (0.85/0.78, 8 up / 32 down) derive from the metric's no-carrier statistics: |Re P|/|P| averages 2/pi (~0.64) under H0 with an EMA-smoothed std of ~0.07, so the declare threshold sits ~3 sigma above the no-carrier mean. A live lock survives the re-tune; the in-flight verify run restarts."
arg_type = "void"
return_type = "void"
params = [
  { name = "up_thresh", type = "double" },
  { name = "down_thresh", type = "double" },
  { name = "n_up", type = "uint32_t" },
  { name = "n_down", type = "uint32_t" },
]

[[costas.methods]]
name = "reset"
doc = "Re-seed the loop to the create-time frequency/phase; preserve config."
arg_type = "void"
return_type = "void"

[[costas.properties]]
name = "bn"
type = "double"
writable = true

[[costas.properties]]
name = "norm_freq"
type = "double"
writable = true

[[costas.properties]]
name = "lock_metric"
type = "double"

[[costas.properties]]
name = "locked"
type = "bool"
doc = "Current carrier lock decision: True after the verify count of consecutive above-threshold symbols, False again after the drop count of consecutive below-threshold ones (see configure_lock)."

[[costas.properties]]
name = "last_error"
type = "double"

[[costas.properties]]
name = "bn_fll"
type = "double"
writable = true
