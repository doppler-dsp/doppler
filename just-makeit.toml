[module.cvt]
objects = ["f32_to_i16", "i16_to_f32", "i32_to_f32", "i8_to_f32", "f32_to_i16u32", "f32_to_i16u64", "i16u32_to_f32", "i16u64_to_f32", "f32_to_uq15", "uq15_to_f32", "adc"]

[module.accumulator]
objects = ["acc_f32", "acc_cf64", "acc_trace"]

[module.filter]
objects = ["fir", "boxcar"]
# resample_core: kaiser_num_taps/kaiser_beta (FIR-design sizing/beta) for
# design_lowpass. spectral_core: kaiser_window (formula-agnostic generator).
extra_link_libs = ["spectral_core", "resample_core"]

[[module.filter.functions]]
name = "design_lowpass"
doc = "Kaiser-windowed-sinc lowpass FIR taps, auto-sized by kaiser_num_taps (Nyquist-normalised fpass/fstop band edges, unit-DC-gain float32 taps)."
out_type = "float"
variable_output = true
out_size = "kaiser_num_taps(1, atten_db, fpass / 2.0, fstop / 2.0) | 1"

[[module.filter.functions.params]]
name = "fpass"
type = "double"
default = "0.4"

[[module.filter.functions.params]]
name = "fstop"
type = "double"
default = "0.6"

[[module.filter.functions.params]]
name = "atten_db"
type = "double"
default = "60.0"

[module.source]
objects = ["nco", "lo", "awgn"]
# libmvec backs AWGN's AVX2 vectorized log() (_ZGVdN8v_logf, weak-resolved at
# runtime per awgn_core.c) — an x86 vector-call ABI, and glibc only ships
# libmvec.so on x86_64 (confirmed missing on manylinux_2_28_aarch64: `ld:
# cannot find -lmvec`, v0.32.0 release run). Gate on processor, not just
# platform, so the link line is a no-op on aarch64 rather than failing it.
extra_link_libs = ["$<$<AND:$<PLATFORM_ID:Linux>,$<STREQUAL:${CMAKE_SYSTEM_PROCESSOR},x86_64>>:mvec>"]

[module.wfm]
objects = ["pn", "wfm_synth", "gold"]
# wfm_synth.toml's depends_on link=true (gh-225) links lo/awgn/fir _core into the
# wfm .so; pn is in-module (linked via objects). Replaces extra_link_libs.
# wfm_dsp_core (the rrc/dsss kernels in wfm_dsp.c) backs the rrc_taps/dsss_spread
# module functions — linked module-wide since they're free fns, not an object.
extra_link_libs = ["wfm_dsp_core"]

# Fold the hand-written composition / I/O surface into doppler.wfm so the whole
# subsystem has one import path (D7). The Python `Synth` (a thin wrapper in
# compose.py over the C engine) is re-exported AFTER the C-extension import, so
# it shadows the raw engine type — the public doppler.wfm.Synth is the wrapper
# (its get_*/set_* engine accessors stay internal, D9).
# Transport classes are now the generated kind="handle" types (re-exported
# straight from their .so submodules — zero hand-Python). Composition surface +
# the remaining free functions still come from compose.py.
[module.wfm.reexports]
compose = ["Synth", "tone", "bpsk", "qpsk", "pn", "noise", "chirp", "bits", "Segment", "Timeline", "Composer", "write_blue_header", "Plan", "prepare"]
wfm_writer = ["Writer"]
wfm_reader = ["Reader"]
wfm_sink = ["StreamSink"]
sample_clock = ["SampleClock"]
readback = ["read_iq"]

[[module.wfm.functions]]
name = "bpsk_map"
doc = "Map bits {0,1} to BPSK symbols {+1,-1} (cf32)."
out_type = "float _Complex"

[[module.wfm.functions.params]]
name = "bits"
type = "uint8_t[]"

[[module.wfm.functions]]
name = "qpsk_map"
doc = "Map QPSK symbol indices {0,1,2,3} to Gray-coded symbols (cf32)."
